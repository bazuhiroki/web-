                            for (let n = 0; n < spot.n && idx < rubbleCount; n++) {
                                const a = Math.random() * Math.PI * 2, r = Math.random() * spot.r;
                                const s = rand(0.12, 0.42);
                                e.set(Math.random() * 3, Math.random() * 3, Math.random() * 3);
                                q.setFromEuler(e);
                                const rx = spot.x + Math.cos(a) * r, rz = spot.z + Math.sin(a) * r;
                                m4.compose(
                                    new THREE.Vector3(rx, cityY + terrainH(rx, rz) + s * 0.3, rz),
                                    q, new THREE.Vector3(s, s, s));
                                rubbleInst.setMatrixAt(idx++, m4);
                            }
                        });
                        // 残りは全域へ
                        while (idx < rubbleCount) {
                            const a = Math.random() * Math.PI * 2, r = rand(4, 44);
                            const x = Math.cos(a) * r, z = Math.sin(a) * r;
                            const dl = Math.sqrt((x - lakeC.x) ** 2 + (z - lakeC.z) ** 2);
                            const s = rand(0.1, 0.32);
                            e.set(Math.random() * 3, Math.random() * 3, Math.random() * 3);
                            q.setFromEuler(e);
                            m4.compose(
                                new THREE.Vector3(x, cityY + (dl < lakeC.r ? -1.2 : terrainH(x, z) + s * 0.3), z),
                                q, new THREE.Vector3(s, s, s));
                            rubbleInst.setMatrixAt(idx++, m4);
                        }
                    }
                    envGroup.add(rubbleInst);

                    // 伸び放題の草むら(廃墟を侵食する植生)
                    const grassCount = 360;
                    const grassGeo = new THREE.ConeGeometry(0.16, 0.55, 4);
                    const grassMat = new THREE.MeshStandardMaterial({ color: 0x8a8a4e, roughness: 1, flatShading: true });
                    const grassInst = new THREE.InstancedMesh(grassGeo, grassMat, grassCount);
                    {
                        const m4 = new THREE.Matrix4();
                        const q = new THREE.Quaternion();
                        const e = new THREE.Euler();
                        for (let i = 0; i < grassCount; i++) {
                            const a = Math.random() * Math.PI * 2, r = rand(6, 52);
                            const x = Math.cos(a) * r, z = Math.sin(a) * r;
                            const dl = Math.sqrt((x - lakeC.x) ** 2 + (z - lakeC.z) ** 2);
                            const s = rand(0.6, 1.8);
                            e.set(rand(-0.2, 0.2), Math.random() * Math.PI, rand(-0.2, 0.2));
                            q.setFromEuler(e);
                            m4.compose(
                                new THREE.Vector3(x, cityY + (dl < lakeC.r ? -3 : terrainH(x, z) + 0.22 * s), z),
                                q, new THREE.Vector3(s, s, s));
                            grassInst.setMatrixAt(i, m4);
                        }
                    }
                    envGroup.add(grassInst);

                    // ---------- 火災: 残り火と立ちのぼる煙 ----------
                    const smokes = [];
                    const embers = [];
                    const fireSites = [
                        { x: 12, z: 8, lean: 0.5 },
                        { x: -14, z: -10, lean: 0.35 },
                        { x: 33, z: 20, lean: 0.6 }
                    ];
                    fireSites.forEach((site, si) => {
                        const ember = new THREE.Sprite(new THREE.SpriteMaterial({
                            map: glowTex, color: 0xff5a22, transparent: true, opacity: 0.6,
                            blending: THREE.AdditiveBlending, depthWrite: false
                        }));
                        ember.scale.set(1.6, 1, 1);
                        ember.position.set(site.x, cityY + terrainH(site.x, site.z) + 0.6, site.z);
                        envGroup.add(ember);
                        embers.push(ember);

                        const plume = new THREE.Group();
                        for (let s = 0; s < 9; s++) {
                            const puff = new THREE.Sprite(new THREE.SpriteMaterial({
                                map: glowTex, color: 0x555b60, transparent: true, opacity: 0, depthWrite: false
                            }));
                            plume.add(puff);
                        }
                        plume.position.set(site.x, cityY + terrainH(site.x, site.z) + 0.8, site.z);
                        plume.userData = { speed: rand(0.05, 0.09), height: rand(9, 14), lean: site.lean, phase: si * 0.37 };
                        envGroup.add(plume);
                        smokes.push(plume);
                    });

                    // ---------- 鳥の群れ(廃墟の空を旋回する) ----------
                    const makeBirdTexture = () => {
                        const cv = document.createElement('canvas');
                        cv.width = 64; cv.height = 32;
                        const ctx = cv.getContext('2d');
                        ctx.strokeStyle = 'rgba(20, 24, 30, 0.95)';
                        ctx.lineWidth = 4;
                        ctx.lineCap = 'round';
                        ctx.beginPath();
                        ctx.moveTo(6, 24); ctx.quadraticCurveTo(20, 6, 32, 20);
                        ctx.quadraticCurveTo(44, 6, 58, 24);
                        ctx.stroke();
                        return new THREE.CanvasTexture(cv);
                    };
                    const birdTex = makeBirdTexture();
                    const flocks = [];
                    for (let f = 0; f < 2; f++) {
                        const flock = new THREE.Group();
                        const birds = 6 + Math.floor(Math.random() * 4);
                        for (let b = 0; b < birds; b++) {
                            const bird = new THREE.Sprite(new THREE.SpriteMaterial({
                                map: birdTex, transparent: true, depthWrite: false
                            }));
                            const a = (b / birds) * Math.PI * 2;
                            const r = rand(2.5, 5.5);
                            bird.position.set(Math.cos(a) * r, 0, Math.sin(a) * r);
                            bird.scale.set(0.9, 0.45, 1);
                            flock.add(bird);
                        }
                        flock.position.set(f === 0 ? 10 : -22, 0, f === 0 ? -4 : 14);
                        flock.userData = { speed: rand(0.25, 0.45) * (f === 0 ? 1 : -1), baseY: cityY + rand(9, 14), phase: f * 2 };
                        flock.position.y = flock.userData.baseY;
                        envGroup.add(flock);
                        flocks.push(flock);
                    }

                    // ---------- 空気中を漂う塵(パーティクル) ----------
                    const moteCount = 260;
                    const motePos = new Float32Array(moteCount * 3);
                    for (let i = 0; i < moteCount; i++) {
                        const a = Math.random() * Math.PI * 2, r = Math.pow(Math.random(), 0.6) * 46;
                        motePos[i * 3] = Math.cos(a) * r;
                        motePos[i * 3 + 1] = cityY + rand(0.5, 9);
                        motePos[i * 3 + 2] = Math.sin(a) * r;
                    }
                    const moteGeo = new THREE.BufferGeometry();
                    moteGeo.setAttribute('position', new THREE.BufferAttribute(motePos, 3));
                    const motes = new THREE.Points(moteGeo, new THREE.PointsMaterial({
                        size: 0.16, map: glowTex, transparent: true, opacity: 0.35,
                        color: 0xf0e6c8, depthWrite: false, sizeAttenuation: true
                    }));
                    envGroup.add(motes);

                    // ---------- 地表を漂う砂塵の帯 ----------
                    const dust = [];
                    for (let i = 0; i < 5; i++) {
                        const d = new THREE.Sprite(new THREE.SpriteMaterial({
                            map: glowTex, color: 0xe9dfc2, transparent: true,
                            opacity: rand(0.14, 0.24), depthWrite: false
                        }));
                        d.scale.set(rand(34, 58), rand(4.5, 8), 1);
                        d.position.set(rand(-60, 60), cityY + rand(1.6, 4), rand(-24, 46));
                        d.userData.baseOp = d.material.opacity;
                        envGroup.add(d);
                        dust.push(d);
                    }

                    st.env = { type: 'city', clouds, dust, smokes, embers, flocks, motes, lakeGlint, danglers };
                }
            }, [theme]);

            // --- データ更新時に球を作り直す ---
            useEffect(() => {
                const st = stateRef.current;
                if (!st) return;
                st.spheres.forEach(m => {
                    m.children.forEach(ch => ch.material && ch.material.dispose());
                    m.geometry.dispose(); m.material.dispose(); st.bubbleGroup.remove(m);
                });
                st.spheres = [];

                const geo = new THREE.SphereGeometry(1, 32, 32);
                data.forEach(cert => {
                    // やりがいで色相を変化 (青磁 → 金 → 朱)
                    const hue = 0.52 - ((cert.gai - 1) / 4) * 0.47;
                    const color = new THREE.Color().setHSL(hue, 0.72, 0.58);
                    const mat = new THREE.MeshStandardMaterial({
                        color, roughness: 0.2, metalness: 0.4,
                        emissive: color.clone().multiplyScalar(0.35),
                        transparent: true, opacity: 0.95
                    });
                    const mesh = new THREE.Mesh(geo.clone(), mat);
                    const baseScale = 0.22 + cert.gai * 0.09;
                    mesh.position.set(st.map(cert.difficulty), st.map(cert.necessity), st.map(cert.gai));
                    mesh.userData = {
                        name: cert.name, difficulty: cert.difficulty, necessity: cert.necessity,
                        gai: cert.gai, baseY: st.map(cert.necessity), baseScale
                    };
                    mesh.scale.setScalar(baseScale);

                    const halo = new THREE.Sprite(new THREE.SpriteMaterial({
                        map: st.glowTex, color: color.clone().multiplyScalar(1.2),
                        transparent: true, opacity: 0.55,
                        blending: THREE.AdditiveBlending, depthWrite: false
                    }));
                    halo.scale.setScalar(3.2);
                    mesh.add(halo);

                    st.bubbleGroup.add(mesh);
                    st.spheres.push(mesh);
                });
            }, [data]);

            const overlayColor = theme === 'city' ? 'rgba(25, 38, 58, 0.72)' : 'var(--muted)';
            return (
                <div className="relative w-full h-full" ref={mountRef}>
                    <div ref={tooltipRef} className="g3d-tooltip"></div>
                    {(!data || data.length === 0) && (
                        <div className="absolute inset-0 flex flex-col items-center justify-center text-center p-4 z-10 pointer-events-none">
                            <div className="text-4xl mb-3 opacity-40" style={{color: overlayColor}}>◍</div>
                            <p className="text-sm" style={{color: overlayColor}}>表示するデータがありません。<br/>資格情報を追加またはアップロードしてください。</p>
                        </div>
                    )}
                    <div className="absolute bottom-3 right-4 text-[11px] font-mono-data pointer-events-none" style={{color: overlayColor}}>
                        ドラッグ: 回転 / ホイール: ズーム / ホバー: 詳細
                    </div>
                </div>
            );
        };

        // --- 進捗ドーナツ ---
        const ProgressDoughnutChart = ({ progressPercent }) => {
            const canvasRef = useRef(null);
            const chartRef = useRef(null);
            useEffect(() => {
                const cv = canvasRef.current;
                if (!cv || typeof Chart === 'undefined') return;
                if (chartRef.current) chartRef.current.destroy();
                const ctx = cv.getContext('2d');
                const grad = ctx.createLinearGradient(0, 0, 140, 140);
                grad.addColorStop(0, '#E85B3F');
                grad.addColorStop(1, '#E5B84B');
                chartRef.current = new Chart(ctx, {
                    type: 'doughnut',
                    data: { datasets: [{
                        data: [progressPercent, 100 - progressPercent],
                        backgroundColor: [grad, 'rgba(255,255,255,0.07)'],
                        borderColor: 'transparent', borderWidth: 0,
                        borderRadius: progressPercent > 0 && progressPercent < 100 ? 10 : 0,
                    }]},
                    options: {
                        responsive: true, maintainAspectRatio: false, cutout: '76%',
                        plugins: { legend: { display: false }, tooltip: { enabled: false } }
                    }
                });
            }, [progressPercent]);
            return (
                <div className="relative w-full h-full flex items-center justify-center">
                    <canvas ref={canvasRef}></canvas>
                    <div className="absolute flex flex-col items-center justify-center">
                        <span className="text-2xl md:text-3xl font-bold font-mono-data">{progressPercent.toFixed(1)}<span className="text-sm">%</span></span>
                        <span className="text-[11px]" style={{color: 'var(--muted)'}}>進捗率</span>
                    </div>
                </div>
            );
        };

        // --- アコーディオン (モバイル用) ---
        const Accordion = ({ title, children, defaultOpen = false }) => {
            const [isOpen, setIsOpen] = useState(defaultOpen);
            return (
                <div className="glass overflow-hidden">
                    <button onClick={() => setIsOpen(!isOpen)} className="w-full flex justify-between items-center p-4 text-left">
                        <h3 className="font-bold">{title}</h3>
                        <span className={`text-xs transition-transform duration-300 ${isOpen ? 'rotate-180' : ''}`} style={{color: 'var(--muted)'}}>▼</span>
                    </button>
                    <div className={`accordion-content ${isOpen ? 'open' : ''}`}>
                        <div className="p-4 pt-0">{children}</div>
                    </div>
                </div>
            );
        };

        const SectionCard = ({ eyebrow, title, children, className = '' }) => (
            <div className={`glass lift p-5 ${className}`}>
                {eyebrow && <div className="eyebrow mb-1">{eyebrow}</div>}
                {title && <h3 className="font-display text-lg font-bold mb-4">{title}</h3>}
                {children}
            </div>
        );

        // ============================================================
        //  AIレポート モーダル
        // ============================================================
        const AIReportModal = ({
            isOpen, onClose, reporter, setReporter, generateReport, generateComprehensiveReport,
            loadingReport, report, handlePdfExport, handleSaveReportToCalendar, selectedDate, currentCertId
        }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="glass p-6 w-full max-w-sm md:max-w-3xl animate-fade-in-scale" style={{background: 'rgba(17,22,46,0.92)'}}>
                        <div className="flex justify-between items-center mb-5">
                            <div>
                                <div className="eyebrow">AI Report</div>
                                <h3 className="font-display text-xl md:text-2xl font-bold">AIレポート</h3>
                            </div>
                            <button onClick={onClose} className="text-3xl leading-none hover:opacity-70 transition-opacity" style={{color: 'var(--muted)'}}>&times;</button>
                        </div>

                        <div className="flex flex-col md:flex-row gap-6">
                            <div className="w-full md:w-1/3 space-y-4 flex flex-col">
                                <div>
                                    <label className="text-sm font-bold mb-2 block">AIレポーター設定</label>
                                    <input type="text" value={reporter} onChange={(e) => setReporter(e.target.value)}
                                        placeholder="例:熱血コーチ" className="field" />
                                </div>
                                <div className="space-y-2 mt-auto">
                                    <button onClick={generateReport} className="btn btn-seiji w-full" disabled={loadingReport || !currentCertId}>
                                        {loadingReport ? '生成中...' : '個別レポートを生成'}
                                    </button>
                                    <button onClick={generateComprehensiveReport} className="btn btn-indigo w-full" disabled={loadingReport}>
                                        {loadingReport ? '生成中...' : '総合レポートを生成'}
                                    </button>
                                    {!currentCertId && <p className="text-xs text-center pt-1" style={{color: 'var(--kin)'}}>個別レポートには「進捗管理」タブでの資格選択が必要です。</p>}
                                </div>
                            </div>

                            <div className="w-full md:w-2/3 glass-inset p-4 h-80 md:h-96 overflow-y-auto">
                                {loadingReport ? (
                                    <div className="flex items-center justify-center h-full" style={{color: 'var(--muted)'}}>レポートを生成中...</div>
                                ) : report ? (
                                    <div id="report-content" className="whitespace-pre-wrap leading-relaxed text-sm" dangerouslySetInnerHTML={{ __html: report.replace(/\n/g, '<br />') }}></div>
                                ) : (
                                    <div className="flex items-center justify-center h-full text-sm" style={{color: 'var(--muted)'}}>ここにレポートが表示されます。</div>
                                )}
                            </div>
                        </div>

                        {report && !loadingReport && (
                            <div className="flex flex-col sm:flex-row justify-end gap-3 mt-6 pt-4" style={{borderTop: '1px solid var(--line)'}}>
                                <button onClick={handlePdfExport} className="btn btn-ghost">PDF出力</button>
                                <button onClick={handleSaveReportToCalendar} disabled={!selectedDate} className="btn btn-shu">選択中の日付に保存</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // ============================================================
        //  タブ1: 優先順位
        // ============================================================
        const PrioritizationTab = ({ data, filters, handleFilterChange, certForm, handleFormChange, handleAddUpdateCert, editingCert, setEditingCert, handleCertFileUpload, handleDeleteCert }) => {
            const isDesktop = useMediaQuery('(min-width: 1024px)');
            const [sceneTheme, setSceneTheme] = useState('space');
            const filteredCerts = useMemo(() => {
                return data.certifications.filter(cert =>
                    cert.difficulty >= filters.difficulty.min && cert.difficulty <= filters.difficulty.max &&
                    cert.necessity >= filters.necessity.min && cert.necessity <= filters.necessity.max &&
                    cert.gai >= filters.gai.min && cert.gai <= filters.gai.max
                );
            }, [data.certifications, filters]);

            const labels = { difficulty: '難易度', necessity: '必要性', gai: 'やりがい' };

            const uploadSection = (
                <div>
                    <p className="text-xs mb-3 leading-relaxed" style={{color: 'var(--muted)'}}>Excel(.xlsx)またはJSON(.json)形式。<br/>Excel: A列=資格名, B=難易度, C=必要性, D=やりがい (2行目から)</p>
                    <input type="file" accept=".json,.xlsx,.xls" onChange={handleCertFileUpload} className="file-input block w-full text-xs cursor-pointer" style={{color: 'var(--muted)'}}/>
                </div>
            );

            const filterSection = (
                <div className="space-y-3">
                    {['difficulty', 'necessity', 'gai'].map(key => (
                        <div key={key}>
                            <div className="flex justify-between items-baseline mb-1.5">
                                <label className="text-sm font-medium">{labels[key]}</label>
                                <span className="font-mono-data text-xs" style={{color: 'var(--kin)'}}>{filters[key].min} – {filters[key].max}</span>
                            </div>
                            <div className="flex items-center gap-2 text-xs" style={{color: 'var(--muted)'}}>
                                <span>1</span>
                                <input type="range" min="1" max="5" value={filters[key].min} onChange={e => handleFilterChange(key, 'min', e.target.value)} className="w-full" />
                                <input type="range" min="1" max="5" value={filters[key].max} onChange={e => handleFilterChange(key, 'max', e.target.value)} className="w-full" />
                                <span>5</span>
                            </div>
                        </div>
                    ))}
                </div>
            );

            const formSection = (
                <div className="space-y-3">
                    <input type="text" name="name" value={certForm.name} onChange={handleFormChange} placeholder="資格名" className="field"/>
                    <div className="grid grid-cols-3 gap-2">
                        {['difficulty', 'necessity', 'gai'].map(key => (
                            <div key={key}>
                                <label className="block text-xs font-medium mb-1" style={{color: 'var(--muted)'}}>{labels[key]}</label>
                                <input type="number" name={key} value={certForm[key]} onChange={handleFormChange} min="1" max="5" className="field"/>
                            </div>
                        ))}
                    </div>
                    <button onClick={handleAddUpdateCert} className="btn btn-shu w-full">{editingCert ? '更新する' : '追加する'}</button>
                    {editingCert && <button onClick={() => setEditingCert(null)} className="btn btn-ghost w-full">キャンセル</button>}
                </div>
            );

            const leftColumn = isDesktop ? (
                <div className="space-y-4">
                    <SectionCard eyebrow="Upload" title="資格情報アップロード">{uploadSection}</SectionCard>
                    <SectionCard eyebrow="Filter" title="フィルター">{filterSection}</SectionCard>
                    <SectionCard eyebrow={editingCert ? 'Edit' : 'Add'} title={editingCert ? '資格情報の編集' : '資格情報の手動追加'}>{formSection}</SectionCard>
                </div>
            ) : (
                <div className="space-y-3">
                    <Accordion title="資格情報アップロード">{uploadSection}</Accordion>
                    <Accordion title="フィルター">{filterSection}</Accordion>
                    <Accordion title={editingCert ? '資格情報の編集' : '資格情報の手動追加'} defaultOpen={!!editingCert}>{formSection}</Accordion>
                </div>
            );

            return (
                <div className="space-y-4 md:space-y-5 fade-up">
                    <div className="flex flex-col lg:flex-row gap-4 md:gap-5">
                        <div className="w-full lg:w-[320px] xl:w-[360px] lg:flex-shrink-0">{leftColumn}</div>
                        <div className="w-full lg:flex-1">
                            <div className="glass p-4 md:p-5 h-full flex flex-col">
                                <div className="flex items-baseline justify-between mb-3 flex-wrap gap-2">
                                    <div>
                                        <div className="eyebrow">3D Matrix</div>
                                        <h3 className="font-display text-lg xl:text-xl font-bold">立体優先度マップ</h3>
                                    </div>
                                    <div className="flex items-center gap-4 flex-wrap">
                                        <div className="flex gap-3 text-[11px]" style={{color: 'var(--muted)'}}>
                                            <span><span style={{color:'#e5b84b'}}>●</span> X: 難易度</span>
                                            <span><span style={{color:'#55c6b5'}}>●</span> Y: 必要性</span>
                                            <span><span style={{color:'#e85b3f'}}>●</span> Z: やりがい</span>
                                        </div>
                                        <div className="scene-toggle" role="group" aria-label="背景テーマ切り替え">
                                            <button onClick={() => setSceneTheme('space')} className={sceneTheme === 'space' ? 'active-space' : ''}>✦ 宇宙</button>
                                            <button onClick={() => setSceneTheme('city')} className={sceneTheme === 'city' ? 'active-city' : ''}>▦ 都市</button>
                                        </div>
                                    </div>
                                </div>
                                <div className={`w-full flex-1 h-[48vh] md:h-[56vh] lg:h-auto lg:min-h-[560px] min-h-[340px] ${sceneTheme === 'space' ? 'space-bg' : 'city-bg'} overflow-hidden relative`} style={{border: '1px solid var(--line)', transition: 'background 0.6s ease'}}>
                                    <Bubble3DChart data={filteredCerts} theme={sceneTheme} />
                                </div>
                            </div>
                        </div>
                    </div>
                    <div className="w-full">
                        <div className="glass p-4 md:p-5">
                            <div className="flex items-baseline justify-between mb-3">
                                <h3 className="font-display text-lg font-bold">資格一覧</h3>
                                <span className="font-mono-data text-xs" style={{color: 'var(--muted)'}}>{filteredCerts.length} 件</span>
                            </div>
                            <div className="overflow-auto max-h-[40vh] glass-inset">
                                <table className="min-w-full text-sm">
                                    <thead className="sticky top-0" style={{background: 'var(--bg-2)'}}>
                                        <tr>{['資格名', '難易度', '必要性', 'やりがい', ''].map((h, i) => (
                                            <th key={i} className="px-3 md:px-4 py-2.5 text-left text-[11px] font-bold tracking-wider" style={{color: 'var(--muted)'}}>{h}</th>
                                        ))}</tr>
                                    </thead>
                                    <tbody>
                                        {filteredCerts.length > 0 ? filteredCerts.map(cert => (
                                            <tr key={cert.id} className="transition-colors hover:bg-white/5" style={{borderTop: '1px solid var(--line)'}}>
                                                <td className="px-3 md:px-4 py-2.5 font-medium">{cert.name}</td>
                                                <td className="px-3 md:px-4 py-2.5 font-mono-data" style={{color: 'var(--kin)'}}>{cert.difficulty}</td>
                                                <td className="px-3 md:px-4 py-2.5 font-mono-data" style={{color: 'var(--seiji)'}}>{cert.necessity}</td>
                                                <td className="px-3 md:px-4 py-2.5 font-mono-data" style={{color: 'var(--shu)'}}>{cert.gai}</td>
                                                <td className="px-3 md:px-4 py-2.5 whitespace-nowrap space-x-3 text-xs font-bold">
                                                    <button onClick={() => setEditingCert(cert)} className="hover:underline" style={{color: 'var(--indigo)'}}>編集</button>
                                                    <button onClick={() => handleDeleteCert(cert.id)} className="hover:underline" style={{color: 'var(--shu)'}}>削除</button>
                                                </td>
                                            </tr>
                                        )) : (<tr><td colSpan="5" className="text-center py-6" style={{color: 'var(--muted)'}}>該当する資格がありません。</td></tr>)}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ============================================================
        //  タブ2: 進捗管理
        // ============================================================
        const ProgressTab = ({ data, currentCertId, setCurrentCertId, saveData, handleProgressFileUpload, newMajorItemName, setNewMajorItemName, handleAddMajorItem, parentMajorItemId, setParentMajorItemId, newMinorItemName, setNewMinorItemName, handleAddMinorItem, handleProgressCheckbox, progressPercent }) => {
            const isDesktop = useMediaQuery('(min-width: 1024px)');

            const certSection = (
                <div className="space-y-3">
                    <select value={currentCertId || ''} onChange={(e) => setCurrentCertId(e.target.value)} className="field">
                        <option value="">資格を選択...</option>
                        {data.certifications.map((cert) => <option key={cert.id} value={cert.id}>{cert.name}</option>)}
                    </select>
                    <div>
                        <label className="block text-xs font-medium mb-1" style={{color: 'var(--muted)'}}>目標取得日</label>
                        <input type="date" value={data.progress[currentCertId]?.targetDate || ''} onChange={(e) => {
                            if (!currentCertId) return;
                            const updatedProgress = { ...data.progress, [currentCertId]: { ...(data.progress[currentCertId] || {}), targetDate: e.target.value } };
                            saveData({ ...data, progress: updatedProgress });
                        }} className="field"/>
                    </div>
                </div>
            );

            const itemSection = (
                <div className="space-y-3">
                    <p className="text-xs leading-relaxed" style={{color: 'var(--muted)'}}>Excelファイルをアップロード (●:大項目, ・:小項目)</p>
                    <input type="file" accept=".xlsx" onChange={handleProgressFileUpload} className="file-input block w-full text-xs cursor-pointer" style={{color: 'var(--muted)'}}/>
                    <div className="pt-3 space-y-2" style={{borderTop: '1px solid var(--line)'}}>
                        <div className="text-sm font-bold">手動で追加</div>
                        <input type="text" value={newMajorItemName} onChange={(e) => setNewMajorItemName(e.target.value)} placeholder="大項目名" className="field"/>
                        <button onClick={handleAddMajorItem} disabled={!currentCertId} className="btn btn-indigo w-full">大項目を追加</button>
                        <select value={parentMajorItemId} onChange={(e) => setParentMajorItemId(e.target.value)} className="field mt-2">
                            <option value="">親となる大項目を選択...</option>
                            {Object.entries(data.progress[currentCertId]?.items || {}).map(([key, item]) => <option key={key} value={key}>{item.name}</option>)}
                        </select>
                        <input type="text" value={newMinorItemName} onChange={(e) => setNewMinorItemName(e.target.value)} placeholder="小項目名" className="field"/>
                        <button onClick={handleAddMinorItem} disabled={!parentMajorItemId} className="btn btn-seiji w-full">小項目を追加</button>
                    </div>
                </div>
            );

            const leftColumn = isDesktop ? (
                <div className="space-y-4">
                    <SectionCard eyebrow="Target" title="学習中の資格設定">{certSection}</SectionCard>
                    <SectionCard eyebrow="Checklist" title="学習項目アップロード/追加">{itemSection}</SectionCard>
                </div>
            ) : (
                <div className="space-y-3">
                    <Accordion title="学習中の資格設定" defaultOpen={!currentCertId}>{certSection}</Accordion>
                    <Accordion title="学習項目アップロード/追加">{itemSection}</Accordion>
                </div>
            );

            const items = data.progress[currentCertId]?.items || {};

            return (
                <div className="flex flex-col lg:flex-row gap-4 md:gap-5 fade-up">
                    <div className="w-full lg:w-[320px] xl:w-[360px] lg:flex-shrink-0">{leftColumn}</div>
                    <div className="w-full lg:flex-1">
                        <div className="glass p-4 md:p-6">
                            <div className="flex items-center justify-between mb-4 gap-3 flex-wrap">
                                <h3 className="font-display text-lg xl:text-xl font-bold">{data.certifications.find(c => c.id === currentCertId)?.name || '資格を選択してください'}</h3>
                                <span className="font-mono-data text-sm font-bold" style={{color: 'var(--kin)'}}>{progressPercent.toFixed(1)}%</span>
                            </div>
                            <div className="w-full h-2.5 rounded-full mb-5 overflow-hidden" style={{background: 'rgba(255,255,255,0.07)'}}>
                                <div className="h-full rounded-full transition-all duration-500" style={{ width: `${progressPercent}%`, background: 'linear-gradient(90deg, var(--shu), var(--kin))', boxShadow: '0 0 12px rgba(229,184,75,0.5)' }}></div>
                            </div>
                            <div className="max-h-[66vh] overflow-y-auto pr-2 xl:columns-2 xl:gap-3">
                                {Object.keys(items).length === 0 && (
                                    <div className="text-center py-10 text-sm" style={{color: 'var(--muted)'}}>学習項目がまだありません。<br/>左のパネルから追加してください。</div>
                                )}
                                {Object.entries(items).map(([majorKey, majorItem]) => {
                                    const subs = Object.values(majorItem.subItems || {});
                                    const done = subs.filter(s => s.checked).length;
                                    return (
                                        <div key={majorKey} className="glass-inset p-4 mb-3" style={{breakInside: 'avoid'}}>
                                            <div className="flex items-center justify-between mb-2">
                                                <h5 className="font-bold text-sm flex items-center gap-2">
                                                    {majorItem.checked && <span className="stamp" style={{width:'1.6rem',height:'1.6rem',fontSize:'.65rem'}}>完</span>}
                                                    {majorItem.name}
                                                </h5>
                                                <span className="font-mono-data text-[11px]" style={{color: 'var(--muted)'}}>{done}/{subs.length}</span>
                                            </div>
                                            <div className="pl-1 space-y-1.5">
                                                {Object.entries(majorItem.subItems || {}).map(([minorKey, minorItem]) => (
                                                    <label key={minorKey} className="flex items-center gap-2.5 cursor-pointer group">
                                                        <input type="checkbox" checked={minorItem.checked} onChange={() => handleProgressCheckbox(minorKey, majorKey)}
                                                            className="h-4 w-4 rounded cursor-pointer" style={{accentColor: 'var(--shu)'}} />
                                                        <span className={`text-sm transition-colors ${minorItem.checked ? 'line-through' : 'group-hover:text-white'}`}
                                                            style={{color: minorItem.checked ? 'var(--muted)' : undefined}}>{minorItem.name}</span>
                                                    </label>
                                                ))}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ============================================================
        //  タブ3: レポート
        // ============================================================
        const ReportTab = ({ data, currentCertId, progressPercent, daysRemaining, certName, totalStudyTime, viewDate, setViewDate, selectedDate, setSelectedDate, note, setNote, studyTime, setStudyTime, saveData, openModal, setIsAiReportModalOpen }) => {

            const handleSaveCalendarEntry = () => {
                if (!selectedDate) return;
                if (!currentCertId) {
                    openModal('エラー', '記録を保存するには、「進捗管理」タブで学習中の資格を選択してください。');
                    return;
                }
                const dateKey = selectedDate.toISOString().split('T')[0];
                const updatedCalendar = JSON.parse(JSON.stringify(data.calendar || {}));
                if (!updatedCalendar[dateKey]) updatedCalendar[dateKey] = {};
                if (!updatedCalendar[dateKey].studyLog) updatedCalendar[dateKey].studyLog = {};
                updatedCalendar[dateKey].note = note;
                updatedCalendar[dateKey].studyLog[currentCertId] = Number(studyTime) || 0;
                saveData({ ...data, calendar: updatedCalendar });
                openModal('保存完了', `${dateKey} の記録を保存しました。`);
            };

            const calendarDays = useMemo(() => {
                const year = viewDate.getFullYear();
                const month = viewDate.getMonth();
                const firstDayOfMonth = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const days = [];
                for (let i = 0; i < firstDayOfMonth; i++) days.push(null);
                for (let i = 1; i <= daysInMonth; i++) days.push(new Date(year, month, i));
                return days;
            }, [viewDate]);

            const savedReport = selectedDate && data.calendar?.[selectedDate.toISOString().split('T')[0]]?.report;

            return (
                <div className="space-y-4 md:space-y-5 fade-up">
                    <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4 md:gap-5">
                        <div className="glass lift p-6 flex flex-col items-center justify-center min-h-[180px]">
                            <div className="eyebrow mb-2">Countdown</div>
                            <div className="kpi-num text-5xl xl:text-6xl font-bold font-mono-data" style={{color: 'var(--indigo)'}}>
                                {daysRemaining !== null ? (daysRemaining >= 0 ? daysRemaining : '期限切れ') : '–'}
                            </div>
                            <div className="text-xs mt-3" style={{color: 'var(--muted)'}}>目標日までの日数</div>
                        </div>
                        <div className="glass lift p-6 flex flex-col items-center justify-center min-h-[180px]">
                            <div className="eyebrow mb-2">Study Time</div>
                            <div className="kpi-num text-5xl xl:text-6xl font-bold font-mono-data" style={{color: 'var(--seiji)'}}>
                                {totalStudyTime > 0 ? <span>{Math.floor(totalStudyTime / 60)}<span className="text-xl">h</span> {totalStudyTime % 60}<span className="text-xl">m</span></span> : '–'}
                            </div>
                            <div className="text-xs mt-3" style={{color: 'var(--muted)'}}>累計学習時間</div>
                        </div>
                        <div className="glass lift p-6 flex flex-col items-center justify-center min-h-[180px]">
                            <div className="w-28 h-28 xl:w-32 xl:h-32">
                                <ProgressDoughnutChart progressPercent={currentCertId ? progressPercent : 0} />
                            </div>
                            <div className="text-xs mt-3 text-center font-medium">{certName || '資格未選択'}</div>
                        </div>
                        <div className="glass lift p-6 flex flex-col justify-center text-center min-h-[180px]">
                            <div className="eyebrow mb-1">AI Report</div>
                            <h3 className="font-display font-bold mb-2">AIレポート</h3>
                            <p className="text-xs mb-4 leading-relaxed" style={{color: 'var(--muted)'}}>学習状況を分析し、パーソナライズされたレポートとアドバイスを生成します。</p>
                            <button onClick={() => setIsAiReportModalOpen(true)} className="btn btn-kin w-full mt-auto">AIレポートを開く</button>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 md:gap-5">
                        <div className="glass p-5 md:p-6">
                            <div className="flex justify-between items-center mb-4">
                                <button onClick={() => setViewDate(new Date(viewDate.getFullYear(), viewDate.getMonth() - 1, 1))} className="w-9 h-9 rounded-full hover:bg-white/10 transition-colors">‹</button>
                                <h3 className="font-display text-lg font-bold">{viewDate.getFullYear()}年 {viewDate.getMonth() + 1}月</h3>
                                <button onClick={() => setViewDate(new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 1))} className="w-9 h-9 rounded-full hover:bg-white/10 transition-colors">›</button>
                            </div>
                            <div className="grid grid-cols-7 gap-1 text-center text-[11px] mb-2" style={{color: 'var(--muted)'}}>
                                {['日', '月', '火', '水', '木', '金', '土'].map((d, i) => <div key={d} style={{color: i === 0 ? 'var(--shu)' : i === 6 ? 'var(--indigo)' : undefined}}>{d}</div>)}
                            </div>
                            <div className="grid grid-cols-7 gap-1">
                                {calendarDays.map((day, i) => {
                                    const hasEntry = day && data.calendar?.[day.toISOString().split('T')[0]];
                                    const isSelected = day && selectedDate && day.toDateString() === selectedDate.toDateString();
                                    const isToday = day && day.toDateString() === new Date().toDateString();
                                    return (
                                        <button key={i} onClick={() => day && setSelectedDate(day)}
                                            className={`day-cell w-full aspect-square rounded-lg flex items-center justify-center text-sm relative
                                                ${day ? 'hover:bg-white/10' : 'cursor-default'} ${isSelected ? 'day-selected' : ''}`}
                                            style={{
                                                background: isSelected ? undefined : hasEntry ? 'rgba(229,184,75,0.14)' : day ? 'rgba(255,255,255,0.03)' : 'transparent',
                                                border: isToday && !isSelected ? '1px solid var(--kin)' : '1px solid transparent'
                                            }}>
                                            {day?.getDate()}
                                            {hasEntry && !isSelected && <span className="absolute bottom-1 w-1 h-1 rounded-full" style={{background: 'var(--kin)'}}></span>}
                                        </button>
                                    );
                                })}
                            </div>
                        </div>
                        <div className="glass p-5 md:p-6">
                            <h3 className="font-display text-lg font-bold mb-4">
                                {selectedDate ? `${selectedDate.toLocaleDateString('ja-JP')} の記録` : '日付を選択してください'}
                            </h3>
                            <div className="space-y-4">
                                <div>
                                    <label className="text-xs mb-1.5 block font-medium" style={{color: 'var(--muted)'}}>学習時間(分)</label>
                                    <input type="number" value={studyTime} onChange={(e) => setStudyTime(e.target.value)}
                                        placeholder="例: 60" disabled={!selectedDate || !currentCertId} className="field" />
                                </div>
                                <div>
                                    <label className="text-xs mb-1.5 block font-medium" style={{color: 'var(--muted)'}}>メモ</label>
                                    <textarea value={note} onChange={(e) => setNote(e.target.value)}
                                        placeholder="その日の学習内容や気づきを記録..." disabled={!selectedDate} className="field h-28 resize-none"></textarea>
                                </div>
                            </div>
                            <button onClick={handleSaveCalendarEntry} disabled={!selectedDate || !currentCertId} className="btn btn-shu w-full mt-4">
                                {currentCertId ? 'この日の記録を保存' : '先に資格を選択'}
                            </button>
                            {savedReport && (
                                <div className="mt-4">
                                    <h4 className="font-bold text-sm mb-2">保存されたレポート</h4>
                                    <div className="glass-inset p-3 text-xs whitespace-pre-wrap max-h-32 overflow-y-auto leading-relaxed">{savedReport}</div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // ============================================================
        //  メインアプリケーション (ログイン不要 / localStorage 自動保存)
        // ============================================================
        const App = () => {
            const [data, setData] = useState(() => {
                try {
                    const saved = localStorage.getItem(STORAGE_KEY);
                    if (saved) {
                        const d = JSON.parse(saved);
                        return {
                            certifications: d.certifications || [],
                            progress: d.progress || {},
                            calendar: d.calendar || {}
                        };
                    }
                } catch (e) { console.error('データ読み込みエラー:', e); }
                return { certifications: [], progress: {}, calendar: {} };
            });

            const [currentTab, setCurrentTab] = useState('tab-1');
            const [editingCert, setEditingCert] = useState(null);
            const [currentCertId, setCurrentCertId] = useState(null);
            const [certForm, setCertForm] = useState({ name: '', difficulty: 3, necessity: 3, gai: 3 });
            const [filters, setFilters] = useState({ difficulty: { min: 1, max: 5 }, necessity: { min: 1, max: 5 }, gai: { min: 1, max: 5 } });
            const [newMajorItemName, setNewMajorItemName] = useState('');
            const [newMinorItemName, setNewMinorItemName] = useState('');
            const [parentMajorItemId, setParentMajorItemId] = useState('');
            const [loadingReport, setLoadingReport] = useState(false);
            const [report, setReport] = useState('');
            const [reporter, setReporter] = useState('熱血コーチ');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [modalContent, setModalContent] = useState({ title: '', body: '', onConfirm: null });
            const [isAiReportModalOpen, setIsAiReportModalOpen] = useState(false);
            const [viewDate, setViewDate] = useState(new Date());
            const [selectedDate, setSelectedDate] = useState(null);
            const [note, setNote] = useState('');
            const [studyTime, setStudyTime] = useState('');

            // --- データ保存 (localStorage) ---
            const saveData = useCallback((fullDataToSave) => {
                const next = {
                    certifications: fullDataToSave.certifications || [],
                    progress: fullDataToSave.progress || {},
                    calendar: fullDataToSave.calendar || {}
                };
                setData(next);
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
                } catch (err) {
                    console.error('保存エラー:', err);
                    openModal('データ保存エラー', `保存に失敗しました: ${err.message}`);
                }
            }, []);

            // --- モーダル制御 ---
            const openModal = (title, body, onConfirm = null) => {
                setModalContent({ title, body, onConfirm });
                setIsModalOpen(true);
            };
            const closeModal = () => setIsModalOpen(false);

            // --- フォームハンドラ ---
            const handleFormChange = (e) => {
                const { name, value } = e.target;
                setCertForm(prev => ({ ...prev, [name]: value }));
            };
            const handleAddUpdateCert = () => {
                if (!certForm.name.trim()) { openModal('入力エラー', '資格名を入力してください。'); return; }
                const newCert = { ...certForm, id: editingCert ? editingCert.id : uuidv4(), difficulty: Number(certForm.difficulty), necessity: Number(certForm.necessity), gai: Number(certForm.gai) };
                const updatedCerts = editingCert ? data.certifications.map(c => c.id === newCert.id ? newCert : c) : [...data.certifications, newCert];
                saveData({ ...data, certifications: updatedCerts });
                setEditingCert(null);
                setCertForm({ name: '', difficulty: 3, necessity: 3, gai: 3 });
            };
            useEffect(() => {
                if (editingCert) setCertForm(editingCert);
                else setCertForm({ name: '', difficulty: 3, necessity: 3, gai: 3 });
            }, [editingCert]);

            const handleDeleteCert = (id) => {
                openModal('確認', 'この資格情報を削除しますか?\n関連する進捗データもすべて削除されます。', () => {
                    const updatedCerts = data.certifications.filter(c => c.id !== id);
                    const updatedProgress = { ...data.progress };
                    delete updatedProgress[id];
                    saveData({ ...data, certifications: updatedCerts, progress: updatedProgress });
                    if (currentCertId === id) setCurrentCertId(null);
                    closeModal();
                });
            };
            const handleFilterChange = (filterName, type, value) => {
                setFilters(prev => {
                    const newFilter = { ...prev[filterName], [type]: Number(value) };
                    if (type === 'min' && newFilter.min > newFilter.max) newFilter.max = newFilter.min;
                    if (type === 'max' && newFilter.max < newFilter.min) newFilter.min = newFilter.max;
                    return { ...prev, [filterName]: newFilter };
                });
            };
            const handleCertFileUpload = (e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        let newCerts = [];
                        if (file.name.endsWith('.json')) { newCerts = JSON.parse(event.target.result).map(c => ({...c, id: c.id || uuidv4()})); }
                        else if (file.name.endsWith('.xlsx') || file.name.endsWith('.xls')) {
                            const wb = XLSX.read(event.target.result, { type: 'binary' });
                            const ws = wb.Sheets[wb.SheetNames[0]];
                            const jsonData = XLSX.utils.sheet_to_json(ws, { header: ['name', 'difficulty', 'necessity', 'gai'], range: 1 });
                            newCerts = jsonData.filter(c => c.name && !isNaN(c.difficulty) && !isNaN(c.necessity) && !isNaN(c.gai)).map(c => ({...c, id: uuidv4()}));
                        }
                        if (newCerts.length > 0) {
                            saveData({ ...data, certifications: newCerts });
                            openModal('成功', `${newCerts.length}件の資格情報をアップロードしました。`);
                        } else { openModal('エラー', '有効なデータが見つかりませんでした。'); }
                    } catch (error) { openModal('ファイル読み込みエラー', `エラー: ${error.message}`); }
                };
                if (file.name.endsWith('.json')) reader.readAsText(file);
                else reader.readAsBinaryString(file);
                e.target.value = null;
            };
            const handleProgressFileUpload = (e) => {
                const file = e.target.files[0]; if (!file) return;
                if (!currentCertId) { openModal("エラー", "先に学習中の資格を選択してください。"); e.target.value = null; return; }
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const workbook = XLSX.read(event.target.result, { type: 'binary' });
                        const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                        const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                        const items = {}; let currentMajorItemKey = null;
                        jsonData.forEach(row => {
                            const cellValue = row[0];
                            if (typeof cellValue === 'string' && cellValue.trim() !== '') {
                                const trimmedValue = cellValue.trim();
                                if (trimmedValue.startsWith('●')) {
                                    currentMajorItemKey = uuidv4();
                                    items[currentMajorItemKey] = { name: trimmedValue.substring(1).trim(), checked: false, type: 'major', subItems: {} };
                                } else if ((trimmedValue.startsWith('・') || trimmedValue.startsWith('-')) && currentMajorItemKey) {
                                    const subItemKey = uuidv4();
                                    items[currentMajorItemKey].subItems[subItemKey] = { name: trimmedValue.substring(1).trim(), checked: false, type: 'minor' };
                                }
                            }
                        });
                        const updatedProgress = JSON.parse(JSON.stringify(data.progress));
                        updatedProgress[currentCertId] = { ...(updatedProgress[currentCertId] || {}), items: items };
                        saveData({ ...data, progress: updatedProgress });
                        openModal('成功', '学習項目のアップロードが完了しました!');
                    } catch (error) { openModal('ファイル読み込みエラー', `エラー: ${error.message}`); }
                };
                reader.readAsBinaryString(file); e.target.value = null;
            };
            const handleProgressCheckbox = (minorId, majorId) => {
                const updatedProgress = JSON.parse(JSON.stringify(data.progress));
                const certProgress = updatedProgress[currentCertId];
                if (certProgress?.items?.[majorId]?.subItems?.[minorId]) {
                    certProgress.items[majorId].subItems[minorId].checked = !certProgress.items[majorId].subItems[minorId].checked;
                    certProgress.items[majorId].checked = Object.values(certProgress.items[majorId].subItems).every(item => item.checked);
                    saveData({ ...data, progress: updatedProgress });
                }
            };
            const handleAddMajorItem = () => {
                if (!currentCertId || !newMajorItemName.trim()) return;
                const updatedProgress = JSON.parse(JSON.stringify(data.progress));
                const currentCertProgress = updatedProgress[currentCertId] || { items: {} };
                currentCertProgress.items = currentCertProgress.items || {};
                currentCertProgress.items[uuidv4()] = { name: newMajorItemName.trim(), checked: false, type: 'major', subItems: {} };
                updatedProgress[currentCertId] = currentCertProgress;
                saveData({ ...data, progress: updatedProgress });
                setNewMajorItemName('');
            };
            const handleAddMinorItem = () => {
                if (!currentCertId || !newMinorItemName.trim() || !parentMajorItemId) return;
                const updatedProgress = JSON.parse(JSON.stringify(data.progress));
                const currentCertProgress = updatedProgress[currentCertId];
                if (currentCertProgress?.items?.[parentMajorItemId]) {
                    currentCertProgress.items[parentMajorItemId].subItems[uuidv4()] = { name: newMinorItemName.trim(), checked: false, type: 'minor' };
                    saveData({ ...data, progress: updatedProgress });
                    setNewMinorItemName('');
                }
            };

            const { progressPercent, daysRemaining, certName, totalTasks, completedTasks, totalStudyTime } = useMemo(() => {
                if (!currentCertId) return { progressPercent: 0, daysRemaining: null, certName: '', totalTasks: 0, completedTasks: 0, totalStudyTime: 0 };
                const progressData = data.progress[currentCertId];
                const certName = data.certifications.find(c => c.id === currentCertId)?.name || '';
                let total = 0, completed = 0;
                if (progressData && progressData.items) {
                    Object.values(progressData.items).forEach(major => {
                        const subItems = major.subItems || {};
                        total += Object.keys(subItems).length;
                        completed += Object.values(subItems).filter(s => s.checked).length;
                    });
                }
                const percent = total > 0 ? (completed / total) * 100 : 0;
                let remaining = null;
                if (progressData && progressData.targetDate) {
                    const target = new Date(progressData.targetDate);
                    const today = new Date();
                    today.setHours(0, 0, 0, 0);
                    remaining = Math.ceil((target - today) / (1000 * 60 * 60 * 24));
                }
                let cumulativeTime = 0;
                if (data.calendar) {
                    Object.values(data.calendar).forEach(dayData => {
                        if (dayData.studyLog && dayData.studyLog[currentCertId]) {
                            cumulativeTime += Number(dayData.studyLog[currentCertId]);
                        }
                    });
                }
                return { progressPercent: percent, daysRemaining: remaining, certName, totalTasks: total, completedTasks: completed, totalStudyTime: cumulativeTime };
            }, [currentCertId, data]);

            const comprehensiveData = useMemo(() => {
                const totalCerts = data.certifications.length;
                const inProgressCerts = Object.keys(data.progress);
                const details = inProgressCerts.map(certId => {
                    const cert = data.certifications.find(c => c.id === certId);
                    if (!cert) return null;
                    const progressData = data.progress[certId];
                    let total = 0, completed = 0;
                    if (progressData && progressData.items) {
                        Object.values(progressData.items).forEach(major => {
                            const subItems = major.subItems || {};
                            total += Object.keys(subItems).length;
                            completed += Object.values(subItems).filter(s => s.checked).length;
                        });
                    }
                    const percent = total > 0 ? (completed / total) * 100 : 0;
                    let remaining = null;
                    if (progressData && progressData.targetDate) {
                        const target = new Date(progressData.targetDate);
                        const today = new Date();
                        today.setHours(0, 0, 0, 0);
                        remaining = Math.ceil((target - today) / (1000 * 60 * 60 * 24));
                    }
                    let cumulativeTime = 0;
                    if (data.calendar) {
                        Object.values(data.calendar).forEach(dayData => {
                            if (dayData.studyLog && dayData.studyLog[certId]) cumulativeTime += Number(dayData.studyLog[certId]);
                        });
                    }
                    return { name: cert.name, progressPercent: percent, daysRemaining: remaining, totalStudyTime: cumulativeTime };
                }).filter(Boolean);
                return { totalCerts, inProgressCertsCount: inProgressCerts.length, details };
            }, [data]);

            // --- AIレポート生成 (Gemini API) ---
            const generateReportWithExponentialBackoff = async (payload, retries = 5, delay = 1000) => {
                const apiKey = "";
                const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-05-20:generateContent?key=${apiKey}`;
                for (let i = 0; i < retries; i++) {
                    try {
                        const response = await fetch(apiUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                        if (response.status === 429 || response.status >= 500) throw new Error(`API Error ${response.status}`);
                        if (!response.ok) {
                            const errorBody = await response.json();
                            console.error("API Error Body:", errorBody);
                            throw new Error(`APIエラー: ${response.status} ${response.statusText}`);
                        }
                        const result = await response.json();
                        const text = result?.candidates?.[0]?.content?.parts?.[0]?.text;
                        if (text) return text;
                        else throw new Error('レポートのテキストが取得できませんでした。');
                    } catch (err) {
                        if (i === retries - 1) throw err;
                        await new Promise(res => setTimeout(res, delay));
                        delay *= 2;
                    }
                }
            };

            const generateReport = async () => {
                setLoadingReport(true); setReport('');
                try {
                    if (!currentCertId) throw new Error('レポートを生成する資格を選択してください。');
                    const prompt = `あなたは「${reporter}」です。以下の学習状況を分析し、そのキャラクターになりきって学習者を力強く励ます評価と、具体的で実行可能な次のアクションを提案してください。レポートは情熱的かつ分かりやすく、markdown形式で記述してください。\n\n### 学習状況\n- **資格名**: ${certName}\n- **目標取得日までの残り日数**: ${daysRemaining !== null ? `${daysRemaining}日` : '未設定'}\n- **累計学習時間**: ${Math.floor(totalStudyTime / 60)}時間 ${totalStudyTime % 60}分\n- **総学習項目数**: ${totalTasks}\n- **完了項目数**: ${completedTasks}\n- **進捗率**: ${progressPercent.toFixed(1)}%`;
                    const text = await generateReportWithExponentialBackoff({ contents: [{ role: "user", parts: [{ text: prompt }] }] });
                    setReport(text);
                } catch (err) {
                    console.error("Report generation failed:", err);
                    openModal('レポート生成エラー', `エラーが発生しました: ${err.message}`);
                }
                setLoadingReport(false);
            };

            const generateComprehensiveReport = async () => {
                setLoadingReport(true); setReport('');
                try {
                    let detailsText = comprehensiveData.details.map(d =>
                        `- **資格名**: ${d.name}\n  - **進捗率**: ${d.progressPercent.toFixed(1)}%\n  - **累計学習時間**: ${Math.floor(d.totalStudyTime / 60)}時間 ${d.totalStudyTime % 60}分\n  - **目標日までの残り日数**: ${d.daysRemaining !== null ? `${d.daysRemaining}日` : '未設定'}`
                    ).join('\n');
                    if (!detailsText) detailsText = "学習中の資格はありません。";
                    const prompt = `あなたは「${reporter}」です。以下の学習状況全体を分析し、学習者を力強く励ます総合的な評価と、今後の学習戦略について具体的なアドバイスを提案してください。レポートは情熱的かつ分かりやすく、markdown形式で記述してください。\n\n### 全体状況\n- **総登録資格数**: ${comprehensiveData.totalCerts}\n- **学習中の資格数**: ${comprehensiveData.inProgressCertsCount}\n\n### 学習中資格の詳細\n${detailsText}`;
                    const text = await generateReportWithExponentialBackoff({ contents: [{ role: "user", parts: [{ text: prompt }] }] });
                    setReport(text);
                } catch (err) {
                    console.error("Comprehensive report generation failed:", err);
                    openModal('レポート生成エラー', `エラーが発生しました: ${err.message}`);
                }
                setLoadingReport(false);
            };

            const handlePdfExport = async () => {
                const reportElement = document.getElementById('report-content');
                if (!reportElement) return;
                openModal("PDF生成中", "レポートのPDFを生成しています...");
                try {
                    const canvas = await html2canvas(reportElement, { backgroundColor: '#0C1024' });
                    const imgData = canvas.toDataURL('image/png');
                    const pdf = new jsPDF('p', 'mm', 'a4');
                    const pdfWidth = pdf.internal.pageSize.getWidth();
                    const pdfHeight = pdf.internal.pageSize.getHeight();
                    const ratio = Math.min((pdfWidth - 20) / canvas.width, (pdfHeight - 20) / canvas.height);
                    const imgX = (pdfWidth - canvas.width * ratio) / 2;
                    pdf.addImage(imgData, 'PNG', imgX, 10, canvas.width * ratio, canvas.height * ratio);
                    pdf.save(`${certName || 'comprehensive'}_report_${new Date().toISOString().split('T')[0]}.pdf`);
                } catch (err) {
                    console.error("PDF Export Error: ", err);
                    openModal("PDF生成エラー", `PDFの生成に失敗しました: ${err.message}`);
                } finally {
                    closeModal();
                }
            };
            const handleSaveReportToCalendar = () => {
                if (!selectedDate || !report) return;
                const dateKey = selectedDate.toISOString().split('T')[0];
                const updatedCalendar = JSON.parse(JSON.stringify(data.calendar || {}));
                if (!updatedCalendar[dateKey]) updatedCalendar[dateKey] = {};
                updatedCalendar[dateKey].report = report;
                saveData({ ...data, calendar: updatedCalendar });
                openModal('保存完了', `${dateKey} にレポートを保存しました。`);
            };

            useEffect(() => {
                if (selectedDate && data.calendar) {
                    const dateKey = selectedDate.toISOString().split('T')[0];
                    const dayData = data.calendar[dateKey];
                    setNote(dayData?.note || '');
                    setStudyTime(dayData?.studyLog?.[currentCertId] || '');
                } else {
                    setNote('');
                    setStudyTime('');
                }
            }, [selectedDate, currentCertId, data.calendar]);

            return (
                <div className="max-w-[1800px] mx-auto min-h-screen px-3 md:px-8 py-3 md:py-5 relative">
                    {/* 汎用モーダル */}
                    {isModalOpen && <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-[60] p-4">
                        <div className="glass p-6 max-w-sm w-full animate-fade-in-scale" style={{background: 'rgba(17,22,46,0.95)'}}>
                            <h3 className="font-display text-lg font-bold mb-3">{modalContent.title}</h3>
                            <div className="text-sm mb-6 leading-relaxed" style={{whiteSpace: 'pre-wrap', color: 'var(--muted)'}}>{modalContent.body}</div>
                            <div className="flex justify-end gap-3">
                                {modalContent.onConfirm && <button onClick={() => { modalContent.onConfirm(); }} className="btn btn-shu">はい</button>}
                                <button onClick={closeModal} className="btn btn-ghost">{modalContent.onConfirm ? 'キャンセル' : '閉じる'}</button>
                            </div>
                        </div>
                    </div>}

                    <AIReportModal
                        isOpen={isAiReportModalOpen}
                        onClose={() => setIsAiReportModalOpen(false)}
                        reporter={reporter} setReporter={setReporter}
                        generateReport={generateReport} generateComprehensiveReport={generateComprehensiveReport}
                        loadingReport={loadingReport} report={report}
                        handlePdfExport={handlePdfExport} handleSaveReportToCalendar={handleSaveReportToCalendar}
                        selectedDate={selectedDate} currentCertId={currentCertId}
                    />

                    {/* ヘッダーバー: 左にブランド / 右にタブナビ */}
                    <header className="glass px-4 md:px-6 py-3 md:py-4 mb-5 md:mb-6 flex flex-col md:flex-row md:items-center gap-4">
                        <div className="flex items-center gap-4 md:flex-1 min-w-0">
                            <span className="stamp flex-shrink-0">資</span>
                            <div className="min-w-0">
                                <div className="eyebrow">Certification Dashboard</div>
                                <h1 className="font-display text-xl sm:text-2xl xl:text-3xl font-bold truncate">資格取得管理ダッシュボード</h1>
                            </div>
                        </div>
                        <div className="flex flex-col items-center md:items-end gap-2">
                            <nav className="glass-inset p-1.5 inline-flex gap-1" style={{borderRadius: '999px'}}>
                                {[{id: 'tab-1', label: '優先順位'}, {id: 'tab-2', label: '進捗管理'}, {id: 'tab-3', label: 'レポート'}].map(tab => (
                                    <button key={tab.id} onClick={() => setCurrentTab(tab.id)}
                                        className={`tab-btn ${currentTab === tab.id ? 'active' : ''}`}>
                                        {tab.label}
                                    </button>
                                ))}
                            </nav>
                            <p className="text-[11px]" style={{color: 'var(--muted)'}}>データはこのブラウザに自動保存されます</p>
                        </div>
                    </header>

                    <main className="pb-10">
                        {currentTab === 'tab-1' && <PrioritizationTab
                            data={data} filters={filters} handleFilterChange={handleFilterChange}
                            certForm={certForm} handleFormChange={handleFormChange} handleAddUpdateCert={handleAddUpdateCert}
                            editingCert={editingCert} setEditingCert={setEditingCert}
                            handleCertFileUpload={handleCertFileUpload} handleDeleteCert={handleDeleteCert}
                        />}
                        {currentTab === 'tab-2' && <ProgressTab
                            data={data} currentCertId={currentCertId} setCurrentCertId={setCurrentCertId}
                            saveData={saveData} handleProgressFileUpload={handleProgressFileUpload}
                            newMajorItemName={newMajorItemName} setNewMajorItemName={setNewMajorItemName}
                            handleAddMajorItem={handleAddMajorItem}
                            parentMajorItemId={parentMajorItemId} setParentMajorItemId={setParentMajorItemId}
                            newMinorItemName={newMinorItemName} setNewMinorItemName={setNewMinorItemName}
                            handleAddMinorItem={handleAddMinorItem} handleProgressCheckbox={handleProgressCheckbox}
                            progressPercent={progressPercent}
                        />}
                        {currentTab === 'tab-3' && <ReportTab
                            data={data} currentCertId={currentCertId} progressPercent={progressPercent}
                            daysRemaining={daysRemaining} certName={certName} totalStudyTime={totalStudyTime}
                            viewDate={viewDate} setViewDate={setViewDate}
                            selectedDate={selectedDate} setSelectedDate={setSelectedDate}
                            note={note} setNote={setNote} studyTime={studyTime} setStudyTime={setStudyTime}
                            saveData={saveData} openModal={openModal} setIsAiReportModalOpen={setIsAiReportModalOpen}
                        />}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
