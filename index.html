                            <button onClick={() => setIsAiReportModalOpen(true)} className="btn btn-kin w-full mt-auto">AIレポートを開く</button>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 md:gap-5">
                        <div className="glass p-5 md:p-6">
                            <div className="flex justify-between items-center mb-4">
                                <button onClick={() => setViewDate(new Date(viewDate.getFullYear(), viewDate.getMonth() - 1, 1))} className="w-9 h-9 rounded-full hover:bg-white/10 transition-colors">‹</button>
                                <h3 className="font-display text-lg font-bold">{viewDate.getFullYear()}年 {viewDate.getMonth() + 1}月</h3>
                                <button onClick={() => setViewDate(new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 1))} className="w-9 h-9 rounded-full hover:bg-white/10 transition-colors">›</button>
                            </div>
                            <div className="grid grid-cols-7 gap-1 text-center text-[11px] mb-2" style={{color: 'var(--muted)'}}>
                                {['日', '月', '火', '水', '木', '金', '土'].map((d, i) => <div key={d} style={{color: i === 0 ? 'var(--shu)' : i === 6 ? 'var(--indigo)' : undefined}}>{d}</div>)}
                            </div>
                            <div className="grid grid-cols-7 gap-1">
                                {calendarDays.map((day, i) => {
                                    const hasEntry = day && data.calendar?.[day.toISOString().split('T')[0]];
                                    const isSelected = day && selectedDate && day.toDateString() === selectedDate.toDateString();
                                    const isToday = day && day.toDateString() === new Date().toDateString();
                                    return (
                                        <button key={i} onClick={() => day && setSelectedDate(day)}
                                            className={`day-cell w-full aspect-square rounded-lg flex items-center justify-center text-sm relative
                                                ${day ? 'hover:bg-white/10' : 'cursor-default'} ${isSelected ? 'day-selected' : ''}`}
                                            style={{
                                                background: isSelected ? undefined : hasEntry ? 'rgba(229,184,75,0.14)' : day ? 'rgba(255,255,255,0.03)' : 'transparent',
                                                border: isToday && !isSelected ? '1px solid var(--kin)' : '1px solid transparent'
                                            }}>
                                            {day?.getDate()}
                                            {hasEntry && !isSelected && <span className="absolute bottom-1 w-1 h-1 rounded-full" style={{background: 'var(--kin)'}}></span>}
                                        </button>
                                    );
                                })}
                            </div>
                        </div>
                        <div className="glass p-5 md:p-6">
                            <h3 className="font-display text-lg font-bold mb-4">
                                {selectedDate ? `${selectedDate.toLocaleDateString('ja-JP')} の記録` : '日付を選択してください'}
                            </h3>
                            <div className="space-y-4">
                                <div>
                                    <label className="text-xs mb-1.5 block font-medium" style={{color: 'var(--muted)'}}>学習時間(分)</label>
                                    <input type="number" value={studyTime} onChange={(e) => setStudyTime(e.target.value)}
                                        placeholder="例: 60" disabled={!selectedDate || !currentCertId} className="field" />
                                </div>
                                <div>
                                    <label className="text-xs mb-1.5 block font-medium" style={{color: 'var(--muted)'}}>メモ</label>
                                    <textarea value={note} onChange={(e) => setNote(e.target.value)}
                                        placeholder="その日の学習内容や気づきを記録..." disabled={!selectedDate} className="field h-28 resize-none"></textarea>
                                </div>
                            </div>
                            <button onClick={handleSaveCalendarEntry} disabled={!selectedDate || !currentCertId} className="btn btn-shu w-full mt-4">
                                {currentCertId ? 'この日の記録を保存' : '先に資格を選択'}
                            </button>
                            {savedReport && (
                                <div className="mt-4">
                                    <h4 className="font-bold text-sm mb-2">保存されたレポート</h4>
                                    <div className="glass-inset p-3 text-xs whitespace-pre-wrap max-h-32 overflow-y-auto leading-relaxed">{savedReport}</div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // ============================================================
        //  メインアプリケーション (ログイン不要 / localStorage 自動保存)
        // ============================================================
        const App = () => {
            const [data, setData] = useState(() => {
                try {
                    const saved = localStorage.getItem(STORAGE_KEY);
                    if (saved) {
                        const d = JSON.parse(saved);
                        return {
                            certifications: d.certifications || [],
                            progress: d.progress || {},
                            calendar: d.calendar || {}
                        };
                    }
                } catch (e) { console.error('データ読み込みエラー:', e); }
                return { certifications: [], progress: {}, calendar: {} };
            });

            const [currentTab, setCurrentTab] = useState('tab-1');
            const [editingCert, setEditingCert] = useState(null);
            const [currentCertId, setCurrentCertId] = useState(null);
            const [certForm, setCertForm] = useState({ name: '', difficulty: 3, necessity: 3, gai: 3 });
            const [filters, setFilters] = useState({ difficulty: { min: 1, max: 5 }, necessity: { min: 1, max: 5 }, gai: { min: 1, max: 5 } });
            const [newMajorItemName, setNewMajorItemName] = useState('');
            const [newMinorItemName, setNewMinorItemName] = useState('');
            const [parentMajorItemId, setParentMajorItemId] = useState('');
            const [loadingReport, setLoadingReport] = useState(false);
            const [report, setReport] = useState('');
            const [reporter, setReporter] = useState('熱血コーチ');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [modalContent, setModalContent] = useState({ title: '', body: '', onConfirm: null });
            const [isAiReportModalOpen, setIsAiReportModalOpen] = useState(false);
            const [viewDate, setViewDate] = useState(new Date());
            const [selectedDate, setSelectedDate] = useState(null);
            const [note, setNote] = useState('');
            const [studyTime, setStudyTime] = useState('');

            // --- データ保存 (localStorage) ---
            const saveData = useCallback((fullDataToSave) => {
                const next = {
                    certifications: fullDataToSave.certifications || [],
                    progress: fullDataToSave.progress || {},
                    calendar: fullDataToSave.calendar || {}
                };
                setData(next);
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
                } catch (err) {
                    console.error('保存エラー:', err);
                    openModal('データ保存エラー', `保存に失敗しました: ${err.message}`);
                }
            }, []);

            // --- モーダル制御 ---
            const openModal = (title, body, onConfirm = null) => {
                setModalContent({ title, body, onConfirm });
                setIsModalOpen(true);
            };
            const closeModal = () => setIsModalOpen(false);

            // --- フォームハンドラ ---
            const handleFormChange = (e) => {
                const { name, value } = e.target;
                setCertForm(prev => ({ ...prev, [name]: value }));
            };
            const handleAddUpdateCert = () => {
                if (!certForm.name.trim()) { openModal('入力エラー', '資格名を入力してください。'); return; }
                const newCert = { ...certForm, id: editingCert ? editingCert.id : uuidv4(), difficulty: Number(certForm.difficulty), necessity: Number(certForm.necessity), gai: Number(certForm.gai) };
                const updatedCerts = editingCert ? data.certifications.map(c => c.id === newCert.id ? newCert : c) : [...data.certifications, newCert];
                saveData({ ...data, certifications: updatedCerts });
                setEditingCert(null);
                setCertForm({ name: '', difficulty: 3, necessity: 3, gai: 3 });
            };
            useEffect(() => {
                if (editingCert) setCertForm(editingCert);
                else setCertForm({ name: '', difficulty: 3, necessity: 3, gai: 3 });
            }, [editingCert]);

            const handleDeleteCert = (id) => {
                openModal('確認', 'この資格情報を削除しますか?\n関連する進捗データもすべて削除されます。', () => {
                    const updatedCerts = data.certifications.filter(c => c.id !== id);
                    const updatedProgress = { ...data.progress };
                    delete updatedProgress[id];
                    saveData({ ...data, certifications: updatedCerts, progress: updatedProgress });
                    if (currentCertId === id) setCurrentCertId(null);
                    closeModal();
                });
            };
            const handleFilterChange = (filterName, type, value) => {
                setFilters(prev => {
                    const newFilter = { ...prev[filterName], [type]: Number(value) };
                    if (type === 'min' && newFilter.min > newFilter.max) newFilter.max = newFilter.min;
                    if (type === 'max' && newFilter.max < newFilter.min) newFilter.min = newFilter.max;
                    return { ...prev, [filterName]: newFilter };
                });
            };
            const handleCertFileUpload = (e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        let newCerts = [];
                        if (file.name.endsWith('.json')) { newCerts = JSON.parse(event.target.result).map(c => ({...c, id: c.id || uuidv4()})); }
                        else if (file.name.endsWith('.xlsx') || file.name.endsWith('.xls')) {
                            const wb = XLSX.read(event.target.result, { type: 'binary' });
                            const ws = wb.Sheets[wb.SheetNames[0]];
                            const jsonData = XLSX.utils.sheet_to_json(ws, { header: ['name', 'difficulty', 'necessity', 'gai'], range: 1 });
                            newCerts = jsonData.filter(c => c.name && !isNaN(c.difficulty) && !isNaN(c.necessity) && !isNaN(c.gai)).map(c => ({...c, id: uuidv4()}));
                        }
                        if (newCerts.length > 0) {
                            saveData({ ...data, certifications: newCerts });
                            openModal('成功', `${newCerts.length}件の資格情報をアップロードしました。`);
                        } else { openModal('エラー', '有効なデータが見つかりませんでした。'); }
                    } catch (error) { openModal('ファイル読み込みエラー', `エラー: ${error.message}`); }
                };
                if (file.name.endsWith('.json')) reader.readAsText(file);
                else reader.readAsBinaryString(file);
                e.target.value = null;
            };
            const handleProgressFileUpload = (e) => {
                const file = e.target.files[0]; if (!file) return;
                if (!currentCertId) { openModal("エラー", "先に学習中の資格を選択してください。"); e.target.value = null; return; }
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const workbook = XLSX.read(event.target.result, { type: 'binary' });
                        const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                        const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                        const items = {}; let currentMajorItemKey = null;
                        jsonData.forEach(row => {
                            const cellValue = row[0];
                            if (typeof cellValue === 'string' && cellValue.trim() !== '') {
                                const trimmedValue = cellValue.trim();
                                if (trimmedValue.startsWith('●')) {
                                    currentMajorItemKey = uuidv4();
                                    items[currentMajorItemKey] = { name: trimmedValue.substring(1).trim(), checked: false, type: 'major', subItems: {} };
                                } else if ((trimmedValue.startsWith('・') || trimmedValue.startsWith('-')) && currentMajorItemKey) {
                                    const subItemKey = uuidv4();
                                    items[currentMajorItemKey].subItems[subItemKey] = { name: trimmedValue.substring(1).trim(), checked: false, type: 'minor' };
                                }
                            }
                        });
                        const updatedProgress = JSON.parse(JSON.stringify(data.progress));
                        updatedProgress[currentCertId] = { ...(updatedProgress[currentCertId] || {}), items: items };
                        saveData({ ...data, progress: updatedProgress });
                        openModal('成功', '学習項目のアップロードが完了しました!');
                    } catch (error) { openModal('ファイル読み込みエラー', `エラー: ${error.message}`); }
                };
                reader.readAsBinaryString(file); e.target.value = null;
            };
            const handleProgressCheckbox = (minorId, majorId) => {
                const updatedProgress = JSON.parse(JSON.stringify(data.progress));
                const certProgress = updatedProgress[currentCertId];
                if (certProgress?.items?.[majorId]?.subItems?.[minorId]) {
                    certProgress.items[majorId].subItems[minorId].checked = !certProgress.items[majorId].subItems[minorId].checked;
                    certProgress.items[majorId].checked = Object.values(certProgress.items[majorId].subItems).every(item => item.checked);
                    saveData({ ...data, progress: updatedProgress });
                }
            };
            const handleAddMajorItem = () => {
                if (!currentCertId || !newMajorItemName.trim()) return;
                const updatedProgress = JSON.parse(JSON.stringify(data.progress));
                const currentCertProgress = updatedProgress[currentCertId] || { items: {} };
                currentCertProgress.items = currentCertProgress.items || {};
                currentCertProgress.items[uuidv4()] = { name: newMajorItemName.trim(), checked: false, type: 'major', subItems: {} };
                updatedProgress[currentCertId] = currentCertProgress;
                saveData({ ...data, progress: updatedProgress });
                setNewMajorItemName('');
            };
            const handleAddMinorItem = () => {
                if (!currentCertId || !newMinorItemName.trim() || !parentMajorItemId) return;
                const updatedProgress = JSON.parse(JSON.stringify(data.progress));
                const currentCertProgress = updatedProgress[currentCertId];
                if (currentCertProgress?.items?.[parentMajorItemId]) {
                    currentCertProgress.items[parentMajorItemId].subItems[uuidv4()] = { name: newMinorItemName.trim(), checked: false, type: 'minor' };
                    saveData({ ...data, progress: updatedProgress });
                    setNewMinorItemName('');
                }
            };

            const { progressPercent, daysRemaining, certName, totalTasks, completedTasks, totalStudyTime } = useMemo(() => {
                if (!currentCertId) return { progressPercent: 0, daysRemaining: null, certName: '', totalTasks: 0, completedTasks: 0, totalStudyTime: 0 };
                const progressData = data.progress[currentCertId];
                const certName = data.certifications.find(c => c.id === currentCertId)?.name || '';
                let total = 0, completed = 0;
                if (progressData && progressData.items) {
                    Object.values(progressData.items).forEach(major => {
                        const subItems = major.subItems || {};
                        total += Object.keys(subItems).length;
                        completed += Object.values(subItems).filter(s => s.checked).length;
                    });
                }
                const percent = total > 0 ? (completed / total) * 100 : 0;
                let remaining = null;
                if (progressData && progressData.targetDate) {
                    const target = new Date(progressData.targetDate);
                    const today = new Date();
                    today.setHours(0, 0, 0, 0);
                    remaining = Math.ceil((target - today) / (1000 * 60 * 60 * 24));
                }
                let cumulativeTime = 0;
                if (data.calendar) {
                    Object.values(data.calendar).forEach(dayData => {
                        if (dayData.studyLog && dayData.studyLog[currentCertId]) {
                            cumulativeTime += Number(dayData.studyLog[currentCertId]);
                        }
                    });
                }
                return { progressPercent: percent, daysRemaining: remaining, certName, totalTasks: total, completedTasks: completed, totalStudyTime: cumulativeTime };
            }, [currentCertId, data]);

            const comprehensiveData = useMemo(() => {
                const totalCerts = data.certifications.length;
                const inProgressCerts = Object.keys(data.progress);
                const details = inProgressCerts.map(certId => {
                    const cert = data.certifications.find(c => c.id === certId);
                    if (!cert) return null;
                    const progressData = data.progress[certId];
                    let total = 0, completed = 0;
                    if (progressData && progressData.items) {
                        Object.values(progressData.items).forEach(major => {
                            const subItems = major.subItems || {};
                            total += Object.keys(subItems).length;
                            completed += Object.values(subItems).filter(s => s.checked).length;
                        });
                    }
                    const percent = total > 0 ? (completed / total) * 100 : 0;
                    let remaining = null;
                    if (progressData && progressData.targetDate) {
                        const target = new Date(progressData.targetDate);
                        const today = new Date();
                        today.setHours(0, 0, 0, 0);
                        remaining = Math.ceil((target - today) / (1000 * 60 * 60 * 24));
                    }
                    let cumulativeTime = 0;
                    if (data.calendar) {
                        Object.values(data.calendar).forEach(dayData => {
                            if (dayData.studyLog && dayData.studyLog[certId]) cumulativeTime += Number(dayData.studyLog[certId]);
                        });
                    }
                    return { name: cert.name, progressPercent: percent, daysRemaining: remaining, totalStudyTime: cumulativeTime };
                }).filter(Boolean);
                return { totalCerts, inProgressCertsCount: inProgressCerts.length, details };
            }, [data]);

            // --- AIレポート生成 (Gemini API) ---
            const generateReportWithExponentialBackoff = async (payload, retries = 5, delay = 1000) => {
                const apiKey = "";
                const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-05-20:generateContent?key=${apiKey}`;
                for (let i = 0; i < retries; i++) {
                    try {
                        const response = await fetch(apiUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                        if (response.status === 429 || response.status >= 500) throw new Error(`API Error ${response.status}`);
                        if (!response.ok) {
                            const errorBody = await response.json();
                            console.error("API Error Body:", errorBody);
                            throw new Error(`APIエラー: ${response.status} ${response.statusText}`);
                        }
                        const result = await response.json();
                        const text = result?.candidates?.[0]?.content?.parts?.[0]?.text;
                        if (text) return text;
                        else throw new Error('レポートのテキストが取得できませんでした。');
                    } catch (err) {
                        if (i === retries - 1) throw err;
                        await new Promise(res => setTimeout(res, delay));
                        delay *= 2;
                    }
                }
            };

            const generateReport = async () => {
                setLoadingReport(true); setReport('');
                try {
                    if (!currentCertId) throw new Error('レポートを生成する資格を選択してください。');
                    const prompt = `あなたは「${reporter}」です。以下の学習状況を分析し、そのキャラクターになりきって学習者を力強く励ます評価と、具体的で実行可能な次のアクションを提案してください。レポートは情熱的かつ分かりやすく、markdown形式で記述してください。\n\n### 学習状況\n- **資格名**: ${certName}\n- **目標取得日までの残り日数**: ${daysRemaining !== null ? `${daysRemaining}日` : '未設定'}\n- **累計学習時間**: ${Math.floor(totalStudyTime / 60)}時間 ${totalStudyTime % 60}分\n- **総学習項目数**: ${totalTasks}\n- **完了項目数**: ${completedTasks}\n- **進捗率**: ${progressPercent.toFixed(1)}%`;
                    const text = await generateReportWithExponentialBackoff({ contents: [{ role: "user", parts: [{ text: prompt }] }] });
                    setReport(text);
                } catch (err) {
                    console.error("Report generation failed:", err);
                    openModal('レポート生成エラー', `エラーが発生しました: ${err.message}`);
                }
                setLoadingReport(false);
            };

            const generateComprehensiveReport = async () => {
                setLoadingReport(true); setReport('');
                try {
                    let detailsText = comprehensiveData.details.map(d =>
                        `- **資格名**: ${d.name}\n  - **進捗率**: ${d.progressPercent.toFixed(1)}%\n  - **累計学習時間**: ${Math.floor(d.totalStudyTime / 60)}時間 ${d.totalStudyTime % 60}分\n  - **目標日までの残り日数**: ${d.daysRemaining !== null ? `${d.daysRemaining}日` : '未設定'}`
                    ).join('\n');
                    if (!detailsText) detailsText = "学習中の資格はありません。";
                    const prompt = `あなたは「${reporter}」です。以下の学習状況全体を分析し、学習者を力強く励ます総合的な評価と、今後の学習戦略について具体的なアドバイスを提案してください。レポートは情熱的かつ分かりやすく、markdown形式で記述してください。\n\n### 全体状況\n- **総登録資格数**: ${comprehensiveData.totalCerts}\n- **学習中の資格数**: ${comprehensiveData.inProgressCertsCount}\n\n### 学習中資格の詳細\n${detailsText}`;
                    const text = await generateReportWithExponentialBackoff({ contents: [{ role: "user", parts: [{ text: prompt }] }] });
                    setReport(text);
                } catch (err) {
                    console.error("Comprehensive report generation failed:", err);
                    openModal('レポート生成エラー', `エラーが発生しました: ${err.message}`);
                }
                setLoadingReport(false);
            };

            const handlePdfExport = async () => {
                const reportElement = document.getElementById('report-content');
                if (!reportElement) return;
                openModal("PDF生成中", "レポートのPDFを生成しています...");
                try {
                    const canvas = await html2canvas(reportElement, { backgroundColor: '#0C1024' });
                    const imgData = canvas.toDataURL('image/png');
                    const pdf = new jsPDF('p', 'mm', 'a4');
                    const pdfWidth = pdf.internal.pageSize.getWidth();
                    const pdfHeight = pdf.internal.pageSize.getHeight();
                    const ratio = Math.min((pdfWidth - 20) / canvas.width, (pdfHeight - 20) / canvas.height);
                    const imgX = (pdfWidth - canvas.width * ratio) / 2;
                    pdf.addImage(imgData, 'PNG', imgX, 10, canvas.width * ratio, canvas.height * ratio);
                    pdf.save(`${certName || 'comprehensive'}_report_${new Date().toISOString().split('T')[0]}.pdf`);
                } catch (err) {
                    console.error("PDF Export Error: ", err);
                    openModal("PDF生成エラー", `PDFの生成に失敗しました: ${err.message}`);
                } finally {
                    closeModal();
                }
            };
            const handleSaveReportToCalendar = () => {
                if (!selectedDate || !report) return;
                const dateKey = selectedDate.toISOString().split('T')[0];
                const updatedCalendar = JSON.parse(JSON.stringify(data.calendar || {}));
                if (!updatedCalendar[dateKey]) updatedCalendar[dateKey] = {};
                updatedCalendar[dateKey].report = report;
                saveData({ ...data, calendar: updatedCalendar });
                openModal('保存完了', `${dateKey} にレポートを保存しました。`);
            };

            useEffect(() => {
                if (selectedDate && data.calendar) {
                    const dateKey = selectedDate.toISOString().split('T')[0];
                    const dayData = data.calendar[dateKey];
                    setNote(dayData?.note || '');
                    setStudyTime(dayData?.studyLog?.[currentCertId] || '');
                } else {
                    setNote('');
                    setStudyTime('');
                }
            }, [selectedDate, currentCertId, data.calendar]);

            return (
                <div className="max-w-[1800px] mx-auto min-h-screen px-3 md:px-8 py-3 md:py-5 relative">
                    {/* 汎用モーダル */}
                    {isModalOpen && <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-[60] p-4">
                        <div className="glass p-6 max-w-sm w-full animate-fade-in-scale" style={{background: 'rgba(17,22,46,0.95)'}}>
                            <h3 className="font-display text-lg font-bold mb-3">{modalContent.title}</h3>
                            <div className="text-sm mb-6 leading-relaxed" style={{whiteSpace: 'pre-wrap', color: 'var(--muted)'}}>{modalContent.body}</div>
                            <div className="flex justify-end gap-3">
                                {modalContent.onConfirm && <button onClick={() => { modalContent.onConfirm(); }} className="btn btn-shu">はい</button>}
                                <button onClick={closeModal} className="btn btn-ghost">{modalContent.onConfirm ? 'キャンセル' : '閉じる'}</button>
                            </div>
                        </div>
                    </div>}

                    <AIReportModal
                        isOpen={isAiReportModalOpen}
                        onClose={() => setIsAiReportModalOpen(false)}
                        reporter={reporter} setReporter={setReporter}
                        generateReport={generateReport} generateComprehensiveReport={generateComprehensiveReport}
                        loadingReport={loadingReport} report={report}
                        handlePdfExport={handlePdfExport} handleSaveReportToCalendar={handleSaveReportToCalendar}
                        selectedDate={selectedDate} currentCertId={currentCertId}
                    />

                    {/* ヘッダーバー: 左にブランド / 右にタブナビ */}
                    <header className="glass px-4 md:px-6 py-3 md:py-4 mb-5 md:mb-6 flex flex-col md:flex-row md:items-center gap-4">
                        <div className="flex items-center gap-4 md:flex-1 min-w-0">
                            <span className="stamp flex-shrink-0">資</span>
                            <div className="min-w-0">
                                <div className="eyebrow">Certification Dashboard</div>
                                <h1 className="font-display text-xl sm:text-2xl xl:text-3xl font-bold truncate">資格取得管理ダッシュボード</h1>
                            </div>
                        </div>
                        <div className="flex flex-col items-center md:items-end gap-2">
                            <nav className="glass-inset p-1.5 inline-flex gap-1" style={{borderRadius: '999px'}}>
                                {[{id: 'tab-1', label: '優先順位'}, {id: 'tab-2', label: '進捗管理'}, {id: 'tab-3', label: 'レポート'}].map(tab => (
                                    <button key={tab.id} onClick={() => setCurrentTab(tab.id)}
                                        className={`tab-btn ${currentTab === tab.id ? 'active' : ''}`}>
                                        {tab.label}
                                    </button>
                                ))}
                            </nav>
                            <p className="text-[11px]" style={{color: 'var(--muted)'}}>データはこのブラウザに自動保存されます</p>
                        </div>
                    </header>

                    <main className="pb-10">
                        {currentTab === 'tab-1' && <PrioritizationTab
                            data={data} filters={filters} handleFilterChange={handleFilterChange}
                            certForm={certForm} handleFormChange={handleFormChange} handleAddUpdateCert={handleAddUpdateCert}
                            editingCert={editingCert} setEditingCert={setEditingCert}
                            handleCertFileUpload={handleCertFileUpload} handleDeleteCert={handleDeleteCert}
                        />}
                        {currentTab === 'tab-2' && <ProgressTab
                            data={data} currentCertId={currentCertId} setCurrentCertId={setCurrentCertId}
                            saveData={saveData} handleProgressFileUpload={handleProgressFileUpload}
                            newMajorItemName={newMajorItemName} setNewMajorItemName={setNewMajorItemName}
                            handleAddMajorItem={handleAddMajorItem}
                            parentMajorItemId={parentMajorItemId} setParentMajorItemId={setParentMajorItemId}
                            newMinorItemName={newMinorItemName} setNewMinorItemName={setNewMinorItemName}
                            handleAddMinorItem={handleAddMinorItem} handleProgressCheckbox={handleProgressCheckbox}
                            progressPercent={progressPercent}
                        />}
                        {currentTab === 'tab-3' && <ReportTab
                            data={data} currentCertId={currentCertId} progressPercent={progressPercent}
                            daysRemaining={daysRemaining} certName={certName} totalStudyTime={totalStudyTime}
                            viewDate={viewDate} setViewDate={setViewDate}
                            selectedDate={selectedDate} setSelectedDate={setSelectedDate}
                            note={note} setNote={setNote} studyTime={studyTime} setStudyTime={setStudyTime}
                            saveData={saveData} openModal={openModal} setIsAiReportModalOpen={setIsAiReportModalOpen}
                        />}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
