<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>資格取得管理ダッシュボード</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0C1024;
            --bg-2: #11162e;
            --surface: rgba(255, 255, 255, 0.045);
            --surface-2: rgba(255, 255, 255, 0.08);
            --line: rgba(255, 255, 255, 0.09);
            --ink: #EDEFF8;
            --muted: #8b93b8;
            --shu: #E85B3F;          /* 朱 */
            --shu-deep: #C43F27;
            --kin: #E5B84B;          /* 金 */
            --seiji: #55C6B5;        /* 青磁 */
            --indigo: #6C7BFF;
        }
        html, body { background: var(--bg); color: var(--ink); }
        body {
            font-family: 'Zen Kaku Gothic New', sans-serif;
            background:
                radial-gradient(1100px 600px at 85% -10%, rgba(108,123,255,0.13), transparent 60%),
                radial-gradient(900px 500px at -10% 100%, rgba(232,91,63,0.08), transparent 55%),
                var(--bg);
            background-attachment: fixed;
        }
        /* ページ全体にうっすら星を散らす */
        body::before {
            content: ""; position: fixed; inset: 0; z-index: -1; pointer-events: none;
            background-image:
                radial-gradient(1px 1px at 12% 22%, rgba(255,255,255,.55), transparent 100%),
                radial-gradient(1px 1px at 78% 12%, rgba(255,255,255,.4), transparent 100%),
                radial-gradient(1.5px 1.5px at 55% 45%, rgba(180,195,255,.45), transparent 100%),
                radial-gradient(1px 1px at 32% 72%, rgba(255,255,255,.3), transparent 100%),
                radial-gradient(1px 1px at 90% 62%, rgba(255,220,190,.35), transparent 100%),
                radial-gradient(1.5px 1.5px at 8% 88%, rgba(255,255,255,.3), transparent 100%),
                radial-gradient(1px 1px at 66% 86%, rgba(180,195,255,.35), transparent 100%),
                radial-gradient(1px 1px at 44% 8%, rgba(255,255,255,.4), transparent 100%);
        }
        .font-display { font-family: 'Shippori Mincho', serif; letter-spacing: 0.04em; }
        .font-mono-data { font-family: 'IBM Plex Mono', monospace; font-variant-numeric: tabular-nums; }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.14); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.24); }

        .glass {
            background: linear-gradient(160deg, rgba(255,255,255,0.06), rgba(255,255,255,0.025));
            border: 1px solid var(--line);
            border-radius: 20px;
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            box-shadow: 0 12px 40px -18px rgba(0,0,0,0.6);
        }
        .lift { transition: transform .25s ease, border-color .25s ease, box-shadow .25s ease; }
        .lift:hover {
            transform: translateY(-3px);
            border-color: rgba(255,255,255,0.18);
            box-shadow: 0 20px 50px -18px rgba(0,0,0,0.75);
        }
        .glass-inset {
            background: rgba(0,0,0,0.25);
            border: 1px solid var(--line);
            border-radius: 14px;
        }
        /* 3Dビュー用: 深宇宙の背景 */
        .space-bg {
            background:
                radial-gradient(ellipse 90% 70% at 50% 38%, rgba(40,50,110,0.55), transparent 70%),
                radial-gradient(ellipse 60% 45% at 78% 80%, rgba(120,45,60,0.22), transparent 70%),
                radial-gradient(ellipse 100% 100% at 50% 50%, #0a0d20 0%, #05060f 100%);
            border-radius: 14px;
        }
        /* 3Dビュー用: 真夏の昼、荒廃した要塞都市の空 */
        .city-bg {
            background:
                radial-gradient(ellipse 45% 32% at 62% 10%, rgba(255,255,255,0.9), rgba(255,255,255,0.25) 55%, transparent 75%),
                linear-gradient(180deg,
                    #5d9bd6 0%,
                    #7fb3e2 26%,
                    #a9cdea 48%,
                    #d6e6ee 68%,
                    #ece7d2 84%,
                    #ddd3ae 100%);
            border-radius: 14px;
        }
        .scene-toggle {
            display: inline-flex; gap: 2px; padding: 3px;
            background: rgba(0,0,0,0.35); border: 1px solid var(--line); border-radius: 999px;
        }
        .scene-toggle button {
            padding: .3rem .85rem; border-radius: 999px; font-size: .75rem; font-weight: 700;
            color: var(--muted); transition: color .2s, background .2s, box-shadow .2s;
            white-space: nowrap;
        }
        .scene-toggle button:hover { color: var(--ink); }
        .scene-toggle button.active-space {
            color: #fff; background: linear-gradient(135deg, #4A57D8, #2c3aa8);
            box-shadow: 0 4px 14px -4px rgba(108,123,255,0.6);
        }
        .scene-toggle button.active-city {
            color: #0d2038; background: linear-gradient(135deg, #cfe6f5, #7fb3e2);
            box-shadow: 0 4px 14px -4px rgba(127,179,226,0.7);
        }
        .kpi-num { text-shadow: 0 0 24px currentColor; }

        .field {
            width: 100%;
            background: rgba(0,0,0,0.28);
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 0.55rem 0.8rem;
            color: var(--ink);
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }
        .field:focus { border-color: var(--shu); box-shadow: 0 0 0 3px rgba(232,91,63,0.18); }
        .field::placeholder { color: #5b628a; }
        .field:disabled { opacity: .45; cursor: not-allowed; }
        select.field option { background: var(--bg-2); }
        input[type="date"].field::-webkit-calendar-picker-indicator { filter: invert(0.8); }

        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: .5rem;
            font-weight: 700; border-radius: 12px; padding: .6rem 1.1rem;
            transition: transform .15s ease, box-shadow .2s ease, background .2s ease, opacity .2s;
            border: 1px solid transparent; cursor: pointer;
        }
        .btn:active { transform: translateY(1px) scale(0.99); }
        .btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
        .btn-shu {
            background: linear-gradient(135deg, var(--shu), var(--shu-deep));
            color: #fff; box-shadow: 0 6px 20px -6px rgba(232,91,63,0.55);
        }
        .btn-shu:hover:not(:disabled) { box-shadow: 0 8px 26px -6px rgba(232,91,63,0.75); }
        .btn-ghost { background: var(--surface-2); color: var(--ink); border-color: var(--line); }
        .btn-ghost:hover:not(:disabled) { background: rgba(255,255,255,0.13); }
        .btn-seiji { background: linear-gradient(135deg, #4FBFAE, #2E8F81); color: #fff; box-shadow: 0 6px 20px -6px rgba(85,198,181,0.45); }
        .btn-indigo { background: linear-gradient(135deg, #6C7BFF, #4A57D8); color: #fff; box-shadow: 0 6px 20px -6px rgba(108,123,255,0.5); }
        .btn-kin { background: linear-gradient(135deg, #E5B84B, #C1932E); color: #221a05; }

        .eyebrow {
            font-size: .68rem; letter-spacing: .22em; text-transform: uppercase;
            color: var(--muted); font-weight: 700;
        }

        .tab-btn {
            position: relative; padding: .7rem 1.15rem; border-radius: 999px;
            font-weight: 700; color: var(--muted); transition: color .2s, background .2s;
            font-size: .92rem; white-space: nowrap;
        }
        .tab-btn:hover { color: var(--ink); }
        .tab-btn.active { color: #fff; background: linear-gradient(135deg, var(--shu), var(--shu-deep)); box-shadow: 0 6px 18px -6px rgba(232,91,63,0.6); }

        .file-input::file-selector-button {
            margin-right: 1rem; padding: .5rem 1rem; border-radius: 999px; border: 1px solid var(--line);
            background: var(--surface-2); color: var(--ink); font-weight: 700; font-size: .8rem; cursor: pointer;
            transition: background .2s;
        }
        .file-input::file-selector-button:hover { background: rgba(255,255,255,0.14); }

        input[type=range] { -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.15); outline: none; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none; width: 16px; height: 16px; border-radius: 50%;
            background: var(--kin); border: 2px solid var(--bg); box-shadow: 0 0 0 2px rgba(229,184,75,0.4); cursor: pointer;
        }
        input[type=range]::-moz-range-thumb {
            width: 16px; height: 16px; border-radius: 50%;
            background: var(--kin); border: 2px solid var(--bg); box-shadow: 0 0 0 2px rgba(229,184,75,0.4); cursor: pointer;
        }

        .day-cell { transition: background .15s, color .15s, box-shadow .15s; }
        .day-selected {
            background: linear-gradient(135deg, var(--shu), var(--shu-deep)) !important;
            color: white !important; box-shadow: 0 4px 14px -4px rgba(232,91,63,0.7);
        }

        @keyframes fade-in-scale { from { transform: scale(0.96) translateY(6px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
        .animate-fade-in-scale { animation: fade-in-scale 0.28s cubic-bezier(.2,.9,.3,1.2) forwards; }
        @keyframes fade-up { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-up { animation: fade-up .45s ease both; }
        @media (prefers-reduced-motion: reduce) {
            .animate-fade-in-scale, .fade-up { animation: none; }
            * { transition-duration: 0.01ms !important; }
        }

        .accordion-content { transition: max-height 0.3s ease-out; max-height: 0; overflow: hidden; }
        .accordion-content.open { max-height: 1200px; }

        canvas { display: block; }
        .g3d-tooltip {
            position: absolute; pointer-events: none; z-index: 20;
            background: rgba(10, 13, 30, 0.92); border: 1px solid var(--line); border-radius: 10px;
            padding: .5rem .75rem; font-size: .8rem; line-height: 1.5;
            transform: translate(-50%, calc(-100% - 14px));
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.8);
            white-space: nowrap; opacity: 0; transition: opacity .12s;
        }
        .g3d-tooltip.show { opacity: 1; }

        .stamp {
            display: inline-flex; align-items: center; justify-content: center;
            width: 2.1rem; height: 2.1rem; border-radius: 8px;
            border: 2px solid var(--shu); color: var(--shu);
            font-family: 'Shippori Mincho', serif; font-weight: 800; font-size: 1rem;
            transform: rotate(-6deg);
        }
    </style>
</head>
<body>
    <div id="root" class="min-h-screen"></div>

    <!-- ライブラリ -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/uuid/8.3.2/uuidv4.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo, useRef } = React;
        const { uuidv4, XLSX, Chart } = window;
        const { jsPDF } = window.jspdf;

        const STORAGE_KEY = 'shikaku-dashboard-v2';

        // --- Hooks ---
        const useMediaQuery = (query) => {
            const [matches, setMatches] = useState(() => window.matchMedia(query).matches);
            useEffect(() => {
                const media = window.matchMedia(query);
                const listener = () => setMatches(media.matches);
                media.addEventListener('change', listener);
                return () => media.removeEventListener('change', listener);
            }, [query]);
            return matches;
        };

        // ============================================================
        //  3D 立体バブルチャート (Three.js)
        //  X=難易度 / Y=必要性 / Z=やりがい, 球の大きさ=やりがい
        //  テーマ: space(宇宙) / city(黄昏の都市)
        // ============================================================
        const Bubble3DChart = ({ data, theme = 'space' }) => {
            const mountRef = useRef(null);
            const tooltipRef = useRef(null);
            const stateRef = useRef(null);

            // --- 初期化(1回のみ): カメラ・立方体・操作系 ---
            useEffect(() => {
                const mount = mountRef.current;
                if (!mount || typeof THREE === 'undefined') return;

                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
                camera.position.set(0, 5, 16);

                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                mount.appendChild(renderer.domElement);

                // 基本ライティング
                scene.add(new THREE.AmbientLight(0xffffff, 0.55));
                const key = new THREE.DirectionalLight(0xffffff, 0.9);
                key.position.set(6, 10, 8);
                scene.add(key);

                // テーマ環境を入れるグループ(切替時に丸ごと差し替え)
                const envGroup = new THREE.Group();
                scene.add(envGroup);

                // 全体を回すグループ
                const pivot = new THREE.Group();
                scene.add(pivot);

                const AXIS = 4.5;
                const map = v => (v - 3) * (AXIS / 3); // 1→-3, 3→0, 5→+3

                // --- 発光用ソフトグラデーションテクスチャ ---
                const makeGlowTexture = () => {
                    const cv = document.createElement('canvas');
                    cv.width = cv.height = 128;
                    const ctx = cv.getContext('2d');
                    const g = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
                    g.addColorStop(0, 'rgba(255,255,255,1)');
                    g.addColorStop(0.35, 'rgba(255,255,255,0.4)');
                    g.addColorStop(1, 'rgba(255,255,255,0)');
                    ctx.fillStyle = g;
                    ctx.fillRect(0, 0, 128, 128);
                    return new THREE.CanvasTexture(cv);
                };
                const glowTex = makeGlowTexture();

                // --- 枠(発光するワイヤーキューブ) ---
                const half = map(5) + 0.6;
                const boxGeo = new THREE.BoxGeometry(half * 2, half * 2, half * 2);
                const edges = new THREE.EdgesGeometry(boxGeo);
                const frame = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x8a97e8, transparent: true, opacity: 0.8 }));
                pivot.add(frame);
                const frameGlow = new THREE.LineSegments(edges.clone(), new THREE.LineBasicMaterial({
                    color: 0x4a5ae0, transparent: true, opacity: 0.35, blending: THREE.AdditiveBlending, depthWrite: false
                }));
                frameGlow.scale.setScalar(1.012);
                pivot.add(frameGlow);
                const corners = [];
                [-half, half].forEach(x => [-half, half].forEach(y => [-half, half].forEach(z => {
                    const sp = new THREE.Sprite(new THREE.SpriteMaterial({
                        map: glowTex, color: 0xaeb9ff, transparent: true, opacity: 0.9,
                        blending: THREE.AdditiveBlending, depthWrite: false
                    }));
                    sp.scale.setScalar(0.55);
                    sp.position.set(x, y, z);
                    pivot.add(sp);
                    corners.push(sp);
                })));

                const grid = new THREE.GridHelper(half * 2, 8, 0x39428a, 0x1c2246);
                grid.material.transparent = true;
                grid.material.opacity = 0.5;
                grid.position.y = -half;
                pivot.add(grid);

                // --- 軸ラベル(スプライト) ---
                const makeLabel = (text, color = '#aeb6df', size = 44) => {
                    const cv = document.createElement('canvas');
                    cv.width = 512; cv.height = 128;
                    const ctx = cv.getContext('2d');
                    ctx.font = `700 ${size}px 'Zen Kaku Gothic New', sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.lineWidth = 9;
                    ctx.lineJoin = 'round';
                    ctx.strokeStyle = 'rgba(8, 11, 26, 0.85)';
                    ctx.strokeText(text, 256, 64);
                    ctx.fillStyle = color;
                    ctx.fillText(text, 256, 64);
                    const tex = new THREE.CanvasTexture(cv);
                    tex.minFilter = THREE.LinearFilter;
                    const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false }));
                    sp.scale.set(4, 1, 1);
                    return sp;
                };
                const lx = makeLabel('難易度 →', '#e5b84b'); lx.position.set(0, -half - 0.7, half + 0.6); pivot.add(lx);
                const ly = makeLabel('必要性 ↑', '#55c6b5'); ly.position.set(-half - 1.4, 0, half + 0.6); pivot.add(ly);
                const lz = makeLabel('やりがい →', '#e85b3f'); lz.position.set(-half - 1.4, -half - 0.7, 0); pivot.add(lz);
                for (let v = 1; v <= 5; v += 2) {
                    const tnum = makeLabel(String(v), '#5b628a', 52);
                    tnum.scale.set(1.4, 0.35, 1);
                    tnum.position.set(map(v), -half - 0.25, half + 0.4);
                    pivot.add(tnum);
                }

                const bubbleGroup = new THREE.Group();
                pivot.add(bubbleGroup);

                const raycaster = new THREE.Raycaster();
                const pointer = new THREE.Vector2(-10, -10);

                const st = {
                    scene, camera, renderer, pivot, envGroup, bubbleGroup, raycaster, pointer, map, glowTex, half,
                    frame, frameGlow, grid, corners,
                    autoRotate: true, isDragging: false, lastX: 0, lastY: 0,
                    rotX: 0.25, rotY: 0.6, dist: 16, hovered: null, disposed: false, spheres: [],
                    env: null
                };
                stateRef.current = st;

                // --- 操作: ドラッグ回転 / ホイールズーム ---
                const el = renderer.domElement;
                el.style.touchAction = 'none';
                el.style.cursor = 'grab';

                const onDown = (e) => {
                    st.isDragging = true; st.autoRotate = false;
                    st.lastX = e.clientX; st.lastY = e.clientY;
                    el.style.cursor = 'grabbing';
                    el.setPointerCapture(e.pointerId);
                };
                const onMove = (e) => {
                    const rect = el.getBoundingClientRect();
                    st.pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
                    st.pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
                    st.clientX = e.clientX - rect.left;
                    st.clientY = e.clientY - rect.top;
                    if (st.isDragging) {
                        st.rotY += (e.clientX - st.lastX) * 0.006;
                        st.rotX += (e.clientY - st.lastY) * 0.004;
                        st.rotX = Math.max(-1.2, Math.min(1.2, st.rotX));
                        st.lastX = e.clientX; st.lastY = e.clientY;
                    }
                };
                const onUp = () => {
                    st.isDragging = false;
                    el.style.cursor = 'grab';
                    setTimeout(() => { if (!st.isDragging) st.autoRotate = true; }, 2500);
                };
                const onWheel = (e) => {
                    e.preventDefault();
                    st.dist = Math.max(8, Math.min(44, st.dist + e.deltaY * 0.015));
                };
                const onLeave = () => { st.pointer.set(-10, -10); };

                el.addEventListener('pointerdown', onDown);
                el.addEventListener('pointermove', onMove);
                el.addEventListener('pointerup', onUp);
                el.addEventListener('pointerleave', onLeave);
                el.addEventListener('wheel', onWheel, { passive: false });

                // --- リサイズ ---
                const resize = () => {
                    const w = mount.clientWidth, h = mount.clientHeight;
                    if (!w || !h) return;
                    camera.aspect = w / h;
                    camera.updateProjectionMatrix();
                    renderer.setSize(w, h);
                };
                resize();
                const ro = new ResizeObserver(resize);
                ro.observe(mount);

                // --- レンダーループ ---
                const clock = new THREE.Clock();
                const animate = () => {
                    if (st.disposed) return;
                    requestAnimationFrame(animate);
                    const dt = clock.getDelta();
                    const t = clock.getElapsedTime();

                    if (st.autoRotate) st.rotY += dt * 0.18;
                    pivot.rotation.y += (st.rotY - pivot.rotation.y) * 0.08;
                    pivot.rotation.x += (st.rotX - pivot.rotation.x) * 0.08;

                    // カメラに漂うような浮遊感を与える
                    const driftX = Math.sin(t * 0.22) * 0.5;
                    const driftY = st.dist * 0.28 + Math.sin(t * 0.31) * 0.35;
                    camera.position.set(driftX, driftY, st.dist);
                    camera.lookAt(0, 0, 0);

                    // --- テーマ別アニメーション ---
                    const env = st.env;
                    if (env) {
                        if (env.type === 'space') {
                            env.starsFar.rotation.y -= dt * 0.008;
                            env.starsNear.rotation.y += dt * 0.015;
                            env.starsNear.material.opacity = 0.45 + Math.sin(t * 0.8) * 0.12;
                            env.planets.forEach(p => { p.rotation.y += dt * p.userData.spin; });
                            env.moonPivots.forEach((mp, i) => { mp.rotation.y += dt * (0.25 + i * 0.1); });
                            // 流れ星: 約9秒周期で一瞬走る
                            const cyc = t % 9;
                            if (cyc < 1.1) {
                                const p = cyc / 1.1;
                                env.shootingStar.position.set(-30 + p * 55, 20 - p * 9, -32);
                                env.shootingStar.material.opacity = Math.sin(p * Math.PI) * 0.9;
                            } else {
                                env.shootingStar.material.opacity = 0;
                            }
                        } else if (env.type === 'city') {
                            // 積雲がゆっくり流れる
                            env.clouds.forEach(c => {
                                c.position.x += dt * c.userData.speed;
                                if (c.position.x > 90) c.position.x = -90;
                            });
                            // 地表の砂塵がゆらめきながら流れる
                            env.dust.forEach((d, i) => {
                                d.material.opacity = d.userData.baseOp + Math.sin(t * 0.5 + i * 2.1) * 0.05;
                                d.position.x += dt * 0.4;
                                if (d.position.x > 60) d.position.x = -60;
                            });
                            // 火災の煙: 立ちのぼり、膨らみ、薄れて消える
                            env.smokes.forEach(plume => {
                                plume.children.forEach((s, i) => {
                                    const p = ((t * plume.userData.speed) + i / plume.children.length + plume.userData.phase) % 1;
                                    s.position.y = p * plume.userData.height;
                                    s.position.x = Math.sin(p * 6 + i) * (0.4 + p * 1.6) + plume.userData.lean * p * 4;
                                    const sc = 0.8 + p * 4.2;
                                    s.scale.set(sc, sc * 0.85, 1);
                                    s.material.opacity = p < 0.06 ? p * 6 * 0.4 : (1 - p) * 0.4;
                                });
                            });
                            // 火元の残り火が明滅する
                            env.embers.forEach((e, i) => {
                                e.material.opacity = 0.5 + Math.sin(t * 7 + i * 2.3) * 0.25 + Math.sin(t * 13 + i) * 0.12;
                            });
                            // 鳥の群れが旋回する
                            env.flocks.forEach(flock => {
                                flock.rotation.y = t * flock.userData.speed;
                                flock.position.y = flock.userData.baseY + Math.sin(t * 0.5 + flock.userData.phase) * 0.8;
                                flock.children.forEach((b, i) => {
                                    b.position.y = Math.sin(t * 6 + i * 1.9) * 0.25;
                                    const flap = 0.7 + Math.abs(Math.sin(t * 9 + i * 2.2)) * 0.5;
                                    b.scale.set(0.9, flap * 0.5, 1);
                                });
                            });
                            // 空気中を漂う塵
                            if (env.motes) {
                                env.motes.rotation.y = t * 0.01;
                                env.motes.position.y = Math.sin(t * 0.3) * 0.4;
                            }
                            // 湖面のきらめき
                            if (env.lakeGlint) {
                                env.lakeGlint.material.opacity = 0.18 + (Math.sin(t * 1.3) * 0.5 + 0.5) * 0.22;
                                env.lakeGlint.scale.x = 16 + Math.sin(t * 0.7) * 3;
                            }
                            // ちぎれた電線が風に揺れる
                            env.danglers.forEach((d, i) => {
                                d.rotation.z = d.userData.baseTilt + Math.sin(t * 1.6 + i * 2.4) * 0.12;
                            });
                        }
                    }

                    // 浮遊アニメーション
                    st.spheres.forEach((m, i) => {
                        m.position.y = m.userData.baseY + Math.sin(t * 1.2 + i * 1.7) * 0.07;
                        const s = m.userData.baseScale * (st.hovered === m ? 1.25 : 1);
                        m.scale.x += (s - m.scale.x) * 0.15;
                        m.scale.y = m.scale.z = m.scale.x;
                    });

                    // ホバー判定
                    raycaster.setFromCamera(st.pointer, camera);
                    const hits = raycaster.intersectObjects(st.spheres, false);
                    const tip = tooltipRef.current;
                    if (hits.length > 0) {
                        st.hovered = hits[0].object;
                        const d = st.hovered.userData;
                        if (tip) {
                            tip.innerHTML = `<div class="font-bold text-sm mb-0.5">${d.name}</div>` +
                                `<span style="color:#e5b84b">難易度 ${d.difficulty}</span> ・ ` +
                                `<span style="color:#55c6b5">必要性 ${d.necessity}</span> ・ ` +
                                `<span style="color:#e85b3f">やりがい ${d.gai}</span>`;
                            tip.style.left = st.clientX + 'px';
                            tip.style.top = st.clientY + 'px';
                            tip.classList.add('show');
                        }
                        el.style.cursor = 'pointer';
                    } else {
                        st.hovered = null;
                        if (tip) tip.classList.remove('show');
                        if (!st.isDragging) el.style.cursor = 'grab';
                    }

                    renderer.render(scene, camera);
                };
                animate();

                return () => {
                    st.disposed = true;
                    ro.disconnect();
                    el.removeEventListener('pointerdown', onDown);
                    el.removeEventListener('pointermove', onMove);
                    el.removeEventListener('pointerup', onUp);
                    el.removeEventListener('pointerleave', onLeave);
                    el.removeEventListener('wheel', onWheel);
                    renderer.dispose();
                    if (renderer.domElement.parentNode) renderer.domElement.parentNode.removeChild(renderer.domElement);
                };
            }, []);

            // --- テーマ環境の構築(切替時に丸ごと差し替え) ---
            useEffect(() => {
                const st = stateRef.current;
                if (!st) return;
                const { envGroup, glowTex, half } = st;

                // 既存環境を破棄
                const disposeObj = (obj) => {
                    if (obj.geometry) obj.geometry.dispose();
                    if (obj.material) {
                        (Array.isArray(obj.material) ? obj.material : [obj.material]).forEach(m => {
                            if (m.map && m.map !== glowTex) m.map.dispose();
                            m.dispose();
                        });
                    }
                };
                while (envGroup.children.length) {
                    const child = envGroup.children[0];
                    child.traverse(disposeObj);
                    envGroup.remove(child);
                }

                // 立方体・グリッドの見た目をテーマに合わせる(昼景では濃色に)
                if (theme === 'space') {
                    st.frame.material.color.setHex(0x8a97e8); st.frame.material.opacity = 0.8;
                    st.frameGlow.material.opacity = 0.35;
                    st.corners.forEach(c => { c.material.opacity = 0.9; });
                    st.grid.material.opacity = 0.5;
                } else {
                    st.frame.material.color.setHex(0x1d2b4a); st.frame.material.opacity = 0.95;
                    st.frameGlow.material.opacity = 0;
                    st.corners.forEach(c => { c.material.opacity = 0.12; });
                    st.grid.material.opacity = 0.75;
                }

                const makeStars = (count, radiusMin, radiusMax, size, opacity, colorHex = 0xdde4ff) => {
                    const pos = new Float32Array(count * 3);
                    for (let i = 0; i < count; i++) {
                        const r = radiusMin + Math.random() * (radiusMax - radiusMin);
                        const theta = Math.random() * Math.PI * 2;
                        const phi = Math.acos(2 * Math.random() - 1);
                        pos[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
                        pos[i * 3 + 1] = r * Math.cos(phi);
                        pos[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
                    }
                    const geo = new THREE.BufferGeometry();
                    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
                    const mat = new THREE.PointsMaterial({
                        size, map: glowTex, transparent: true, opacity,
                        color: colorHex, blending: THREE.AdditiveBlending,
                        depthWrite: false, sizeAttenuation: true
                    });
                    return new THREE.Points(geo, mat);
                };
                const makeNebula = (hex, scale, x, y, z, op) => {
                    const sp = new THREE.Sprite(new THREE.SpriteMaterial({
                        map: glowTex, color: hex, transparent: true, opacity: op,
                        blending: THREE.AdditiveBlending, depthWrite: false
                    }));
                    sp.scale.set(scale, scale * 0.7, 1);
                    sp.position.set(x, y, z);
                    return sp;
                };

                if (theme === 'space') {
                    // ================= 宇宙テーマ =================
                    const starsFar = makeStars(900, 28, 60, 0.55, 0.75);
                    const starsNear = makeStars(220, 14, 26, 0.9, 0.55);
                    envGroup.add(starsFar, starsNear);

                    envGroup.add(makeNebula(0x3646a8, 46, -20, 8, -34, 0.30));
                    envGroup.add(makeNebula(0x7a2b3c, 34, 22, -10, -30, 0.22));
                    envGroup.add(makeNebula(0x1e6e64, 26, 6, 16, -38, 0.16));

                    const planets = [];
                    const moonPivots = [];

                    // 遠くの太陽
                    const sun = new THREE.Sprite(new THREE.SpriteMaterial({
                        map: glowTex, color: 0xffd9a0, transparent: true, opacity: 0.9,
                        blending: THREE.AdditiveBlending, depthWrite: false
                    }));
                    sun.scale.setScalar(14);
                    sun.position.set(-38, 20, -52);
                    envGroup.add(sun);
                    const sunLight = new THREE.PointLight(0xffe0b0, 0.45, 200);
                    sunLight.position.copy(sun.position);
                    envGroup.add(sunLight);

                    // 環のある惑星(土星風)
                    const ringed = new THREE.Group();
                    const ringedBody = new THREE.Mesh(
                        new THREE.SphereGeometry(2.6, 40, 40),
                        new THREE.MeshStandardMaterial({ color: 0xd8b06a, roughness: 0.75, metalness: 0.1, emissive: 0x3a2c12 })
                    );
                    ringed.add(ringedBody);
                    const ring = new THREE.Mesh(
                        new THREE.RingGeometry(3.4, 5.4, 72),
                        new THREE.MeshBasicMaterial({ color: 0xcbb488, transparent: true, opacity: 0.5, side: THREE.DoubleSide })
                    );
                    ring.rotation.x = Math.PI / 2.35;
                    ringed.add(ring);
                    ringed.position.set(-24, 9, -30);
                    ringed.rotation.z = 0.28;
                    ringed.userData.spin = 0.05;
                    envGroup.add(ringed);
                    planets.push(ringed);

                    // 青いガス惑星 + 衛星
                    const gas = new THREE.Group();
                    const gasBody = new THREE.Mesh(
                        new THREE.SphereGeometry(1.9, 40, 40),
                        new THREE.MeshStandardMaterial({ color: 0x4a7dd8, roughness: 0.5, metalness: 0.2, emissive: 0x0d1e46 })
                    );
                    gas.add(gasBody);
                    const gasHalo = new THREE.Sprite(new THREE.SpriteMaterial({
                        map: glowTex, color: 0x5a8ae8, transparent: true, opacity: 0.4,
                        blending: THREE.AdditiveBlending, depthWrite: false
                    }));
                    gasHalo.scale.setScalar(6);
                    gas.add(gasHalo);
                    const moonPivot = new THREE.Group();
                    const moon = new THREE.Mesh(
                        new THREE.SphereGeometry(0.42, 24, 24),
                        new THREE.MeshStandardMaterial({ color: 0xb8bcc8, roughness: 0.9 })
                    );
                    moon.position.set(3.4, 0.4, 0);
                    moonPivot.add(moon);
                    gas.add(moonPivot);
                    gas.position.set(23, -5, -26);
                    gas.userData.spin = 0.09;
                    envGroup.add(gas);
                    planets.push(gas);
                    moonPivots.push(moonPivot);

                    // 小さな赤い惑星
                    const red = new THREE.Group();
                    red.add(new THREE.Mesh(
                        new THREE.SphereGeometry(0.95, 32, 32),
                        new THREE.MeshStandardMaterial({ color: 0xc4573a, roughness: 0.85, emissive: 0x2c0d06 })
                    ));
                    red.position.set(11, 13, -32);
                    red.userData.spin = 0.14;
                    envGroup.add(red);
                    planets.push(red);

                    // 流れ星
                    const shootingStar = new THREE.Sprite(new THREE.SpriteMaterial({
                        map: glowTex, color: 0xffffff, transparent: true, opacity: 0,
                        blending: THREE.AdditiveBlending, depthWrite: false
                    }));
                    shootingStar.scale.set(2.6, 0.5, 1);
                    envGroup.add(shootingStar);

                    st.env = { type: 'space', starsFar, starsNear, planets, moonPivots, shootingStar };

                } else {
                    // ============================================================
                    //  真夏の昼・荒廃した要塞都市テーマ(徹底作り込み版)
                    //  山と湖に囲まれた盆地 / 整然と並ぶ要塞ビル群 / 破壊の痕跡
                    // ============================================================
                    const cityY = -half - 6;   // 地表の基準高さ(立方体は街の上空に浮かぶ)
                    const rand = (a, b) => a + Math.random() * (b - a);

                    // ---------- 光: 真夏の強い日差し ----------
                    const sunLight = new THREE.DirectionalLight(0xfff3dc, 1.2);
                    sunLight.position.set(26, 36, 16);
                    envGroup.add(sunLight);
                    const skyFill = new THREE.HemisphereLight(0xbfdcf5, 0x9a8f68, 0.85);
                    envGroup.add(skyFill);
                    const glare = new THREE.Sprite(new THREE.SpriteMaterial({
                        map: glowTex, color: 0xffffff, transparent: true, opacity: 0.85,
                        blending: THREE.AdditiveBlending, depthWrite: false
                    }));
                    glare.scale.setScalar(26);
                    glare.position.set(28, 26, -46);
                    envGroup.add(glare);

                    // ---------- 地形: 起伏・クレーター・湖底を持つ盆地 ----------
                    const stains = [
                        { x: 18, z: -14, r: 12 },   // 主クレーターの汚染
                        { x: -27, z: 7, r: 7 },
                        { x: 6, z: 26, r: 6 },
                        { x: -8, z: -30, r: 8 }
                    ];
                    const craters = [
                        { x: 18, z: -14, r: 9, depth: 2.4 },
                        { x: -27, z: 7, r: 5, depth: 1.3 }
                    ];
                    const lakeC = { x: -18, z: 62, r: 31 };
                    const roadLanes = [-20, -10, 0, 10, 20];

                    // 地形の高さ(起伏+クレーター+湖底+道路沿いの平坦化)を返す共通関数。
                    // 地面ジオメトリと配置物の接地の両方で使い、浮き・めり込みを防ぐ。
                    const terrainH = (x, z) => {
                        let y = 0.45 * Math.sin(x * 0.11) * Math.cos(z * 0.09)
                              + 0.22 * Math.sin(x * 0.31 + z * 0.27)
                              + 0.12 * Math.cos(x * 0.53 - z * 0.41);
                        const rc = Math.sqrt(x * x + z * z);
                        if (rc < 34) y *= 0.15 + 0.85 * (rc / 34);
                        // 道路の通る帯は造成されて平坦
                        let onRoad = false;
                        roadLanes.forEach(lane => {
                            if ((Math.abs(x - lane) < 1.9 && Math.abs(z) < 39) ||
                                (Math.abs(z - lane) < 1.9 && Math.abs(x) < 39)) onRoad = true;
                        });
                        if (onRoad) y *= 0.08;
                        // クレーター: 中央が陥没し、縁が盛り上がる
                        craters.forEach(c => {
                            const d = Math.sqrt((x - c.x) ** 2 + (z - c.z) ** 2);
                            if (d < c.r) {
                                y -= c.depth * (1 - (d / c.r) ** 2);
                            } else if (d < c.r + 3.5) {
                                y += 0.7 * Math.exp(-((d - c.r) ** 2) * 0.8);
                            }
                        });
                        // 湖底: 湖の範囲は水面より下へ
                        const dl = Math.sqrt((x - lakeC.x) ** 2 + (z - lakeC.z) ** 2);
                        if (dl < lakeC.r + 3) {
                            const sink = dl < lakeC.r ? 1.4 : 1.4 * (1 - (dl - lakeC.r) / 3);
                            y = Math.min(y, -sink);
                        }
                        return y;
                    };

                    const groundGeo = new THREE.PlaneGeometry(280, 280, 110, 110);
                    groundGeo.rotateX(-Math.PI / 2);
                    {
                        const pos = groundGeo.attributes.position;
                        const colors = new Float32Array(pos.count * 3);
                        const baseCol = { r: 0.78, g: 0.72, b: 0.52 };   // 枯草
                        const dirtCol = { r: 0.45, g: 0.38, b: 0.30 };   // 焦土
                        const redCol  = { r: 0.62, g: 0.16, b: 0.13 };   // 汚染
                        const bedCol  = { r: 0.28, g: 0.33, b: 0.34 };   // 湖底
                        for (let i = 0; i < pos.count; i++) {
                            const x = pos.getX(i), z = pos.getZ(i);
                            const y = terrainH(x, z);
                            // 焦土(クレーター周辺)の度合い
                            let scorch = 0;
                            craters.forEach(c => {
                                const d = Math.sqrt((x - c.x) ** 2 + (z - c.z) ** 2);
                                if (d < c.r) scorch = Math.max(scorch, 1 - (d / c.r) ** 2);
                                else if (d < c.r + 3.5) scorch = Math.max(scorch, 0.4 * Math.exp(-(d - c.r)));
                            });
                            // 湖底の度合い
                            const dl = Math.sqrt((x - lakeC.x) ** 2 + (z - lakeC.z) ** 2);
                            const lakeBed = dl < lakeC.r ? 1 : (dl < lakeC.r + 3 ? 0.5 : 0);
                            pos.setY(i, y);
                            // 頂点カラー: 枯草 → 焦土 → 汚染 → 湖底 をブレンド
                            let cr = baseCol.r, cg = baseCol.g, cb = baseCol.b;
                            const mottle = 0.9 + 0.1 * Math.sin(x * 1.7) * Math.cos(z * 2.3);
                            cr *= mottle; cg *= mottle; cb *= mottle;
                            if (scorch > 0) {
                                cr = cr * (1 - scorch) + dirtCol.r * scorch;
                                cg = cg * (1 - scorch) + dirtCol.g * scorch;
                                cb = cb * (1 - scorch) + dirtCol.b * scorch;
                            }
                            stains.forEach(s => {
                                const ds = Math.sqrt((x - s.x) ** 2 + (z - s.z) ** 2);
                                if (ds < s.r) {
                                    const k = (1 - ds / s.r) * 0.85;
                                    cr = cr * (1 - k) + redCol.r * k;
                                    cg = cg * (1 - k) + redCol.g * k;
                                    cb = cb * (1 - k) + redCol.b * k;
                                }
                            });
                            if (lakeBed > 0) {
                                cr = cr * (1 - lakeBed) + bedCol.r * lakeBed;
                                cg = cg * (1 - lakeBed) + bedCol.g * lakeBed;
                                cb = cb * (1 - lakeBed) + bedCol.b * lakeBed;
                            }
                            colors[i * 3] = cr; colors[i * 3 + 1] = cg; colors[i * 3 + 2] = cb;
                        }
                        groundGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
                        groundGeo.computeVertexNormals();
                    }
                    const ground = new THREE.Mesh(groundGeo, new THREE.MeshStandardMaterial({ vertexColors: true, roughness: 1 }));
                    ground.position.y = cityY;
                    envGroup.add(ground);

                    // ---------- 湖と、湖面のきらめき ----------
                    const lake = new THREE.Mesh(
                        new THREE.CircleGeometry(lakeC.r, 56),
                        new THREE.MeshStandardMaterial({ color: 0x5b93c0, roughness: 0.18, metalness: 0.4, transparent: true, opacity: 0.92 })
                    );
                    lake.rotation.x = -Math.PI / 2;
                    lake.position.set(lakeC.x, cityY - 0.15, lakeC.z);
                    envGroup.add(lake);
                    const lakeGlint = new THREE.Sprite(new THREE.SpriteMaterial({
                        map: glowTex, color: 0xffffff, transparent: true, opacity: 0.25,
                        blending: THREE.AdditiveBlending, depthWrite: false
                    }));
                    lakeGlint.scale.set(16, 2.2, 1);
                    lakeGlint.position.set(lakeC.x + 6, cityY + 0.35, lakeC.z - 8);
                    envGroup.add(lakeGlint);

                    // ---------- 外輪山(二重の山並み。遠いほど霞む) ----------
                    const mountainNear = new THREE.MeshStandardMaterial({ color: 0x87a0b2, roughness: 1, flatShading: true });
                    const mountainFar  = new THREE.MeshStandardMaterial({ color: 0xaec3cf, roughness: 1, flatShading: true });
                    for (let i = 0; i < 16; i++) {
                        const a = (i / 16) * Math.PI * 2 + rand(-0.15, 0.15);
                        const r = rand(78, 96);
                        const hM = rand(11, 24);
                        const m = new THREE.Mesh(new THREE.ConeGeometry(rand(17, 30), hM, 5 + Math.floor(Math.random() * 3)), mountainNear);
                        m.position.set(Math.cos(a) * r, cityY + hM / 2 - 1, Math.sin(a) * r);
                        m.rotation.y = Math.random() * Math.PI;
                        envGroup.add(m);
                    }
                    for (let i = 0; i < 12; i++) {
                        const a = (i / 12) * Math.PI * 2 + rand(-0.2, 0.2) + 0.26;
                        const r = rand(105, 125);
                        const hM = rand(16, 30);
                        const m = new THREE.Mesh(new THREE.ConeGeometry(rand(24, 40), hM, 5), mountainFar);
                        m.position.set(Math.cos(a) * r, cityY + hM / 2 - 1, Math.sin(a) * r);
                        envGroup.add(m);
                    }
                    // 地平線の靄
                    for (let i = 0; i < 5; i++) {
                        const hz = new THREE.Sprite(new THREE.SpriteMaterial({
                            map: glowTex, color: 0xe7ecef, transparent: true, opacity: 0.28, depthWrite: false
                        }));
                        hz.scale.set(rand(60, 100), rand(8, 13), 1);
                        const a = (i / 5) * Math.PI * 2;
                        hz.position.set(Math.cos(a) * 88, cityY + 5, Math.sin(a) * 88);
                        envGroup.add(hz);
                    }

                    // ---------- 積雲 ----------
                    const clouds = [];
                    for (let i = 0; i < 8; i++) {
                        const cluster = new THREE.Group();
                        const puffs = 3 + Math.floor(Math.random() * 4);
                        for (let p = 0; p < puffs; p++) {
                            const puff = new THREE.Sprite(new THREE.SpriteMaterial({
                                map: glowTex, color: 0xffffff, transparent: true,
                                opacity: rand(0.45, 0.8), depthWrite: false
                            }));
                            const s = rand(5, 13);
                            puff.scale.set(s * 1.6, s * 0.8, 1);
                            puff.position.set((p - puffs / 2) * s * 0.8, Math.random() * 1.8, Math.random() * 2);
                            cluster.add(puff);
                        }
                        cluster.position.set(rand(-90, 90), rand(10, 24), rand(-56, -14));
                        cluster.userData.speed = rand(0.35, 0.95);
                        envGroup.add(cluster);
                        clouds.push(cluster);
                    }

                    // ---------- 道路網(ひび割れたアスファルト) ----------
                    const makeRoadTexture = () => {
                        const cv = document.createElement('canvas');
                        cv.width = 64; cv.height = 512;
                        const ctx = cv.getContext('2d');
                        ctx.fillStyle = '#4a4a4e';
                        ctx.fillRect(0, 0, 64, 512);
                        // 色むら
                        for (let i = 0; i < 60; i++) {
                            ctx.fillStyle = `rgba(${60 + Math.random() * 30}, ${60 + Math.random() * 30}, ${64 + Math.random() * 30}, 0.25)`;
                            ctx.fillRect(Math.random() * 60, Math.random() * 508, rand(3, 12), rand(3, 12));
                        }
                        // かすれた中央線
                        ctx.fillStyle = 'rgba(226, 208, 130, 0.55)';
                        for (let y = 6; y < 512; y += 34) {
                            if (Math.random() < 0.75) ctx.fillRect(29, y, 6, 18);
                        }
                        // ひび割れ
                        ctx.strokeStyle = 'rgba(20, 20, 24, 0.8)';
                        ctx.lineWidth = 1.5;
                        for (let c = 0; c < 9; c++) {
                            ctx.beginPath();
                            let cx = Math.random() * 64, cy = Math.random() * 512;
                            ctx.moveTo(cx, cy);
                            for (let s = 0; s < 6; s++) {
                                cx += rand(-14, 14); cy += rand(-20, 20);
                                ctx.lineTo(cx, cy);
                            }
                            ctx.stroke();
                        }
                        const tex = new THREE.CanvasTexture(cv);
                        tex.wrapT = THREE.RepeatWrapping;
                        return tex;
                    };
                    const roadTexA = makeRoadTexture();
                    const roadTexB = makeRoadTexture();
                    const roadMatA = new THREE.MeshStandardMaterial({ map: roadTexA, roughness: 0.95 });
                    const roadMatB = new THREE.MeshStandardMaterial({ map: roadTexB, roughness: 0.95 });
                    const addRoad = (x, z, len, alongX) => {
                        const geo = new THREE.PlaneGeometry(2.4, len);
                        const mat = (Math.random() < 0.5 ? roadMatA : roadMatB).clone();
                        mat.map = mat.map.clone();
                        mat.map.needsUpdate = true;
                        mat.map.repeat.set(1, len / 12);
                        const road = new THREE.Mesh(geo, mat);
                        road.rotation.x = -Math.PI / 2;
                        if (alongX) road.rotation.z = Math.PI / 2;
                        road.position.set(x, cityY + 0.05, z);
                        envGroup.add(road);
                    };
                    [-20, -10, 0, 10, 20].forEach(x => addRoad(x, 0, 76, false));
                    [-20, -10, 0, 10, 20].forEach(z => addRoad(0, z, 76, true));
                    // 損壊した道路: 跳ね上がった舗装片
                    const asphaltMat = new THREE.MeshStandardMaterial({ color: 0x3e3e44, roughness: 1 });
                    for (let i = 0; i < 10; i++) {
                        const seg = new THREE.Mesh(new THREE.BoxGeometry(rand(1.4, 2.4), 0.18, rand(2, 4)), asphaltMat);
                        const onX = Math.random() < 0.5;
                        const lane = [-20, -10, 0, 10, 20][Math.floor(Math.random() * 5)];
                        const along = rand(-32, 32);
                        seg.position.set(onX ? along : lane, cityY + rand(0.15, 0.6), onX ? lane : along);
                        seg.rotation.set(rand(-0.5, 0.5), Math.random() * Math.PI, rand(-0.5, 0.5));
                        envGroup.add(seg);
                    }

                    // ---------- 崩落した高架道路 ----------
                    const deckMat = new THREE.MeshStandardMaterial({ color: 0x9a9aa0, roughness: 0.9 });
                    const pylonMat = new THREE.MeshStandardMaterial({ color: 0x8a8a90, roughness: 0.95 });
                    const hwY = cityY + 4.2, hwZ = -25;
                    for (let x = -52; x <= 52; x += 9) {
                        const pylon = new THREE.Mesh(new THREE.BoxGeometry(1.1, 4.2, 1.6), pylonMat);
                        pylon.position.set(x, cityY + 2.1, hwZ);
                        // 崩落区間の橋脚は折れている
                        if (x > 2 && x < 22) {
                            pylon.scale.y = rand(0.3, 0.6);
                            pylon.position.y = cityY + pylon.scale.y * 2.1;
                            pylon.rotation.z = rand(-0.3, 0.3);
                        }
                        envGroup.add(pylon);
                    }
                    for (let x = -52; x < 52; x += 9) {
                        if (x >= 3 && x < 12) continue;   // 完全に落ちた区間
                        const deck = new THREE.Mesh(new THREE.BoxGeometry(9.2, 0.5, 3.4), deckMat);
                        deck.position.set(x + 4.5, hwY, hwZ);
                        if (x >= 12 && x < 21) {           // 片側が落ちて斜めになった区間
                            deck.rotation.z = -0.38;
                            deck.position.y = hwY - 1.7;
                        }
                        if (x >= -6 && x < 3) {
                            deck.rotation.z = 0.22;
                            deck.position.y = hwY - 0.8;
                        }
                        envGroup.add(deck);
                        // ガードレール
                        [[0, 1.7], [0, -1.7]].forEach(off => {
                            const rail = new THREE.Mesh(new THREE.BoxGeometry(9.2, 0.28, 0.08), pylonMat);
                            rail.position.set(0, 0.4, off[1]);
                            deck.add(rail);
                        });
                    }
                    // 落下したデッキの残骸
                    const fallen = new THREE.Mesh(new THREE.BoxGeometry(8.6, 0.5, 3.4), deckMat);
                    fallen.position.set(7.5, cityY + 0.7, hwZ + 1.2);
                    fallen.rotation.set(0.1, 0.35, 0.5);
                    envGroup.add(fallen);

                    // ---------- ビル用テクスチャ(昼のコンクリート+暗い窓+焦げ跡) ----------
                    const makeTowerTexture = (base, winColor, brokenRatio, scorched) => {
                        const cv = document.createElement('canvas');
                        cv.width = 64; cv.height = 128;
                        const ctx = cv.getContext('2d');
                        ctx.fillStyle = base;
                        ctx.fillRect(0, 0, 64, 128);
                        for (let y = 6; y < 122; y += 9) {
                            for (let x = 5; x < 58; x += 9) {
                                if (Math.random() < 0.92) {
                                    ctx.fillStyle = Math.random() < brokenRatio ? '#0e1218' : winColor;
                                    ctx.fillRect(x, y, 5, 5);
                                }
                            }
                        }
                        // 雨だれと煤
                        for (let s = 0; s < 6; s++) {
                            ctx.fillStyle = `rgba(38, 38, 44, ${rand(0.08, 0.22)})`;
                            ctx.fillRect(Math.random() * 60, Math.random() * 30, rand(2, 5), rand(60, 120));
                        }
                        // 火災の焦げ跡(窓上に広がる黒煙の痕)
                        if (scorched) {
                            const sx = rand(4, 44), sy = rand(50, 110);
                            const g = ctx.createRadialGradient(sx + 8, sy, 2, sx + 8, sy - 20, 34);
                            g.addColorStop(0, 'rgba(10, 8, 8, 0.95)');
                            g.addColorStop(0.5, 'rgba(16, 12, 12, 0.6)');
                            g.addColorStop(1, 'rgba(20, 16, 16, 0)');
                            ctx.fillStyle = g;
                            ctx.fillRect(0, 0, 64, 128);
                        }
                        const tex = new THREE.CanvasTexture(cv);
                        tex.magFilter = THREE.NearestFilter;
                        return tex;
                    };
                    const towerTextures = [];
                    const towerBases = ['#c4cad1', '#b7bec6', '#cdd2d8', '#aeb5bd', '#c9c4b6', '#bfc6cd', '#b2b8b4'];
                    for (let i = 0; i < 14; i++) {
                        towerTextures.push(makeTowerTexture(
                            towerBases[i % towerBases.length],
                            ['#33404f', '#2c3a49', '#3a4757', '#27333f'][i % 4],
                            rand(0.1, 0.6),
                            Math.random() < 0.45
                        ));
                    }
                    const concreteTop = new THREE.MeshStandardMaterial({ color: 0x9aa1a9, roughness: 0.95 });
                    const rubbleMat = new THREE.MeshStandardMaterial({ color: 0x8f8f93, roughness: 1 });
                    const darkCapMat = new THREE.MeshStandardMaterial({ color: 0x3d424a, roughness: 1 });
                    const interiorMat = new THREE.MeshStandardMaterial({ color: 0x191d24, roughness: 1 });
                    const skeletonMat = new THREE.LineBasicMaterial({ color: 0x3a3f47, transparent: true, opacity: 0.9 });
                    const tankMat = new THREE.MeshStandardMaterial({ color: 0xb8b0a0, roughness: 0.8 });
                    const antennaMat = new THREE.MeshStandardMaterial({ color: 0x55595f, roughness: 0.7 });

                    const rubbleSpots = [];   // 後でインスタンシングでまとめて描く瓦礫の発生点

                    const towerMatFor = () => new THREE.MeshStandardMaterial({
                        map: towerTextures[Math.floor(Math.random() * towerTextures.length)], roughness: 0.88
                    });

                    // 屋上設備(給水タンク・アンテナ・室外機)
                    const addRoofDetail = (bld, w, h, d) => {
                        if (Math.random() < 0.4) {
                            const tank = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.22, 0.5, 10), tankMat);
                            tank.position.set(rand(-w, w) * 0.25, h / 2 + 0.25, rand(-d, d) * 0.25);
                            if (Math.random() < 0.3) tank.rotation.z = rand(0.6, 1.4); // 倒れたタンク
                            bld.add(tank);
                        }
                        if (Math.random() < 0.45) {
                            const ant = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.04, rand(0.8, 1.6), 6), antennaMat);
                            ant.position.set(rand(-w, w) * 0.3, h / 2 + ant.geometry.parameters.height / 2, rand(-d, d) * 0.3);
                            if (Math.random() < 0.35) ant.rotation.x = rand(0.4, 1.1); // 折れたアンテナ
                            bld.add(ant);
                        }
                        if (Math.random() < 0.35) {
                            const ac = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.2, 0.3), darkCapMat);
                            ac.position.set(rand(-w, w) * 0.3, h / 2 + 0.1, rand(-d, d) * 0.3);
                            bld.add(ac);
                        }
                    };

                    // ---------- ビル生成(6種の損壊パターン) ----------
                    const addTower = (x, z, w, h, d) => {
                        const roll = Math.random();
                        const group = new THREE.Group();
                        group.position.set(x, cityY + terrainH(x, z) - 0.05, z);
                        group.rotation.y = Math.floor(Math.random() * 4) * (Math.PI / 2);

                        if (roll < 0.30) {
                            // (1) ほぼ無傷
                            const bld = new THREE.Mesh(new THREE.BoxGeometry(w, h, d),
                                [towerMatFor(), towerMatFor(), concreteTop, concreteTop, towerMatFor(), towerMatFor()]);
                            bld.position.y = h / 2;
                            addRoofDetail(bld, w, h, d);
                            group.add(bld);
                        } else if (roll < 0.52) {
                            // (2) 上層階が崩壊: 本体+むき出しの内部+瓦礫の冠
                            const hh = h * rand(0.55, 0.8);
                            const sideMat = towerMatFor();
                            const bld = new THREE.Mesh(new THREE.BoxGeometry(w, hh, d),
                                [sideMat, sideMat, interiorMat, concreteTop, sideMat, sideMat]);
                            bld.position.y = hh / 2;
                            group.add(bld);
                            // ぎざぎざの残骸壁
                            const shards = 2 + Math.floor(Math.random() * 3);
                            for (let s = 0; s < shards; s++) {
                                const sw = w * rand(0.15, 0.4), sh = h * rand(0.1, 0.28), sd = d * rand(0.12, 0.3);
                                const shard = new THREE.Mesh(new THREE.BoxGeometry(sw, sh, sd), darkCapMat);
                                shard.position.set(rand(-1, 1) * (w / 2 - sw / 2), hh + sh / 2 - 0.05, rand(-1, 1) * (d / 2 - sd / 2));
                                shard.rotation.set(rand(-0.25, 0.25), rand(0, 1), rand(-0.25, 0.25));
                                group.add(shard);
                            }
                            rubbleSpots.push({ x, z, r: Math.max(w, d) * 1.2, n: 5 });
                        } else if (roll < 0.66) {
                            // (3) 傾いたビル
                            const bld = new THREE.Mesh(new THREE.BoxGeometry(w, h, d),
                                [towerMatFor(), towerMatFor(), concreteTop, concreteTop, towerMatFor(), towerMatFor()]);
                            bld.position.y = h / 2 - h * 0.04;
                            bld.rotation.z = rand(-1, 1) * rand(0.12, 0.3);
                            bld.rotation.x = rand(-0.08, 0.08);
                            group.add(bld);
                            rubbleSpots.push({ x, z, r: Math.max(w, d) * 1.4, n: 4 });
                        } else if (roll < 0.76) {
                            // (4) 骨組みだけの焼けビル
                            const hh = h * rand(0.7, 1);
                            const box = new THREE.BoxGeometry(w, hh, d);
                            const frameB = new THREE.LineSegments(new THREE.EdgesGeometry(box), skeletonMat);
                            frameB.position.y = hh / 2;
                            group.add(frameB);
                            // 中間フロアの床板
                            const floors = Math.floor(hh / 1.2);
                            for (let f = 1; f < floors; f++) {
                                if (Math.random() < 0.35) continue; // 抜け落ちた床
                                const slab = new THREE.Mesh(new THREE.BoxGeometry(w * 0.96, 0.06, d * 0.96), interiorMat);
                                slab.position.y = (hh / floors) * f;
                                group.add(slab);
                            }
                            rubbleSpots.push({ x, z, r: Math.max(w, d) * 1.5, n: 7 });
                        } else if (roll < 0.9) {
                            // (5) 倒壊: 低い残骸+倒れた上半分
                            const stump = new THREE.Mesh(new THREE.BoxGeometry(w, h * 0.25, d),
                                [towerMatFor(), towerMatFor(), interiorMat, concreteTop, towerMatFor(), towerMatFor()]);
                            stump.position.y = h * 0.125;
                            group.add(stump);
                            const fallenPart = new THREE.Mesh(new THREE.BoxGeometry(w * 0.9, h * 0.5, d * 0.9),
                                [towerMatFor(), towerMatFor(), darkCapMat, darkCapMat, towerMatFor(), towerMatFor()]);
                            const dir = Math.random() * Math.PI * 2;
                            fallenPart.position.set(Math.cos(dir) * (h * 0.3), h * 0.14 + w * 0.2, Math.sin(dir) * (h * 0.3));
                            fallenPart.rotation.set(Math.cos(dir + Math.PI / 2) * 1.35, 0, Math.sin(dir + Math.PI / 2) * 1.35);
                            group.add(fallenPart);
                            rubbleSpots.push({ x, z, r: Math.max(w, d) * 2.2, n: 12 });
                        } else {
                            // (6) 隣に寄りかかる大破ビル
                            const a2 = new THREE.Mesh(new THREE.BoxGeometry(w * 0.8, h * 0.8, d * 0.8),
                                [towerMatFor(), towerMatFor(), concreteTop, concreteTop, towerMatFor(), towerMatFor()]);
                            a2.position.y = h * 0.4;
                            group.add(a2);
                            const leaner = new THREE.Mesh(new THREE.BoxGeometry(w * 0.7, h * 0.9, d * 0.7),
                                [towerMatFor(), towerMatFor(), darkCapMat, concreteTop, towerMatFor(), towerMatFor()]);
                            leaner.position.set(w * 1.05, h * 0.36, 0);
                            leaner.rotation.z = 0.42;
                            group.add(leaner);
                            rubbleSpots.push({ x: x + w, z, r: Math.max(w, d) * 1.6, n: 8 });
                        }
                        envGroup.add(group);
                    };

                    // 新市街: 整然とした格子配置の要塞ビル群
                    for (let gx = -3; gx <= 3; gx++) {
                        for (let gz = -3; gz <= 3; gz++) {
                            const r = Math.sqrt(gx * gx + gz * gz);
                            if (r < 1.3 || Math.random() < 0.14) continue;
                            const x = gx * 5 + rand(-0.6, 0.6);
                            const z = gz * 5 + rand(-0.6, 0.6);
                            if (Math.abs(x % 10) < 1.6 || Math.abs(z % 10) < 1.6) { /* 道路上でも許容(高低差あり) */ }
                            addTower(x, z, rand(1.6, 2.2), rand(6.5, 10.5), rand(1.6, 2.2));
                        }
                    }
                    // 中間区: 中規模ビル
                    for (let i = 0; i < 40; i++) {
                        const a = Math.random() * Math.PI * 2;
                        const r = rand(19, 30);
                        const x = Math.cos(a) * r, z = Math.sin(a) * r;
                        const dl = Math.sqrt((x - lakeC.x) ** 2 + (z - lakeC.z) ** 2);
                        if (dl < lakeC.r + 4) continue;
                        addTower(x, z, rand(1.2, 1.9), rand(3, 6.5), rand(1.2, 1.9));
                    }

                    // ---------- 旧市街: 低層住宅(切妻屋根)の街並み ----------
                    const wallMats = ['#d8d2c4', '#cfc8b8', '#c8c4bc', '#ded8ca'].map(c =>
                        new THREE.MeshStandardMaterial({ color: c, roughness: 0.95 }));
                    const roofMats = ['#7a6f66', '#6a6e78', '#8a7a68', '#5f6670'].map(c =>
                        new THREE.MeshStandardMaterial({ color: c, roughness: 0.9, flatShading: true }));
                    const roofGeo = new THREE.ConeGeometry(1, 1, 4);
                    for (let i = 0; i < 110; i++) {
                        const a = Math.random() * Math.PI * 2;
                        const r = rand(30, 48);
                        const x = Math.cos(a) * r, z = Math.sin(a) * r;
                        const dl = Math.sqrt((x - lakeC.x) ** 2 + (z - lakeC.z) ** 2);
                        if (dl < lakeC.r + 3) continue;
                        const hw = rand(0.7, 1.4), hh = rand(0.7, 1.5), hd = rand(0.8, 1.6);
                        const house = new THREE.Group();
                        const body = new THREE.Mesh(new THREE.BoxGeometry(hw, hh, hd), wallMats[i % 4]);
                        body.position.y = hh / 2;
                        house.add(body);
                        if (Math.random() < 0.8) {
                            const roof = new THREE.Mesh(roofGeo, roofMats[i % 4]);
                            roof.scale.set(hw * 0.85, hh * 0.5, hd * 0.85);
                            roof.position.y = hh + hh * 0.25;
                            roof.rotation.y = Math.PI / 4;
                            house.add(roof);
                        }
                        house.position.set(x, cityY + terrainH(x, z) - 0.04, z);
                        house.rotation.y = Math.random() * Math.PI;
                        // 旧市街も一部損壊
                        if (Math.random() < 0.3) {
                            house.rotation.z = rand(-0.14, 0.14);
                            if (Math.random() < 0.5) rubbleSpots.push({ x, z, r: 1.4, n: 3 });
                        }
                        envGroup.add(house);
                    }

                    // ---------- 湖に半分沈んだビル ----------
                    for (let i = 0; i < 5; i++) {
                        const a = rand(-2.4, -1.1);
                        const r = lakeC.r * rand(0.3, 0.8);
                        const x = lakeC.x + Math.cos(a) * r, z = lakeC.z + Math.sin(a) * r;
                        const h = rand(3, 6);
                        const bld = new THREE.Mesh(new THREE.BoxGeometry(rand(1.2, 1.8), h, rand(1.2, 1.8)),
                            [towerMatFor(), towerMatFor(), darkCapMat, darkCapMat, towerMatFor(), towerMatFor()]);
                        bld.position.set(x, cityY - 1 + h * rand(0.15, 0.4), z);
                        bld.rotation.set(rand(-0.4, 0.4), Math.random(), rand(-0.4, 0.4));
                        envGroup.add(bld);
                    }

                    // ---------- 電柱と垂れ下がる電線 ----------
                    const poleMat = new THREE.MeshStandardMaterial({ color: 0x6f665c, roughness: 1 });
                    const poleGeo = new THREE.CylinderGeometry(0.05, 0.07, 2.6, 6);
                    const armGeo = new THREE.BoxGeometry(0.9, 0.05, 0.05);
                    const wireMat = new THREE.LineBasicMaterial({ color: 0x22252b, transparent: true, opacity: 0.85 });
                    const danglers = [];
                    const buildPoleLine = (x0, z0, x1, z1, count) => {
                        const tops = [];
                        for (let i = 0; i < count; i++) {
                            const k = i / (count - 1);
                            const px = x0 + (x1 - x0) * k, pz = z0 + (z1 - z0) * k;
                            const pole = new THREE.Group();
                            const post = new THREE.Mesh(poleGeo, poleMat);
                            post.position.y = 1.3;
                            pole.add(post);
                            const arm = new THREE.Mesh(armGeo, poleMat);
                            arm.position.y = 2.35;
                            pole.add(arm);
                            const groundH = terrainH(px, pz);
                            pole.position.set(px, cityY + groundH - 0.03, pz);
                            // 傾いた電柱、倒れた電柱
                            const broken = Math.random();
                            if (broken < 0.18) {
                                pole.rotation.z = rand(0.9, 1.35);
                                pole.position.y = cityY + groundH + 0.1;
                                tops.push(null);
                            } else {
                                if (broken < 0.5) pole.rotation.z = rand(-0.2, 0.2);
                                const topPos = new THREE.Vector3(px, cityY + groundH + 2.32, pz);
                                tops.push(topPos);
                            }
                            pole.rotation.y = Math.atan2(x1 - x0, z1 - z0);
                            envGroup.add(pole);
                        }
                        // 電線: 隣接する電柱の間をたわみながら結ぶ
                        for (let i = 0; i < tops.length - 1; i++) {
                            if (!tops[i] || !tops[i + 1]) {
                                // 相手を失ってちぎれ、ぶら下がる電線
                                const src = tops[i] || tops[i + 1];
                                if (src) {
                                    const pts = [];
                                    for (let s = 0; s <= 8; s++) {
                                        const k = s / 8;
                                        pts.push(new THREE.Vector3(src.x + k * 0.5, src.y - k * k * 1.8, src.z + k * 0.3));
                                    }
                                    const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), wireMat);
                                    line.userData.baseTilt = 0;
                                    envGroup.add(line);
                                    danglers.push(line);
                                }
                                continue;
                            }
                            [-0.35, 0.35].forEach(off => {
                                const a2 = tops[i].clone(); const b2 = tops[i + 1].clone();
                                const dirN = new THREE.Vector3().subVectors(b2, a2).normalize();
                                const side = new THREE.Vector3(-dirN.z, 0, dirN.x).multiplyScalar(off);
                                a2.add(side); b2.add(side);
                                const mid = a2.clone().lerp(b2, 0.5); mid.y -= 0.45;   // たわみ
                                const curve = new THREE.QuadraticBezierCurve3(a2, mid, b2);
                                const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints(curve.getPoints(10)), wireMat);
                                envGroup.add(line);
                            });
                        }
                    };
                    buildPoleLine(24, -34, 24, 34, 12);
                    buildPoleLine(-34, 24, 34, 24, 12);

                    // ---------- 放置車両(色あせた車・横転車) ----------
                    const carColors = [0x8a4a42, 0x4a5a6a, 0x9a9a92, 0x5a6a52, 0x7a7060, 0xa89a80];
                    const carBodyGeo = new THREE.BoxGeometry(0.5, 0.22, 1.0);
                    const carCabGeo = new THREE.BoxGeometry(0.44, 0.16, 0.55);
                    const cabMat = new THREE.MeshStandardMaterial({ color: 0x1c232c, roughness: 0.5, metalness: 0.2 });
                    for (let i = 0; i < 26; i++) {
                        const car = new THREE.Group();
                        const bodyMat = new THREE.MeshStandardMaterial({
                            color: carColors[i % carColors.length], roughness: 0.85, metalness: 0.1
                        });
                        const body = new THREE.Mesh(carBodyGeo, bodyMat);
                        body.position.y = 0.16;
                        car.add(body);
                        const cab = new THREE.Mesh(carCabGeo, cabMat);
                        cab.position.set(0, 0.33, -0.05);
                        car.add(cab);
                        // 道路上か路肩に配置
                        const onX = Math.random() < 0.5;
                        const lane = [-20, -10, 0, 10, 20][Math.floor(Math.random() * 5)] + rand(-0.7, 0.7);
                        const along = rand(-34, 34);
                        car.position.set(onX ? along : lane, cityY + 0.02, onX ? lane : along);
                        car.rotation.y = (onX ? Math.PI / 2 : 0) + rand(-0.4, 0.4);
                        // 一部は横転・大破
                        const wreck = Math.random();
                        if (wreck < 0.22) { car.rotation.z = Math.PI; car.position.y = cityY + 0.42; }
                        else if (wreck < 0.4) { car.rotation.z = Math.PI / 2; car.position.y = cityY + 0.28; }
                        envGroup.add(car);
                    }

                    // ---------- 枯れ木 ----------
                    const trunkMat = new THREE.MeshStandardMaterial({ color: 0x4c3f34, roughness: 1 });
                    const trunkGeo = new THREE.CylinderGeometry(0.03, 0.09, 1.6, 5);
                    const branchGeo = new THREE.CylinderGeometry(0.015, 0.035, 0.8, 4);
                    for (let i = 0; i < 18; i++) {
                        const tree = new THREE.Group();
                        const trunk = new THREE.Mesh(trunkGeo, trunkMat);
                        trunk.position.y = 0.8;
                        tree.add(trunk);
                        const branches = 2 + Math.floor(Math.random() * 3);
                        for (let b = 0; b < branches; b++) {
                            const br = new THREE.Mesh(branchGeo, trunkMat);
                            br.position.set(rand(-0.1, 0.1), rand(0.9, 1.5), rand(-0.1, 0.1));
                            br.rotation.set(rand(-1, 1), rand(0, Math.PI), rand(0.5, 1.2));
                            tree.add(br);
                        }
                        const a = Math.random() * Math.PI * 2;
                        const r = rand(26, 46);
                        const x = Math.cos(a) * r, z = Math.sin(a) * r;
                        const dl = Math.sqrt((x - lakeC.x) ** 2 + (z - lakeC.z) ** 2);
                        if (dl < lakeC.r + 2) continue;
                        tree.position.set(x, cityY + terrainH(x, z) - 0.03, z);
                        tree.rotation.z = rand(-0.15, 0.15);
                        envGroup.add(tree);
                    }

                    // ---------- バリケード(コンクリート防護壁) ----------
                    const barrierMat = new THREE.MeshStandardMaterial({ color: 0xb5b2a8, roughness: 0.95 });
                    const barrierGeo = new THREE.BoxGeometry(1.1, 0.4, 0.3);
                    for (let i = 0; i < 14; i++) {
                        const bar = new THREE.Mesh(barrierGeo, barrierMat);
                        const onX = Math.random() < 0.5;
                        const lane = [-10, 0, 10][Math.floor(Math.random() * 3)];
                        const along = rand(-26, 26);
                        bar.position.set(onX ? along : lane + rand(-0.8, 0.8), cityY + 0.2, onX ? lane + rand(-0.8, 0.8) : along);
                        bar.rotation.y = rand(0, Math.PI);
                        if (Math.random() < 0.3) { bar.rotation.z = rand(0.6, 1.2); bar.position.y = cityY + 0.3; }
                        envGroup.add(bar);
                    }

                    // ---------- 赤い汚染晶(主クレーターから伸びる結晶群) ----------
                    const crystalMat = new THREE.MeshStandardMaterial({
                        color: 0xc23a30, roughness: 0.2, metalness: 0.1,
                        emissive: 0x5a0e0a, transparent: true, opacity: 0.88
                    });
                    for (let i = 0; i < 9; i++) {
                        const hC = rand(0.6, 2.6);
                        const shard = new THREE.Mesh(new THREE.ConeGeometry(rand(0.12, 0.3), hC, 5), crystalMat);
                        const a = Math.random() * Math.PI * 2, r = rand(0, 6);
                        shard.position.set(18 + Math.cos(a) * r, cityY - 1.6 + hC / 2, -14 + Math.sin(a) * r);
                        shard.rotation.set(rand(-0.35, 0.35), Math.random(), rand(-0.35, 0.35));
                        envGroup.add(shard);
                    }

                    // ---------- 瓦礫と草むら(インスタンシングで大量配置) ----------
                    // ビル倒壊地点+全域に散らばる瓦礫
                    const rubbleCount = 420;
                    const rubbleGeo = new THREE.BoxGeometry(1, 0.7, 1);
                    const rubbleInst = new THREE.InstancedMesh(rubbleGeo, rubbleMat, rubbleCount);
                    {
                        const m4 = new THREE.Matrix4();
                        const q = new THREE.Quaternion();
                        const e = new THREE.Euler();
                        let idx = 0;
                        // 倒壊地点に集中配置
                        rubbleSpots.forEach(spot => {
