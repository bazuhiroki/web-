<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>資格取得管理ダッシュボード</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0C1024;
            --bg-2: #11162e;
            --surface: rgba(255, 255, 255, 0.045);
            --surface-2: rgba(255, 255, 255, 0.08);
            --line: rgba(255, 255, 255, 0.09);
            --ink: #EDEFF8;
            --muted: #8b93b8;
            --shu: #E85B3F;          /* 朱 */
            --shu-deep: #C43F27;
            --kin: #E5B84B;          /* 金 */
            --seiji: #55C6B5;        /* 青磁 */
            --indigo: #6C7BFF;
        }
        html, body { background: var(--bg); color: var(--ink); }
        body {
            font-family: 'Zen Kaku Gothic New', sans-serif;
            background:
                radial-gradient(1100px 600px at 85% -10%, rgba(108,123,255,0.13), transparent 60%),
                radial-gradient(900px 500px at -10% 100%, rgba(232,91,63,0.08), transparent 55%),
                var(--bg);
            background-attachment: fixed;
        }
        /* ページ全体にうっすら星を散らす */
        body::before {
            content: ""; position: fixed; inset: 0; z-index: -1; pointer-events: none;
            background-image:
                radial-gradient(1px 1px at 12% 22%, rgba(255,255,255,.55), transparent 100%),
                radial-gradient(1px 1px at 78% 12%, rgba(255,255,255,.4), transparent 100%),
                radial-gradient(1.5px 1.5px at 55% 45%, rgba(180,195,255,.45), transparent 100%),
                radial-gradient(1px 1px at 32% 72%, rgba(255,255,255,.3), transparent 100%),
                radial-gradient(1px 1px at 90% 62%, rgba(255,220,190,.35), transparent 100%),
                radial-gradient(1.5px 1.5px at 8% 88%, rgba(255,255,255,.3), transparent 100%),
                radial-gradient(1px 1px at 66% 86%, rgba(180,195,255,.35), transparent 100%),
                radial-gradient(1px 1px at 44% 8%, rgba(255,255,255,.4), transparent 100%);
        }
        .font-display { font-family: 'Shippori Mincho', serif; letter-spacing: 0.04em; }
        .font-mono-data { font-family: 'IBM Plex Mono', monospace; font-variant-numeric: tabular-nums; }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.14); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.24); }

        .glass {
            background: linear-gradient(160deg, rgba(255,255,255,0.06), rgba(255,255,255,0.025));
            border: 1px solid var(--line);
            border-radius: 20px;
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            box-shadow: 0 12px 40px -18px rgba(0,0,0,0.6);
        }
        .lift { transition: transform .25s ease, border-color .25s ease, box-shadow .25s ease; }
        .lift:hover {
            transform: translateY(-3px);
            border-color: rgba(255,255,255,0.18);
            box-shadow: 0 20px 50px -18px rgba(0,0,0,0.75);
        }
        .glass-inset {
            background: rgba(0,0,0,0.25);
            border: 1px solid var(--line);
            border-radius: 14px;
        }
        /* 3Dビュー用: 深宇宙の背景 */
        .space-bg {
            background:
                radial-gradient(ellipse 90% 70% at 50% 38%, rgba(40,50,110,0.55), transparent 70%),
                radial-gradient(ellipse 60% 45% at 78% 80%, rgba(120,45,60,0.22), transparent 70%),
                radial-gradient(ellipse 100% 100% at 50% 50%, #0a0d20 0%, #05060f 100%);
            border-radius: 14px;
        }
        /* 3Dビュー用: 真夏の昼、荒廃した要塞都市の空 */
        .city-bg {
            background:
                radial-gradient(ellipse 45% 32% at 62% 10%, rgba(255,255,255,0.9), rgba(255,255,255,0.25) 55%, transparent 75%),
                linear-gradient(180deg,
                    #5d9bd6 0%,
                    #7fb3e2 26%,
                    #a9cdea 48%,
                    #d6e6ee 68%,
                    #ece7d2 84%,
                    #ddd3ae 100%);
            border-radius: 14px;
        }
        .scene-toggle {
            display: inline-flex; gap: 2px; padding: 3px;
            background: rgba(0,0,0,0.35); border: 1px solid var(--line); border-radius: 999px;
        }
        .scene-toggle button {
            padding: .3rem .85rem; border-radius: 999px; font-size: .75rem; font-weight: 700;
            color: var(--muted); transition: color .2s, background .2s, box-shadow .2s;
            white-space: nowrap;
        }
        .scene-toggle button:hover { color: var(--ink); }
        .scene-toggle button.active-space {
            color: #fff; background: linear-gradient(135deg, #4A57D8, #2c3aa8);
            box-shadow: 0 4px 14px -4px rgba(108,123,255,0.6);
        }
        .scene-toggle button.active-city {
            color: #0d2038; background: linear-gradient(135deg, #cfe6f5, #7fb3e2);
            box-shadow: 0 4px 14px -4px rgba(127,179,226,0.7);
        }
        .kpi-num { text-shadow: 0 0 24px currentColor; }

        .field {
            width: 100%;
            background: rgba(0,0,0,0.28);
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 0.55rem 0.8rem;
            color: var(--ink);
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }
        .field:focus { border-color: var(--shu); box-shadow: 0 0 0 3px rgba(232,91,63,0.18); }
        .field::placeholder { color: #5b628a; }
        .field:disabled { opacity: .45; cursor: not-allowed; }
        select.field option { background: var(--bg-2); }
        input[type="date"].field::-webkit-calendar-picker-indicator { filter: invert(0.8); }

        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: .5rem;
            font-weight: 700; border-radius: 12px; padding: .6rem 1.1rem;
            transition: transform .15s ease, box-shadow .2s ease, background .2s ease, opacity .2s;
            border: 1px solid transparent; cursor: pointer;
        }
        .btn:active { transform: translateY(1px) scale(0.99); }
        .btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
        .btn-shu {
            background: linear-gradient(135deg, var(--shu), var(--shu-deep));
            color: #fff; box-shadow: 0 6px 20px -6px rgba(232,91,63,0.55);
        }
        .btn-shu:hover:not(:disabled) { box-shadow: 0 8px 26px -6px rgba(232,91,63,0.75); }
        .btn-ghost { background: var(--surface-2); color: var(--ink); border-color: var(--line); }
        .btn-ghost:hover:not(:disabled) { background: rgba(255,255,255,0.13); }
        .btn-seiji { background: linear-gradient(135deg, #4FBFAE, #2E8F81); color: #fff; box-shadow: 0 6px 20px -6px rgba(85,198,181,0.45); }
        .btn-indigo { background: linear-gradient(135deg, #6C7BFF, #4A57D8); color: #fff; box-shadow: 0 6px 20px -6px rgba(108,123,255,0.5); }
        .btn-kin { background: linear-gradient(135deg, #E5B84B, #C1932E); color: #221a05; }

        .eyebrow {
            font-size: .68rem; letter-spacing: .22em; text-transform: uppercase;
            color: var(--muted); font-weight: 700;
        }

        .tab-btn {
            position: relative; padding: .7rem 1.15rem; border-radius: 999px;
            font-weight: 700; color: var(--muted); transition: color .2s, background .2s;
            font-size: .92rem; white-space: nowrap;
        }
        .tab-btn:hover { color: var(--ink); }
        .tab-btn.active { color: #fff; background: linear-gradient(135deg, var(--shu), var(--shu-deep)); box-shadow: 0 6px 18px -6px rgba(232,91,63,0.6); }

        .file-input::file-selector-button {
            margin-right: 1rem; padding: .5rem 1rem; border-radius: 999px; border: 1px solid var(--line);
            background: var(--surface-2); color: var(--ink); font-weight: 700; font-size: .8rem; cursor: pointer;
            transition: background .2s;
        }
        .file-input::file-selector-button:hover { background: rgba(255,255,255,0.14); }

        input[type=range] { -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.15); outline: none; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none; width: 16px; height: 16px; border-radius: 50%;
            background: var(--kin); border: 2px solid var(--bg); box-shadow: 0 0 0 2px rgba(229,184,75,0.4); cursor: pointer;
        }
        input[type=range]::-moz-range-thumb {
            width: 16px; height: 16px; border-radius: 50%;
            background: var(--kin); border: 2px solid var(--bg); box-shadow: 0 0 0 2px rgba(229,184,75,0.4); cursor: pointer;
        }

        .day-cell { transition: background .15s, color .15s, box-shadow .15s; }
        .day-selected {
            background: linear-gradient(135deg, var(--shu), var(--shu-deep)) !important;
            color: white !important; box-shadow: 0 4px 14px -4px rgba(232,91,63,0.7);
        }

        @keyframes fade-in-scale { from { transform: scale(0.96) translateY(6px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
        .animate-fade-in-scale { animation: fade-in-scale 0.28s cubic-bezier(.2,.9,.3,1.2) forwards; }
        @keyframes fade-up { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-up { animation: fade-up .45s ease both; }
        @media (prefers-reduced-motion: reduce) {
            .animate-fade-in-scale, .fade-up { animation: none; }
            * { transition-duration: 0.01ms !important; }
        }

        .accordion-content { transition: max-height 0.3s ease-out; max-height: 0; overflow: hidden; }
        .accordion-content.open { max-height: 1200px; }

        canvas { display: block; }
        .g3d-tooltip {
            position: absolute; pointer-events: none; z-index: 20;
            background: rgba(10, 13, 30, 0.92); border: 1px solid var(--line); border-radius: 10px;
            padding: .5rem .75rem; font-size: .8rem; line-height: 1.5;
            transform: translate(-50%, calc(-100% - 14px));
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.8);
            white-space: nowrap; opacity: 0; transition: opacity .12s;
        }
        .g3d-tooltip.show { opacity: 1; }

        .stamp {
            display: inline-flex; align-items: center; justify-content: center;
            width: 2.1rem; height: 2.1rem; border-radius: 8px;
            border: 2px solid var(--shu); color: var(--shu);
            font-family: 'Shippori Mincho', serif; font-weight: 800; font-size: 1rem;
            transform: rotate(-6deg);
        }
    </style>
</head>
<body>
    <div id="root" class="min-h-screen"></div>

    <!-- ライブラリ -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/uuid/8.3.2/uuidv4.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo, useRef } = React;
        const { uuidv4, XLSX, Chart } = window;
        const { jsPDF } = window.jspdf;

        const STORAGE_KEY = 'shikaku-dashboard-v2';

        // --- Hooks ---
        const useMediaQuery = (query) => {
            const [matches, setMatches] = useState(() => window.matchMedia(query).matches);
            useEffect(() => {
                const media = window.matchMedia(query);
                const listener = () => setMatches(media.matches);
                media.addEventListener('change', listener);
                return () => media.removeEventListener('change', listener);
            }, [query]);
            return matches;
        };

        // ============================================================
        //  3D 立体バブルチャート (Three.js)
        //  X=難易度 / Y=必要性 / Z=やりがい, 球の大きさ=やりがい
        //  テーマ: space(宇宙) / city(黄昏の都市)
        // ============================================================
        const Bubble3DChart = ({ data, theme = 'space' }) => {
            const mountRef = useRef(null);
            const tooltipRef = useRef(null);
            const stateRef = useRef(null);

            // --- 初期化(1回のみ): カメラ・立方体・操作系 ---
            useEffect(() => {
                const mount = mountRef.current;
                if (!mount || typeof THREE === 'undefined') return;

                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
                camera.position.set(0, 5, 16);

                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                mount.appendChild(renderer.domElement);

                // 基本ライティング
                scene.add(new THREE.AmbientLight(0xffffff, 0.55));
                const key = new THREE.DirectionalLight(0xffffff, 0.9);
                key.position.set(6, 10, 8);
                scene.add(key);

                // テーマ環境を入れるグループ(切替時に丸ごと差し替え)
                const envGroup = new THREE.Group();
                scene.add(envGroup);

                // 全体を回すグループ
                const pivot = new THREE.Group();
                scene.add(pivot);

                const AXIS = 4.5;
                const map = v => (v - 3) * (AXIS / 3); // 1→-3, 3→0, 5→+3

                // --- 発光用ソフトグラデーションテクスチャ ---
                const makeGlowTexture = () => {
                    const cv = document.createElement('canvas');
                    cv.width = cv.height = 128;
                    const ctx = cv.getContext('2d');
                    const g = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
                    g.addColorStop(0, 'rgba(255,255,255,1)');
                    g.addColorStop(0.35, 'rgba(255,255,255,0.4)');
                    g.addColorStop(1, 'rgba(255,255,255,0)');
                    ctx.fillStyle = g;
                    ctx.fillRect(0, 0, 128, 128);
                    return new THREE.CanvasTexture(cv);
                };
                const glowTex = makeGlowTexture();

                // --- 枠(発光するワイヤーキューブ) ---
                const half = map(5) + 0.6;
                const boxGeo = new THREE.BoxGeometry(half * 2, half * 2, half * 2);
                const edges = new THREE.EdgesGeometry(boxGeo);
                const frame = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x8a97e8, transparent: true, opacity: 0.8 }));
                pivot.add(frame);
                const frameGlow = new THREE.LineSegments(edges.clone(), new THREE.LineBasicMaterial({
                    color: 0x4a5ae0, transparent: true, opacity: 0.35, blending: THREE.AdditiveBlending, depthWrite: false
                }));
                frameGlow.scale.setScalar(1.012);
                pivot.add(frameGlow);
                const corners = [];
                [-half, half].forEach(x => [-half, half].forEach(y => [-half, half].forEach(z => {
                    const sp = new THREE.Sprite(new THREE.SpriteMaterial({
                        map: glowTex, color: 0xaeb9ff, transparent: true, opacity: 0.9,
                        blending: THREE.AdditiveBlending, depthWrite: false
                    }));
                    sp.scale.setScalar(0.55);
                    sp.position.set(x, y, z);
                    pivot.add(sp);
                    corners.push(sp);
                })));

                const grid = new THREE.GridHelper(half * 2, 8, 0x39428a, 0x1c2246);
                grid.material.transparent = true;
                grid.material.opacity = 0.5;
                grid.position.y = -half;
                pivot.add(grid);

                // --- 軸ラベル(スプライト) ---
                const makeLabel = (text, color = '#aeb6df', size = 44) => {
                    const cv = document.createElement('canvas');
                    cv.width = 512; cv.height = 128;
                    const ctx = cv.getContext('2d');
                    ctx.font = `700 ${size}px 'Zen Kaku Gothic New', sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.lineWidth = 9;
                    ctx.lineJoin = 'round';
                    ctx.strokeStyle = 'rgba(8, 11, 26, 0.85)';
                    ctx.strokeText(text, 256, 64);
                    ctx.fillStyle = color;
                    ctx.fillText(text, 256, 64);
                    const tex = new THREE.CanvasTexture(cv);
                    tex.minFilter = THREE.LinearFilter;
                    const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false }));
                    sp.scale.set(4, 1, 1);
                    return sp;
                };
                const lx = makeLabel('難易度 →', '#e5b84b'); lx.position.set(0, -half - 0.7, half + 0.6); pivot.add(lx);
                const ly = makeLabel('必要性 ↑', '#55c6b5'); ly.position.set(-half - 1.4, 0, half + 0.6); pivot.add(ly);
                const lz = makeLabel('やりがい →', '#e85b3f'); lz.position.set(-half - 1.4, -half - 0.7, 0); pivot.add(lz);
                for (let v = 1; v <= 5; v += 2) {
                    const tnum = makeLabel(String(v), '#5b628a', 52);
                    tnum.scale.set(1.4, 0.35, 1);
                    tnum.position.set(map(v), -half - 0.25, half + 0.4);
                    pivot.add(tnum);
                }

                const bubbleGroup = new THREE.Group();
                pivot.add(bubbleGroup);

                const raycaster = new THREE.Raycaster();
                const pointer = new THREE.Vector2(-10, -10);

                const st = {
                    scene, camera, renderer, pivot, envGroup, bubbleGroup, raycaster, pointer, map, glowTex, half,
                    frame, frameGlow, grid, corners,
                    autoRotate: true, isDragging: false, lastX: 0, lastY: 0,
                    rotX: 0.25, rotY: 0.6, dist: 16, hovered: null, disposed: false, spheres: [],
                    env: null
                };
                stateRef.current = st;

                // --- 操作: ドラッグ回転 / ホイールズーム ---
                const el = renderer.domElement;
                el.style.touchAction = 'none';
                el.style.cursor = 'grab';

                const onDown = (e) => {
                    st.isDragging = true; st.autoRotate = false;
                    st.lastX = e.clientX; st.lastY = e.clientY;
                    el.style.cursor = 'grabbing';
                    el.setPointerCapture(e.pointerId);
                };
                const onMove = (e) => {
                    const rect = el.getBoundingClientRect();
                    st.pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
                    st.pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
                    st.clientX = e.clientX - rect.left;
                    st.clientY = e.clientY - rect.top;
                    if (st.isDragging) {
                        st.rotY += (e.clientX - st.lastX) * 0.006;
                        st.rotX += (e.clientY - st.lastY) * 0.004;
                        st.rotX = Math.max(-1.2, Math.min(1.2, st.rotX));
                        st.lastX = e.clientX; st.lastY = e.clientY;
                    }
                };
                const onUp = () => {
                    st.isDragging = false;
                    el.style.cursor = 'grab';
                    setTimeout(() => { if (!st.isDragging) st.autoRotate = true; }, 2500);
                };
                const onWheel = (e) => {
                    e.preventDefault();
                    st.dist = Math.max(8, Math.min(30, st.dist + e.deltaY * 0.015));
                };
                const onLeave = () => { st.pointer.set(-10, -10); };

                el.addEventListener('pointerdown', onDown);
                el.addEventListener('pointermove', onMove);
                el.addEventListener('pointerup', onUp);
                el.addEventListener('pointerleave', onLeave);
                el.addEventListener('wheel', onWheel, { passive: false });

                // --- リサイズ ---
                const resize = () => {
                    const w = mount.clientWidth, h = mount.clientHeight;
                    if (!w || !h) return;
                    camera.aspect = w / h;
                    camera.updateProjectionMatrix();
                    renderer.setSize(w, h);
                };
                resize();
                const ro = new ResizeObserver(resize);
                ro.observe(mount);

                // --- レンダーループ ---
                const clock = new THREE.Clock();
                const animate = () => {
                    if (st.disposed) return;
                    requestAnimationFrame(animate);
                    const dt = clock.getDelta();
                    const t = clock.getElapsedTime();

                    if (st.autoRotate) st.rotY += dt * 0.18;
                    pivot.rotation.y += (st.rotY - pivot.rotation.y) * 0.08;
                    pivot.rotation.x += (st.rotX - pivot.rotation.x) * 0.08;

                    // カメラに漂うような浮遊感を与える
                    const driftX = Math.sin(t * 0.22) * 0.5;
                    const driftY = st.dist * 0.28 + Math.sin(t * 0.31) * 0.35;
                    camera.position.set(driftX, driftY, st.dist);
                    camera.lookAt(0, 0, 0);

                    // --- テーマ別アニメーション ---
                    const env = st.env;
                    if (env) {
                        if (env.type === 'space') {
                            env.starsFar.rotation.y -= dt * 0.008;
                            env.starsNear.rotation.y += dt * 0.015;
                            env.starsNear.material.opacity = 0.45 + Math.sin(t * 0.8) * 0.12;
                            env.planets.forEach(p => { p.rotation.y += dt * p.userData.spin; });
                            env.moonPivots.forEach((mp, i) => { mp.rotation.y += dt * (0.25 + i * 0.1); });
                            // 流れ星: 約9秒周期で一瞬走る
                            const cyc = t % 9;
                            if (cyc < 1.1) {
                                const p = cyc / 1.1;
                                env.shootingStar.position.set(-30 + p * 55, 20 - p * 9, -32);
                                env.shootingStar.material.opacity = Math.sin(p * Math.PI) * 0.9;
                            } else {
                                env.shootingStar.material.opacity = 0;
                            }
                        } else if (env.type === 'city') {
                            // 積雲がゆっくり流れる
                            env.clouds.forEach(c => {
                                c.position.x += dt * c.userData.speed;
                                if (c.position.x > 70) c.position.x = -70;
                            });
                            // 地表の砂塵がゆらめく
                            env.dust.forEach((d, i) => {
                                d.material.opacity = d.userData.baseOp + Math.sin(t * 0.5 + i * 2.1) * 0.05;
                                d.position.x += dt * 0.35;
                                if (d.position.x > 55) d.position.x = -55;
                            });
                        }
                    }

                    // 浮遊アニメーション
                    st.spheres.forEach((m, i) => {
                        m.position.y = m.userData.baseY + Math.sin(t * 1.2 + i * 1.7) * 0.07;
                        const s = m.userData.baseScale * (st.hovered === m ? 1.25 : 1);
                        m.scale.x += (s - m.scale.x) * 0.15;
                        m.scale.y = m.scale.z = m.scale.x;
                    });

                    // ホバー判定
                    raycaster.setFromCamera(st.pointer, camera);
                    const hits = raycaster.intersectObjects(st.spheres, false);
                    const tip = tooltipRef.current;
                    if (hits.length > 0) {
                        st.hovered = hits[0].object;
                        const d = st.hovered.userData;
                        if (tip) {
                            tip.innerHTML = `<div class="font-bold text-sm mb-0.5">${d.name}</div>` +
                                `<span style="color:#e5b84b">難易度 ${d.difficulty}</span> ・ ` +
                                `<span style="color:#55c6b5">必要性 ${d.necessity}</span> ・ ` +
                                `<span style="color:#e85b3f">やりがい ${d.gai}</span>`;
                            tip.style.left = st.clientX + 'px';
                            tip.style.top = st.clientY + 'px';
                            tip.classList.add('show');
                        }
                        el.style.cursor = 'pointer';
                    } else {
                        st.hovered = null;
                        if (tip) tip.classList.remove('show');
                        if (!st.isDragging) el.style.cursor = 'grab';
                    }

                    renderer.render(scene, camera);
                };
                animate();

                return () => {
                    st.disposed = true;
                    ro.disconnect();
                    el.removeEventListener('pointerdown', onDown);
                    el.removeEventListener('pointermove', onMove);
                    el.removeEventListener('pointerup', onUp);
                    el.removeEventListener('pointerleave', onLeave);
                    el.removeEventListener('wheel', onWheel);
                    renderer.dispose();
                    if (renderer.domElement.parentNode) renderer.domElement.parentNode.removeChild(renderer.domElement);
                };
            }, []);

            // --- テーマ環境の構築(切替時に丸ごと差し替え) ---
            useEffect(() => {
                const st = stateRef.current;
                if (!st) return;
                const { envGroup, glowTex, half } = st;

                // 既存環境を破棄
                const disposeObj = (obj) => {
                    if (obj.geometry) obj.geometry.dispose();
                    if (obj.material) {
                        (Array.isArray(obj.material) ? obj.material : [obj.material]).forEach(m => {
                            if (m.map && m.map !== glowTex) m.map.dispose();
                            m.dispose();
                        });
                    }
                };
                while (envGroup.children.length) {
                    const child = envGroup.children[0];
                    child.traverse(disposeObj);
                    envGroup.remove(child);
                }

                // 立方体・グリッドの見た目をテーマに合わせる(昼景では濃色に)
                if (theme === 'space') {
                    st.frame.material.color.setHex(0x8a97e8); st.frame.material.opacity = 0.8;
                    st.frameGlow.material.opacity = 0.35;
                    st.corners.forEach(c => { c.material.opacity = 0.9; });
                    st.grid.material.opacity = 0.5;
                } else {
                    st.frame.material.color.setHex(0x1d2b4a); st.frame.material.opacity = 0.95;
                    st.frameGlow.material.opacity = 0;
                    st.corners.forEach(c => { c.material.opacity = 0.12; });
                    st.grid.material.opacity = 0.75;
                }

                const makeStars = (count, radiusMin, radiusMax, size, opacity, colorHex = 0xdde4ff) => {
                    const pos = new Float32Array(count * 3);
                    for (let i = 0; i < count; i++) {
                        const r = radiusMin + Math.random() * (radiusMax - radiusMin);
                        const theta = Math.random() * Math.PI * 2;
                        const phi = Math.acos(2 * Math.random() - 1);
                        pos[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
                        pos[i * 3 + 1] = r * Math.cos(phi);
                        pos[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
                    }
                    const geo = new THREE.BufferGeometry();
                    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
                    const mat = new THREE.PointsMaterial({
                        size, map: glowTex, transparent: true, opacity,
                        color: colorHex, blending: THREE.AdditiveBlending,
                        depthWrite: false, sizeAttenuation: true
                    });
                    return new THREE.Points(geo, mat);
                };
                const makeNebula = (hex, scale, x, y, z, op) => {
                    const sp = new THREE.Sprite(new THREE.SpriteMaterial({
                        map: glowTex, color: hex, transparent: true, opacity: op,
                        blending: THREE.AdditiveBlending, depthWrite: false
                    }));
                    sp.scale.set(scale, scale * 0.7, 1);
                    sp.position.set(x, y, z);
                    return sp;
                };

                if (theme === 'space') {
                    // ================= 宇宙テーマ =================
                    const starsFar = makeStars(900, 28, 60, 0.55, 0.75);
                    const starsNear = makeStars(220, 14, 26, 0.9, 0.55);
                    envGroup.add(starsFar, starsNear);

                    envGroup.add(makeNebula(0x3646a8, 46, -20, 8, -34, 0.30));
                    envGroup.add(makeNebula(0x7a2b3c, 34, 22, -10, -30, 0.22));
                    envGroup.add(makeNebula(0x1e6e64, 26, 6, 16, -38, 0.16));

                    const planets = [];
                    const moonPivots = [];

                    // 遠くの太陽
                    const sun = new THREE.Sprite(new THREE.SpriteMaterial({
                        map: glowTex, color: 0xffd9a0, transparent: true, opacity: 0.9,
                        blending: THREE.AdditiveBlending, depthWrite: false
                    }));
                    sun.scale.setScalar(14);
                    sun.position.set(-38, 20, -52);
                    envGroup.add(sun);
                    const sunLight = new THREE.PointLight(0xffe0b0, 0.45, 200);
                    sunLight.position.copy(sun.position);
                    envGroup.add(sunLight);

                    // 環のある惑星(土星風)
                    const ringed = new THREE.Group();
                    const ringedBody = new THREE.Mesh(
                        new THREE.SphereGeometry(2.6, 40, 40),
                        new THREE.MeshStandardMaterial({ color: 0xd8b06a, roughness: 0.75, metalness: 0.1, emissive: 0x3a2c12 })
                    );
                    ringed.add(ringedBody);
                    const ring = new THREE.Mesh(
                        new THREE.RingGeometry(3.4, 5.4, 72),
                        new THREE.MeshBasicMaterial({ color: 0xcbb488, transparent: true, opacity: 0.5, side: THREE.DoubleSide })
                    );
                    ring.rotation.x = Math.PI / 2.35;
                    ringed.add(ring);
                    ringed.position.set(-24, 9, -30);
                    ringed.rotation.z = 0.28;
                    ringed.userData.spin = 0.05;
                    envGroup.add(ringed);
                    planets.push(ringed);

                    // 青いガス惑星 + 衛星
                    const gas = new THREE.Group();
                    const gasBody = new THREE.Mesh(
                        new THREE.SphereGeometry(1.9, 40, 40),
                        new THREE.MeshStandardMaterial({ color: 0x4a7dd8, roughness: 0.5, metalness: 0.2, emissive: 0x0d1e46 })
                    );
                    gas.add(gasBody);
                    const gasHalo = new THREE.Sprite(new THREE.SpriteMaterial({
                        map: glowTex, color: 0x5a8ae8, transparent: true, opacity: 0.4,
                        blending: THREE.AdditiveBlending, depthWrite: false
                    }));
                    gasHalo.scale.setScalar(6);
                    gas.add(gasHalo);
                    const moonPivot = new THREE.Group();
                    const moon = new THREE.Mesh(
                        new THREE.SphereGeometry(0.42, 24, 24),
                        new THREE.MeshStandardMaterial({ color: 0xb8bcc8, roughness: 0.9 })
                    );
                    moon.position.set(3.4, 0.4, 0);
                    moonPivot.add(moon);
                    gas.add(moonPivot);
                    gas.position.set(23, -5, -26);
                    gas.userData.spin = 0.09;
                    envGroup.add(gas);
                    planets.push(gas);
                    moonPivots.push(moonPivot);

                    // 小さな赤い惑星
                    const red = new THREE.Group();
                    red.add(new THREE.Mesh(
                        new THREE.SphereGeometry(0.95, 32, 32),
                        new THREE.MeshStandardMaterial({ color: 0xc4573a, roughness: 0.85, emissive: 0x2c0d06 })
                    ));
                    red.position.set(11, 13, -32);
                    red.userData.spin = 0.14;
                    envGroup.add(red);
                    planets.push(red);

                    // 流れ星
                    const shootingStar = new THREE.Sprite(new THREE.SpriteMaterial({
                        map: glowTex, color: 0xffffff, transparent: true, opacity: 0,
                        blending: THREE.AdditiveBlending, depthWrite: false
                    }));
                    shootingStar.scale.set(2.6, 0.5, 1);
                    envGroup.add(shootingStar);

                    st.env = { type: 'space', starsFar, starsNear, planets, moonPivots, shootingStar };

                } else {
                    // ================= 真夏の昼・荒廃した要塞都市テーマ =================
                    const cityY = -half - 6;   // 地表の高さ(立方体は街の上空に浮かぶ)

                    // --- 真夏の強い日差し ---
                    const sunLight = new THREE.DirectionalLight(0xfff3dc, 1.15);
                    sunLight.position.set(24, 34, 14);
                    envGroup.add(sunLight);
                    const skyFill = new THREE.HemisphereLight(0xbfdcf5, 0x9a8f68, 0.85);
                    envGroup.add(skyFill);

                    // 太陽のぎらつき
                    const glare = new THREE.Sprite(new THREE.SpriteMaterial({
                        map: glowTex, color: 0xffffff, transparent: true, opacity: 0.85,
                        blending: THREE.AdditiveBlending, depthWrite: false
                    }));
                    glare.scale.setScalar(24);
                    glare.position.set(26, 24, -44);
                    envGroup.add(glare);

                    // --- 積雲(白いスプライトの塊、ゆっくり流れる) ---
                    const clouds = [];
                    for (let i = 0; i < 6; i++) {
                        const cluster = new THREE.Group();
                        const puffs = 3 + Math.floor(Math.random() * 3);
                        for (let p = 0; p < puffs; p++) {
                            const puff = new THREE.Sprite(new THREE.SpriteMaterial({
                                map: glowTex, color: 0xffffff, transparent: true,
                                opacity: 0.5 + Math.random() * 0.3, depthWrite: false
                            }));
                            const s = 5 + Math.random() * 7;
                            puff.scale.set(s * 1.6, s * 0.8, 1);
                            puff.position.set((p - puffs / 2) * s * 0.8, Math.random() * 1.5, Math.random() * 2);
                            cluster.add(puff);
                        }
                        cluster.position.set(-70 + Math.random() * 140, 9 + Math.random() * 12, -46 + Math.random() * 26);
                        cluster.userData.speed = 0.4 + Math.random() * 0.6;
                        envGroup.add(cluster);
                        clouds.push(cluster);
                    }

                    // --- 枯草色の野原(盆地の地面) ---
                    const ground = new THREE.Mesh(
                        new THREE.PlaneGeometry(240, 240),
                        new THREE.MeshStandardMaterial({ color: 0xc7b98d, roughness: 1 })
                    );
                    ground.rotation.x = -Math.PI / 2;
                    ground.position.y = cityY - 0.03;
                    envGroup.add(ground);

                    // 赤く汚染された地面のしみ
                    for (let i = 0; i < 7; i++) {
                        const stain = new THREE.Mesh(
                            new THREE.CircleGeometry(2.5 + Math.random() * 7, 26),
                            new THREE.MeshBasicMaterial({ color: 0xa8322a, transparent: true, opacity: 0.28 + Math.random() * 0.2 })
                        );
                        stain.rotation.x = -Math.PI / 2;
                        const a = Math.random() * Math.PI * 2, r = 8 + Math.random() * 34;
                        stain.position.set(Math.cos(a) * r, cityY - 0.01, Math.sin(a) * r);
                        envGroup.add(stain);
                    }

                    // 街路グリッド(乾いた道路)
                    const roads = new THREE.GridHelper(96, 24, 0x6e6552, 0x9c937a);
                    roads.material.transparent = true;
                    roads.material.opacity = 0.45;
                    roads.position.y = cityY;
                    envGroup.add(roads);

                    // --- 湖(盆地の片側) ---
                    const lake = new THREE.Mesh(
                        new THREE.CircleGeometry(30, 48),
                        new THREE.MeshStandardMaterial({ color: 0x5f96c2, roughness: 0.25, metalness: 0.35 })
                    );
                    lake.rotation.x = -Math.PI / 2;
                    lake.position.set(-14, cityY + 0.02, 58);
                    envGroup.add(lake);

                    // --- 外輪山(盆地を囲む青く霞んだ山並み) ---
                    const mountainMat = new THREE.MeshStandardMaterial({ color: 0x8ba3b4, roughness: 1, flatShading: true });
                    const mountainMatFar = new THREE.MeshStandardMaterial({ color: 0xa9becb, roughness: 1, flatShading: true });
                    for (let i = 0; i < 14; i++) {
                        const a = (i / 14) * Math.PI * 2 + Math.random() * 0.3;
                        const r = 72 + Math.random() * 22;
                        const hM = 10 + Math.random() * 12;
                        const m = new THREE.Mesh(
                            new THREE.ConeGeometry(16 + Math.random() * 14, hM, 5 + Math.floor(Math.random() * 3)),
                            Math.random() < 0.5 ? mountainMat : mountainMatFar
                        );
                        m.position.set(Math.cos(a) * r, cityY + hM / 2 - 0.5, Math.sin(a) * r);
                        m.rotation.y = Math.random() * Math.PI;
                        envGroup.add(m);
                    }

                    // --- ビルの外壁テクスチャ(昼のコンクリート+暗い窓、一部破損) ---
                    const makeTowerTexture = (base, winColor, brokenRatio) => {
                        const cv = document.createElement('canvas');
                        cv.width = 64; cv.height = 128;
                        const ctx = cv.getContext('2d');
                        ctx.fillStyle = base;
                        ctx.fillRect(0, 0, 64, 128);
                        // 窓の帯
                        for (let y = 6; y < 122; y += 9) {
                            for (let x = 5; x < 58; x += 9) {
                                if (Math.random() < 0.92) {
                                    ctx.fillStyle = Math.random() < brokenRatio ? '#11151c' : winColor;
                                    ctx.fillRect(x, y, 5, 5);
                                }
                            }
                        }
                        // 煤や雨だれの汚れ
                        for (let s = 0; s < 5; s++) {
                            ctx.fillStyle = `rgba(40, 40, 45, ${0.08 + Math.random() * 0.14})`;
                            const sx = Math.random() * 60;
                            ctx.fillRect(sx, Math.random() * 30, 2 + Math.random() * 3, 60 + Math.random() * 60);
                        }
                        const tex = new THREE.CanvasTexture(cv);
                        tex.magFilter = THREE.NearestFilter;
                        return tex;
                    };
                    const towerTextures = [
                        makeTowerTexture('#c4cad1', '#33404f', 0.15), makeTowerTexture('#b7bec6', '#2c3a49', 0.3),
                        makeTowerTexture('#cdd2d8', '#3a4757', 0.1),  makeTowerTexture('#aeb5bd', '#27333f', 0.45),
                        makeTowerTexture('#c9c4b6', '#3e4a52', 0.25), makeTowerTexture('#bfc6cd', '#303d4c', 0.55)
                    ];
                    const concreteTop = new THREE.MeshStandardMaterial({ color: 0x9aa1a9, roughness: 0.95 });
                    const rubbleMat = new THREE.MeshStandardMaterial({ color: 0x8f8f93, roughness: 1 });
                    const darkCapMat = new THREE.MeshStandardMaterial({ color: 0x4a4f57, roughness: 1 });

                    const addTower = (x, z, w, h, d, damage) => {
                        const sideMat = new THREE.MeshStandardMaterial({
                            map: towerTextures[Math.floor(Math.random() * towerTextures.length)],
                            roughness: 0.88
                        });
                        const bld = new THREE.Mesh(
                            new THREE.BoxGeometry(w, h, d),
                            [sideMat, sideMat, concreteTop, concreteTop, sideMat, sideMat]
                        );
                        bld.position.set(x, cityY + h / 2, z);
                        bld.rotation.y = Math.floor(Math.random() * 4) * (Math.PI / 2);
                        // 荒廃: 一部のビルは傾き、頂部が崩れる
                        if (damage > 0.72) {
                            bld.rotation.z = (Math.random() - 0.5) * 0.22;
                            bld.rotation.x = (Math.random() - 0.5) * 0.1;
                            bld.position.y -= h * 0.05;
                        } else if (damage > 0.5) {
                            const cap = new THREE.Mesh(
                                new THREE.BoxGeometry(w * (0.4 + Math.random() * 0.4), h * 0.14, d * (0.4 + Math.random() * 0.4)),
                                darkCapMat
                            );
                            cap.position.set((Math.random() - 0.5) * w * 0.4, h / 2 + h * 0.05, (Math.random() - 0.5) * d * 0.4);
                            cap.rotation.set(Math.random() * 0.4, Math.random(), Math.random() * 0.4);
                            bld.add(cap);
                        }
                        envGroup.add(bld);
                    };

                    // 新市街: 整然と並ぶ同型の要塞ビル群(格子配置)
                    for (let gx = -3; gx <= 3; gx++) {
                        for (let gz = -3; gz <= 3; gz++) {
                            const r = Math.sqrt(gx * gx + gz * gz);
                            if (r < 1.4 || Math.random() < 0.18) continue; // 中央は空ける・歯抜けも作る
                            const x = gx * 5 + (Math.random() - 0.5) * 1.2;
                            const z = gz * 5 + (Math.random() - 0.5) * 1.2;
                            const h = 6.5 + Math.random() * 3.5;
                            addTower(x, z, 1.7 + Math.random() * 0.5, h, 1.7 + Math.random() * 0.5, Math.random());
                        }
                    }
                    // 旧市街: 外周に散らばる低層の街並み
                    for (let i = 0; i < 90; i++) {
                        const a = Math.random() * Math.PI * 2;
                        const r = 22 + Math.random() * 26;
                        const x = Math.cos(a) * r, z = Math.sin(a) * r;
                        if (z > 34 && x < 8) continue; // 湖の上には建てない
                        addTower(x, z, 0.9 + Math.random() * 1.4, 0.8 + Math.random() * 2.4, 0.9 + Math.random() * 1.4, Math.random() * 0.6);
                    }

                    // 倒壊したビルのスラブと瓦礫
                    for (let i = 0; i < 8; i++) {
                        const a = Math.random() * Math.PI * 2;
                        const r = 10 + Math.random() * 26;
                        const slab = new THREE.Mesh(
                            new THREE.BoxGeometry(1.4 + Math.random(), 0.5, 4 + Math.random() * 4),
                            rubbleMat
                        );
                        slab.position.set(Math.cos(a) * r, cityY + 0.35, Math.sin(a) * r);
                        slab.rotation.set((Math.random() - 0.5) * 0.5, Math.random() * Math.PI, (Math.random() - 0.5) * 0.35);
                        envGroup.add(slab);
                    }
                    for (let i = 0; i < 46; i++) {
                        const a = Math.random() * Math.PI * 2;
                        const r = 6 + Math.random() * 34;
                        const s = 0.15 + Math.random() * 0.35;
                        const rock = new THREE.Mesh(new THREE.BoxGeometry(s, s * 0.7, s), rubbleMat);
                        rock.position.set(Math.cos(a) * r, cityY + s * 0.35, Math.sin(a) * r);
                        rock.rotation.set(Math.random(), Math.random(), Math.random());
                        envGroup.add(rock);
                    }

                    // --- 地表を漂う砂塵の靄 ---
                    const dust = [];
                    for (let i = 0; i < 4; i++) {
                        const d = new THREE.Sprite(new THREE.SpriteMaterial({
                            map: glowTex, color: 0xe9dfc2, transparent: true,
                            opacity: 0.16 + Math.random() * 0.08, depthWrite: false
                        }));
                        d.scale.set(34 + Math.random() * 22, 5 + Math.random() * 3, 1);
                        d.position.set(-55 + Math.random() * 110, cityY + 2 + Math.random() * 2, -20 + Math.random() * 44);
                        d.userData.baseOp = d.material.opacity;
                        envGroup.add(d);
                        dust.push(d);
                    }

                    st.env = { type: 'city', clouds, dust };
                }
            }, [theme]);

            // --- データ更新時に球を作り直す ---
            useEffect(() => {
                const st = stateRef.current;
                if (!st) return;
                st.spheres.forEach(m => {
                    m.children.forEach(ch => ch.material && ch.material.dispose());
                    m.geometry.dispose(); m.material.dispose(); st.bubbleGroup.remove(m);
                });
                st.spheres = [];

                const geo = new THREE.SphereGeometry(1, 32, 32);
                data.forEach(cert => {
                    // やりがいで色相を変化 (青磁 → 金 → 朱)
                    const hue = 0.52 - ((cert.gai - 1) / 4) * 0.47;
                    const color = new THREE.Color().setHSL(hue, 0.72, 0.58);
                    const mat = new THREE.MeshStandardMaterial({
                        color, roughness: 0.2, metalness: 0.4,
                        emissive: color.clone().multiplyScalar(0.35),
                        transparent: true, opacity: 0.95
                    });
                    const mesh = new THREE.Mesh(geo.clone(), mat);
                    const baseScale = 0.22 + cert.gai * 0.09;
                    mesh.position.set(st.map(cert.difficulty), st.map(cert.necessity), st.map(cert.gai));
                    mesh.userData = {
                        name: cert.name, difficulty: cert.difficulty, necessity: cert.necessity,
                        gai: cert.gai, baseY: st.map(cert.necessity), baseScale
                    };
                    mesh.scale.setScalar(baseScale);

                    const halo = new THREE.Sprite(new THREE.SpriteMaterial({
                        map: st.glowTex, color: color.clone().multiplyScalar(1.2),
                        transparent: true, opacity: 0.55,
                        blending: THREE.AdditiveBlending, depthWrite: false
                    }));
                    halo.scale.setScalar(3.2);
                    mesh.add(halo);

                    st.bubbleGroup.add(mesh);
                    st.spheres.push(mesh);
                });
            }, [data]);

            const overlayColor = theme === 'city' ? 'rgba(25, 38, 58, 0.72)' : 'var(--muted)';
            return (
                <div className="relative w-full h-full" ref={mountRef}>
                    <div ref={tooltipRef} className="g3d-tooltip"></div>
                    {(!data || data.length === 0) && (
                        <div className="absolute inset-0 flex flex-col items-center justify-center text-center p-4 z-10 pointer-events-none">
                            <div className="text-4xl mb-3 opacity-40" style={{color: overlayColor}}>◍</div>
                            <p className="text-sm" style={{color: overlayColor}}>表示するデータがありません。<br/>資格情報を追加またはアップロードしてください。</p>
                        </div>
                    )}
                    <div className="absolute bottom-3 right-4 text-[11px] font-mono-data pointer-events-none" style={{color: overlayColor}}>
                        ドラッグ: 回転 / ホイール: ズーム / ホバー: 詳細
                    </div>
                </div>
            );
        };

        // --- 進捗ドーナツ ---
        const ProgressDoughnutChart = ({ progressPercent }) => {
            const canvasRef = useRef(null);
            const chartRef = useRef(null);
            useEffect(() => {
                const cv = canvasRef.current;
                if (!cv || typeof Chart === 'undefined') return;
                if (chartRef.current) chartRef.current.destroy();
                const ctx = cv.getContext('2d');
                const grad = ctx.createLinearGradient(0, 0, 140, 140);
                grad.addColorStop(0, '#E85B3F');
                grad.addColorStop(1, '#E5B84B');
                chartRef.current = new Chart(ctx, {
                    type: 'doughnut',
                    data: { datasets: [{
                        data: [progressPercent, 100 - progressPercent],
                        backgroundColor: [grad, 'rgba(255,255,255,0.07)'],
                        borderColor: 'transparent', borderWidth: 0,
                        borderRadius: progressPercent > 0 && progressPercent < 100 ? 10 : 0,
                    }]},
                    options: {
                        responsive: true, maintainAspectRatio: false, cutout: '76%',
                        plugins: { legend: { display: false }, tooltip: { enabled: false } }
                    }
                });
            }, [progressPercent]);
            return (
                <div className="relative w-full h-full flex items-center justify-center">
                    <canvas ref={canvasRef}></canvas>
                    <div className="absolute flex flex-col items-center justify-center">
                        <span className="text-2xl md:text-3xl font-bold font-mono-data">{progressPercent.toFixed(1)}<span className="text-sm">%</span></span>
                        <span className="text-[11px]" style={{color: 'var(--muted)'}}>進捗率</span>
                    </div>
                </div>
            );
        };

        // --- アコーディオン (モバイル用) ---
        const Accordion = ({ title, children, defaultOpen = false }) => {
            const [isOpen, setIsOpen] = useState(defaultOpen);
            return (
                <div className="glass overflow-hidden">
                    <button onClick={() => setIsOpen(!isOpen)} className="w-full flex justify-between items-center p-4 text-left">
                        <h3 className="font-bold">{title}</h3>
                        <span className={`text-xs transition-transform duration-300 ${isOpen ? 'rotate-180' : ''}`} style={{color: 'var(--muted)'}}>▼</span>
                    </button>
                    <div className={`accordion-content ${isOpen ? 'open' : ''}`}>
                        <div className="p-4 pt-0">{children}</div>
                    </div>
                </div>
            );
        };

        const SectionCard = ({ eyebrow, title, children, className = '' }) => (
            <div className={`glass lift p-5 ${className}`}>
                {eyebrow && <div className="eyebrow mb-1">{eyebrow}</div>}
                {title && <h3 className="font-display text-lg font-bold mb-4">{title}</h3>}
                {children}
            </div>
        );

        // ============================================================
        //  AIレポート モーダル
        // ============================================================
        const AIReportModal = ({
            isOpen, onClose, reporter, setReporter, generateReport, generateComprehensiveReport,
            loadingReport, report, handlePdfExport, handleSaveReportToCalendar, selectedDate, currentCertId
        }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="glass p-6 w-full max-w-sm md:max-w-3xl animate-fade-in-scale" style={{background: 'rgba(17,22,46,0.92)'}}>
                        <div className="flex justify-between items-center mb-5">
                            <div>
                                <div className="eyebrow">AI Report</div>
                                <h3 className="font-display text-xl md:text-2xl font-bold">AIレポート</h3>
                            </div>
                            <button onClick={onClose} className="text-3xl leading-none hover:opacity-70 transition-opacity" style={{color: 'var(--muted)'}}>&times;</button>
                        </div>

                        <div className="flex flex-col md:flex-row gap-6">
                            <div className="w-full md:w-1/3 space-y-4 flex flex-col">
                                <div>
                                    <label className="text-sm font-bold mb-2 block">AIレポーター設定</label>
                                    <input type="text" value={reporter} onChange={(e) => setReporter(e.target.value)}
                                        placeholder="例:熱血コーチ" className="field" />
                                </div>
                                <div className="space-y-2 mt-auto">
                                    <button onClick={generateReport} className="btn btn-seiji w-full" disabled={loadingReport || !currentCertId}>
                                        {loadingReport ? '生成中...' : '個別レポートを生成'}
                                    </button>
                                    <button onClick={generateComprehensiveReport} className="btn btn-indigo w-full" disabled={loadingReport}>
                                        {loadingReport ? '生成中...' : '総合レポートを生成'}
                                    </button>
                                    {!currentCertId && <p className="text-xs text-center pt-1" style={{color: 'var(--kin)'}}>個別レポートには「進捗管理」タブでの資格選択が必要です。</p>}
                                </div>
                            </div>

                            <div className="w-full md:w-2/3 glass-inset p-4 h-80 md:h-96 overflow-y-auto">
                                {loadingReport ? (
                                    <div className="flex items-center justify-center h-full" style={{color: 'var(--muted)'}}>レポートを生成中...</div>
                                ) : report ? (
                                    <div id="report-content" className="whitespace-pre-wrap leading-relaxed text-sm" dangerouslySetInnerHTML={{ __html: report.replace(/\n/g, '<br />') }}></div>
                                ) : (
                                    <div className="flex items-center justify-center h-full text-sm" style={{color: 'var(--muted)'}}>ここにレポートが表示されます。</div>
                                )}
                            </div>
                        </div>

                        {report && !loadingReport && (
                            <div className="flex flex-col sm:flex-row justify-end gap-3 mt-6 pt-4" style={{borderTop: '1px solid var(--line)'}}>
                                <button onClick={handlePdfExport} className="btn btn-ghost">PDF出力</button>
                                <button onClick={handleSaveReportToCalendar} disabled={!selectedDate} className="btn btn-shu">選択中の日付に保存</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // ============================================================
        //  タブ1: 優先順位
        // ============================================================
        const PrioritizationTab = ({ data, filters, handleFilterChange, certForm, handleFormChange, handleAddUpdateCert, editingCert, setEditingCert, handleCertFileUpload, handleDeleteCert }) => {
            const isDesktop = useMediaQuery('(min-width: 1024px)');
            const [sceneTheme, setSceneTheme] = useState('space');
            const filteredCerts = useMemo(() => {
                return data.certifications.filter(cert =>
                    cert.difficulty >= filters.difficulty.min && cert.difficulty <= filters.difficulty.max &&
                    cert.necessity >= filters.necessity.min && cert.necessity <= filters.necessity.max &&
                    cert.gai >= filters.gai.min && cert.gai <= filters.gai.max
                );
            }, [data.certifications, filters]);

            const labels = { difficulty: '難易度', necessity: '必要性', gai: 'やりがい' };

            const uploadSection = (
                <div>
                    <p className="text-xs mb-3 leading-relaxed" style={{color: 'var(--muted)'}}>Excel(.xlsx)またはJSON(.json)形式。<br/>Excel: A列=資格名, B=難易度, C=必要性, D=やりがい (2行目から)</p>
                    <input type="file" accept=".json,.xlsx,.xls" onChange={handleCertFileUpload} className="file-input block w-full text-xs cursor-pointer" style={{color: 'var(--muted)'}}/>
                </div>
            );

            const filterSection = (
                <div className="space-y-3">
                    {['difficulty', 'necessity', 'gai'].map(key => (
                        <div key={key}>
                            <div className="flex justify-between items-baseline mb-1.5">
                                <label className="text-sm font-medium">{labels[key]}</label>
                                <span className="font-mono-data text-xs" style={{color: 'var(--kin)'}}>{filters[key].min} – {filters[key].max}</span>
                            </div>
                            <div className="flex items-center gap-2 text-xs" style={{color: 'var(--muted)'}}>
                                <span>1</span>
                                <input type="range" min="1" max="5" value={filters[key].min} onChange={e => handleFilterChange(key, 'min', e.target.value)} className="w-full" />
                                <input type="range" min="1" max="5" value={filters[key].max} onChange={e => handleFilterChange(key, 'max', e.target.value)} className="w-full" />
                                <span>5</span>
                            </div>
                        </div>
                    ))}
                </div>
            );

            const formSection = (
                <div className="space-y-3">
                    <input type="text" name="name" value={certForm.name} onChange={handleFormChange} placeholder="資格名" className="field"/>
                    <div className="grid grid-cols-3 gap-2">
                        {['difficulty', 'necessity', 'gai'].map(key => (
                            <div key={key}>
                                <label className="block text-xs font-medium mb-1" style={{color: 'var(--muted)'}}>{labels[key]}</label>
                                <input type="number" name={key} value={certForm[key]} onChange={handleFormChange} min="1" max="5" className="field"/>
                            </div>
                        ))}
                    </div>
                    <button onClick={handleAddUpdateCert} className="btn btn-shu w-full">{editingCert ? '更新する' : '追加する'}</button>
                    {editingCert && <button onClick={() => setEditingCert(null)} className="btn btn-ghost w-full">キャンセル</button>}
                </div>
            );

            const leftColumn = isDesktop ? (
                <div className="space-y-4">
                    <SectionCard eyebrow="Upload" title="資格情報アップロード">{uploadSection}</SectionCard>
                    <SectionCard eyebrow="Filter" title="フィルター">{filterSection}</SectionCard>
                    <SectionCard eyebrow={editingCert ? 'Edit' : 'Add'} title={editingCert ? '資格情報の編集' : '資格情報の手動追加'}>{formSection}</SectionCard>
                </div>
            ) : (
                <div className="space-y-3">
                    <Accordion title="資格情報アップロード">{uploadSection}</Accordion>
                    <Accordion title="フィルター">{filterSection}</Accordion>
                    <Accordion title={editingCert ? '資格情報の編集' : '資格情報の手動追加'} defaultOpen={!!editingCert}>{formSection}</Accordion>
                </div>
            );

            return (
                <div className="space-y-4 md:space-y-5 fade-up">
                    <div className="flex flex-col lg:flex-row gap-4 md:gap-5">
                        <div className="w-full lg:w-[320px] xl:w-[360px] lg:flex-shrink-0">{leftColumn}</div>
                        <div className="w-full lg:flex-1">
                            <div className="glass p-4 md:p-5 h-full flex flex-col">
                                <div className="flex items-baseline justify-between mb-3 flex-wrap gap-2">
                                    <div>
                                        <div className="eyebrow">3D Matrix</div>
                                        <h3 className="font-display text-lg xl:text-xl font-bold">立体優先度マップ</h3>
                                    </div>
                                    <div className="flex items-center gap-4 flex-wrap">
                                        <div className="flex gap-3 text-[11px]" style={{color: 'var(--muted)'}}>
                                            <span><span style={{color:'#e5b84b'}}>●</span> X: 難易度</span>
                                            <span><span style={{color:'#55c6b5'}}>●</span> Y: 必要性</span>
                                            <span><span style={{color:'#e85b3f'}}>●</span> Z: やりがい</span>
                                        </div>
                                        <div className="scene-toggle" role="group" aria-label="背景テーマ切り替え">
                                            <button onClick={() => setSceneTheme('space')} className={sceneTheme === 'space' ? 'active-space' : ''}>✦ 宇宙</button>
                                            <button onClick={() => setSceneTheme('city')} className={sceneTheme === 'city' ? 'active-city' : ''}>▦ 都市</button>
                                        </div>
                                    </div>
                                </div>
                                <div className={`w-full flex-1 h-[48vh] md:h-[56vh] lg:h-auto lg:min-h-[560px] min-h-[340px] ${sceneTheme === 'space' ? 'space-bg' : 'city-bg'} overflow-hidden relative`} style={{border: '1px solid var(--line)', transition: 'background 0.6s ease'}}>
                                    <Bubble3DChart data={filteredCerts} theme={sceneTheme} />
                                </div>
                            </div>
                        </div>
                    </div>
                    <div className="w-full">
                        <div className="glass p-4 md:p-5">
                            <div className="flex items-baseline justify-between mb-3">
                                <h3 className="font-display text-lg font-bold">資格一覧</h3>
                                <span className="font-mono-data text-xs" style={{color: 'var(--muted)'}}>{filteredCerts.length} 件</span>
                            </div>
                            <div className="overflow-auto max-h-[40vh] glass-inset">
                                <table className="min-w-full text-sm">
                                    <thead className="sticky top-0" style={{background: 'var(--bg-2)'}}>
                                        <tr>{['資格名', '難易度', '必要性', 'やりがい', ''].map((h, i) => (
                                            <th key={i} className="px-3 md:px-4 py-2.5 text-left text-[11px] font-bold tracking-wider" style={{color: 'var(--muted)'}}>{h}</th>
                                        ))}</tr>
                                    </thead>
                                    <tbody>
                                        {filteredCerts.length > 0 ? filteredCerts.map(cert => (
                                            <tr key={cert.id} className="transition-colors hover:bg-white/5" style={{borderTop: '1px solid var(--line)'}}>
                                                <td className="px-3 md:px-4 py-2.5 font-medium">{cert.name}</td>
                                                <td className="px-3 md:px-4 py-2.5 font-mono-data" style={{color: 'var(--kin)'}}>{cert.difficulty}</td>
                                                <td className="px-3 md:px-4 py-2.5 font-mono-data" style={{color: 'var(--seiji)'}}>{cert.necessity}</td>
                                                <td className="px-3 md:px-4 py-2.5 font-mono-data" style={{color: 'var(--shu)'}}>{cert.gai}</td>
                                                <td className="px-3 md:px-4 py-2.5 whitespace-nowrap space-x-3 text-xs font-bold">
                                                    <button onClick={() => setEditingCert(cert)} className="hover:underline" style={{color: 'var(--indigo)'}}>編集</button>
                                                    <button onClick={() => handleDeleteCert(cert.id)} className="hover:underline" style={{color: 'var(--shu)'}}>削除</button>
                                                </td>
                                            </tr>
                                        )) : (<tr><td colSpan="5" className="text-center py-6" style={{color: 'var(--muted)'}}>該当する資格がありません。</td></tr>)}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ============================================================
        //  タブ2: 進捗管理
        // ============================================================
        const ProgressTab = ({ data, currentCertId, setCurrentCertId, saveData, handleProgressFileUpload, newMajorItemName, setNewMajorItemName, handleAddMajorItem, parentMajorItemId, setParentMajorItemId, newMinorItemName, setNewMinorItemName, handleAddMinorItem, handleProgressCheckbox, progressPercent }) => {
            const isDesktop = useMediaQuery('(min-width: 1024px)');

            const certSection = (
                <div className="space-y-3">
                    <select value={currentCertId || ''} onChange={(e) => setCurrentCertId(e.target.value)} className="field">
                        <option value="">資格を選択...</option>
                        {data.certifications.map((cert) => <option key={cert.id} value={cert.id}>{cert.name}</option>)}
                    </select>
                    <div>
                        <label className="block text-xs font-medium mb-1" style={{color: 'var(--muted)'}}>目標取得日</label>
                        <input type="date" value={data.progress[currentCertId]?.targetDate || ''} onChange={(e) => {
                            if (!currentCertId) return;
                            const updatedProgress = { ...data.progress, [currentCertId]: { ...(data.progress[currentCertId] || {}), targetDate: e.target.value } };
                            saveData({ ...data, progress: updatedProgress });
                        }} className="field"/>
                    </div>
                </div>
            );

            const itemSection = (
                <div className="space-y-3">
                    <p className="text-xs leading-relaxed" style={{color: 'var(--muted)'}}>Excelファイルをアップロード (●:大項目, ・:小項目)</p>
                    <input type="file" accept=".xlsx" onChange={handleProgressFileUpload} className="file-input block w-full text-xs cursor-pointer" style={{color: 'var(--muted)'}}/>
                    <div className="pt-3 space-y-2" style={{borderTop: '1px solid var(--line)'}}>
                        <div className="text-sm font-bold">手動で追加</div>
                        <input type="text" value={newMajorItemName} onChange={(e) => setNewMajorItemName(e.target.value)} placeholder="大項目名" className="field"/>
                        <button onClick={handleAddMajorItem} disabled={!currentCertId} className="btn btn-indigo w-full">大項目を追加</button>
                        <select value={parentMajorItemId} onChange={(e) => setParentMajorItemId(e.target.value)} className="field mt-2">
                            <option value="">親となる大項目を選択...</option>
                            {Object.entries(data.progress[currentCertId]?.items || {}).map(([key, item]) => <option key={key} value={key}>{item.name}</option>)}
                        </select>
                        <input type="text" value={newMinorItemName} onChange={(e) => setNewMinorItemName(e.target.value)} placeholder="小項目名" className="field"/>
                        <button onClick={handleAddMinorItem} disabled={!parentMajorItemId} className="btn btn-seiji w-full">小項目を追加</button>
                    </div>
                </div>
            );

            const leftColumn = isDesktop ? (
                <div className="space-y-4">
                    <SectionCard eyebrow="Target" title="学習中の資格設定">{certSection}</SectionCard>
                    <SectionCard eyebrow="Checklist" title="学習項目アップロード/追加">{itemSection}</SectionCard>
                </div>
            ) : (
                <div className="space-y-3">
                    <Accordion title="学習中の資格設定" defaultOpen={!currentCertId}>{certSection}</Accordion>
                    <Accordion title="学習項目アップロード/追加">{itemSection}</Accordion>
                </div>
            );

            const items = data.progress[currentCertId]?.items || {};

            return (
                <div className="flex flex-col lg:flex-row gap-4 md:gap-5 fade-up">
                    <div className="w-full lg:w-[320px] xl:w-[360px] lg:flex-shrink-0">{leftColumn}</div>
                    <div className="w-full lg:flex-1">
                        <div className="glass p-4 md:p-6">
                            <div className="flex items-center justify-between mb-4 gap-3 flex-wrap">
                                <h3 className="font-display text-lg xl:text-xl font-bold">{data.certifications.find(c => c.id === currentCertId)?.name || '資格を選択してください'}</h3>
                                <span className="font-mono-data text-sm font-bold" style={{color: 'var(--kin)'}}>{progressPercent.toFixed(1)}%</span>
                            </div>
                            <div className="w-full h-2.5 rounded-full mb-5 overflow-hidden" style={{background: 'rgba(255,255,255,0.07)'}}>
                                <div className="h-full rounded-full transition-all duration-500" style={{ width: `${progressPercent}%`, background: 'linear-gradient(90deg, var(--shu), var(--kin))', boxShadow: '0 0 12px rgba(229,184,75,0.5)' }}></div>
                            </div>
                            <div className="max-h-[66vh] overflow-y-auto pr-2 xl:columns-2 xl:gap-3">
                                {Object.keys(items).length === 0 && (
                                    <div className="text-center py-10 text-sm" style={{color: 'var(--muted)'}}>学習項目がまだありません。<br/>左のパネルから追加してください。</div>
                                )}
                                {Object.entries(items).map(([majorKey, majorItem]) => {
                                    const subs = Object.values(majorItem.subItems || {});
                                    const done = subs.filter(s => s.checked).length;
                                    return (
                                        <div key={majorKey} className="glass-inset p-4 mb-3" style={{breakInside: 'avoid'}}>
                                            <div className="flex items-center justify-between mb-2">
                                                <h5 className="font-bold text-sm flex items-center gap-2">
                                                    {majorItem.checked && <span className="stamp" style={{width:'1.6rem',height:'1.6rem',fontSize:'.65rem'}}>完</span>}
                                                    {majorItem.name}
                                                </h5>
                                                <span className="font-mono-data text-[11px]" style={{color: 'var(--muted)'}}>{done}/{subs.length}</span>
                                            </div>
                                            <div className="pl-1 space-y-1.5">
                                                {Object.entries(majorItem.subItems || {}).map(([minorKey, minorItem]) => (
                                                    <label key={minorKey} className="flex items-center gap-2.5 cursor-pointer group">
                                                        <input type="checkbox" checked={minorItem.checked} onChange={() => handleProgressCheckbox(minorKey, majorKey)}
                                                            className="h-4 w-4 rounded cursor-pointer" style={{accentColor: 'var(--shu)'}} />
                                                        <span className={`text-sm transition-colors ${minorItem.checked ? 'line-through' : 'group-hover:text-white'}`}
                                                            style={{color: minorItem.checked ? 'var(--muted)' : undefined}}>{minorItem.name}</span>
                                                    </label>
                                                ))}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ============================================================
        //  タブ3: レポート
        // ============================================================
        const ReportTab = ({ data, currentCertId, progressPercent, daysRemaining, certName, totalStudyTime, viewDate, setViewDate, selectedDate, setSelectedDate, note, setNote, studyTime, setStudyTime, saveData, openModal, setIsAiReportModalOpen }) => {

            const handleSaveCalendarEntry = () => {
                if (!selectedDate) return;
                if (!currentCertId) {
                    openModal('エラー', '記録を保存するには、「進捗管理」タブで学習中の資格を選択してください。');
                    return;
                }
                const dateKey = selectedDate.toISOString().split('T')[0];
                const updatedCalendar = JSON.parse(JSON.stringify(data.calendar || {}));
                if (!updatedCalendar[dateKey]) updatedCalendar[dateKey] = {};
                if (!updatedCalendar[dateKey].studyLog) updatedCalendar[dateKey].studyLog = {};
                updatedCalendar[dateKey].note = note;
                updatedCalendar[dateKey].studyLog[currentCertId] = Number(studyTime) || 0;
                saveData({ ...data, calendar: updatedCalendar });
                openModal('保存完了', `${dateKey} の記録を保存しました。`);
            };

            const calendarDays = useMemo(() => {
                const year = viewDate.getFullYear();
                const month = viewDate.getMonth();
                const firstDayOfMonth = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const days = [];
                for (let i = 0; i < firstDayOfMonth; i++) days.push(null);
                for (let i = 1; i <= daysInMonth; i++) days.push(new Date(year, month, i));
                return days;
            }, [viewDate]);

            const savedReport = selectedDate && data.calendar?.[selectedDate.toISOString().split('T')[0]]?.report;

            return (
                <div className="space-y-4 md:space-y-5 fade-up">
                    <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4 md:gap-5">
                        <div className="glass lift p-6 flex flex-col items-center justify-center min-h-[180px]">
                            <div className="eyebrow mb-2">Countdown</div>
                            <div className="kpi-num text-5xl xl:text-6xl font-bold font-mono-data" style={{color: 'var(--indigo)'}}>
                                {daysRemaining !== null ? (daysRemaining >= 0 ? daysRemaining : '期限切れ') : '–'}
                            </div>
                            <div className="text-xs mt-3" style={{color: 'var(--muted)'}}>目標日までの日数</div>
                        </div>
                        <div className="glass lift p-6 flex flex-col items-center justify-center min-h-[180px]">
                            <div className="eyebrow mb-2">Study Time</div>
                            <div className="kpi-num text-5xl xl:text-6xl font-bold font-mono-data" style={{color: 'var(--seiji)'}}>
                                {totalStudyTime > 0 ? <span>{Math.floor(totalStudyTime / 60)}<span className="text-xl">h</span> {totalStudyTime % 60}<span className="text-xl">m</span></span> : '–'}
                            </div>
                            <div className="text-xs mt-3" style={{color: 'var(--muted)'}}>累計学習時間</div>
                        </div>
                        <div className="glass lift p-6 flex flex-col items-center justify-center min-h-[180px]">
                            <div className="w-28 h-28 xl:w-32 xl:h-32">
                                <ProgressDoughnutChart progressPercent={currentCertId ? progressPercent : 0} />
                            </div>
                            <div className="text-xs mt-3 text-center font-medium">{certName || '資格未選択'}</div>
                        </div>
                        <div className="glass lift p-6 flex flex-col justify-center text-center min-h-[180px]">
                            <div className="eyebrow mb-1">AI Report</div>
                            <h3 className="font-display font-bold mb-2">AIレポート</h3>
                            <p className="text-xs mb-4 leading-relaxed" style={{color: 'var(--muted)'}}>学習状況を分析し、パーソナライズされたレポートとアドバイスを生成します。</p>
